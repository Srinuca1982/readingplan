, the resulting/transferee company seeks <strong>listing<\/strong> of its shares; in-principle approval must be obtained before NCLT filing.<\/li>\n<\/ul>\n\n<h2>Stamp duty — State-specific, the easiest to forget<\/h2>\n<p>Stamp duty on schemes of arrangement is governed by State-level stamp legislation, not the\ncentral Indian Stamp Act. Each State has its own rate and basis.<\/p>\n\n<table>\n  <thead><tr><th>State<\/th><th>Basis<\/th><th>Typical rate (verify before relying)<\/th><\/tr><\/thead>\n  <tbody>\n    <tr><td>Maharashtra<\/td><td>Higher of consideration or value transferred<\/td><td>~10% of consideration with cap (5% on movable, 5% on immovable, cap based on FMV)<\/td><\/tr>\n    <tr><td>Karnataka<\/td><td>Value of shares allotted + consideration paid<\/td><td>~3%<\/td><\/tr>\n    <tr><td>Telangana / AP<\/td><td>Value of the property transferred<\/td><td>Ad valorem schedule; check the latest schedule under the AP/Telangana Stamp Act<\/td><\/tr>\n    <tr><td>Delhi<\/td><td>NCLT order treated as conveyance; consideration-based<\/td><td>Ad valorem; varies<\/td><\/tr>\n  <\/tbody>\n<\/table>\n\n<div class=\"callout\">\n<strong>Watch for.<\/strong> If immovable property in multiple States is involved, stamp duty is\npayable in each State based on the property situated there. Plan the stamping sequence carefully —\nsome States require stamping <em>before<\/em> registration of the NCLT order with ROC.\n<\/div>\n\n<h2>Competition Act — Sections 5 and 6<\/h2>\n\n<h3>Combination thresholds (Sec 5)<\/h3>\n<p>A transaction is a \"combination\" requiring CCI approval if <strong>any one<\/strong> of the\nfollowing thresholds is crossed (Sec 5 read with Notification S.O. 988(E) dated 7 March 2024):<\/p>\n<ul>\n  <li><strong>Combined assets in India ≥ ₹2,500 cr<\/strong> OR <strong>combined turnover in India ≥ ₹7,500 cr<\/strong> (parties test); OR<\/li>\n  <li><strong>Group-level assets ≥ ₹10,000 cr in India / ₹4 bn worldwide<\/strong> OR <strong>turnover ≥ ₹30,000 cr in India / ₹12 bn worldwide<\/strong> (group test).<\/li>\n<\/ul>\n\n<h3>Deal Value Threshold — effective September 2024<\/h3>\n<p>A new threshold inserted by the 2023 amendment, in force from <strong>10 September 2024<\/strong>:\nif the deal value exceeds <strong>₹2,000 crore<\/strong> AND the target has \"substantial business\noperations in India\", CCI notification is required regardless of the asset/turnover thresholds.\nThis catches large digital/tech deals that historically slipped through.<\/p>\n\n<h3>Procedure (Sec 6)<\/h3>\n<ul>\n  <li>Form I (short form) or Form II (long form) notification to CCI before consummation.<\/li>\n  <li>Standstill obligation — parties cannot consummate until CCI approval or expiry of statutory waiting period.<\/li>\n  <li>Approval typically within 30 working days (Phase I) or extended for Phase II investigation.<\/li>\n  <li>Penalty for gun-jumping (consummating without approval) up to <strong>1% of combined assets or turnover<\/strong>.<\/li>\n<\/ul>\n\n<h3>Exemptions<\/h3>\n<ul>\n  <li><strong>De minimis<\/strong> — target with assets ≤ ₹450 cr OR turnover ≤ ₹1,250 cr in India (subject to revision).<\/li>\n  <li>Intra-group acquisitions where common control of ≥ 50% pre-transaction.<\/li>\n  <li>Acquisitions by liquidator under IBC.<\/li>\n<\/ul>\n\n<h2>GST — the unsung overlay<\/h2>\n\n<h3>Schedule II + Notification 12/2017<\/h3>\n<p>Under Schedule II of the CGST Act, certain transactions are treated as supplies. However,\n<strong>transfer of a business as a going concern<\/strong>, in whole or independent part, is\n<strong>exempt<\/strong> from GST under Notification 12/2017 (entry 2). Therefore most slump sales\nand going-concern business transfers do not attract GST.<\/p>\n\n<h3>Sec 18(3) — Transfer of ITC<\/h3>\n<p>On amalgamation, merger, demerger, sale, lease or transfer of business with specific provision\nfor transfer of liabilities, the registered person can transfer unutilised ITC to the transferee/\nresulting entity in Form GST ITC-02. Pro rata allocation for demerger; lump-sum for merger.<\/p>\n\n<h3>Sec 87 — Transferee liability<\/h3>\n<p>If the transferor has unpaid GST dues, the transferee is <strong>jointly and severally<\/strong>\nliable for the dues up to the value of the property transferred. Tax due-diligence must include\nunpaid GST and pending GST notices.<\/p>\n\n<div class=\"callout\">\n<strong>Drafting tip.<\/strong> The BTA or scheme should expressly transfer all GST-related rights\n(refunds receivable, ITC, registrations) and obligations (pending dues, ongoing assessments). Standard\nclauses cover this; deviations create headaches at the assessment stage.\n<\/div>\n", "slug": "notes-sebi-stamp-competition-gst"}, {"kind": "Study Note", "title": "IBC as a Restructuring Tool", "summary": "Resolution plans, schemes during liquidation, and the tax treatment of write-backs.", "body": "\n<h2>Why IBC is a restructuring statute<\/h2>\n<p>The Insolvency and Bankruptcy Code 2016 is not just a default-and-recovery framework. Sections 30\nand 31 enable the <strong>Resolution Plan<\/strong> — a binding restructuring of a distressed\ncorporate debtor that can carry out almost any commercial reorganisation: change of control,\nwrite-off of liabilities, fresh capital infusion, demerger, asset transfer, even cancellation of\nshares.<\/p>\n\n<h2>Sec 30–31 — The Resolution Plan<\/h2>\n\n<h3>The plan's content (Sec 30(2))<\/h3>\n<ul>\n  <li>Payment of <strong>CIRP costs<\/strong> in priority.<\/li>\n  <li>Payment to <strong>operational creditors<\/strong> not less than the higher of (a) the amount they'd get in liquidation, (b) the amount payable if the proceeds were distributed in accordance with Sec 53.<\/li>\n  <li>Payment to <strong>dissenting financial creditors<\/strong> not less than the amount payable in liquidation.<\/li>\n  <li>Provisions for <strong>implementation<\/strong>, including management.<\/li>\n<\/ul>\n\n<h3>Approval (Sec 30(4) + Sec 31)<\/h3>\n<ul>\n  <li>The Committee of Creditors (CoC) approves the resolution plan by <strong>≥ 66% of voting share<\/strong>.<\/li>\n  <li>The Resolution Professional submits the plan to the NCLT.<\/li>\n  <li>If NCLT is satisfied that the plan meets all statutory requirements, it issues an order under <strong>Sec 31(1)<\/strong> approving the plan. The order is binding on the corporate debtor, employees, members, creditors, guarantors, and statutory authorities — including tax authorities.<\/li>\n<\/ul>\n\n<h2>The \"clean slate\" doctrine<\/h2>\n<div class=\"callout\">\n<strong>Key principle.<\/strong> <em>Essar Steel (CoC of Essar Steel India Ltd. v. Satish Kumar Gupta — 2019 SC)<\/em> and a line of subsequent decisions establish that, once the resolution plan is approved, all <em>past<\/em> liabilities (including statutory dues) not provided for in the plan are <strong>extinguished<\/strong>. The successful resolution applicant takes over the corporate debtor with a clean slate, free of unknown contingent or undisclosed liabilities.\n<\/div>\n<p>This is the <strong>single most powerful<\/strong> restructuring feature in Indian law — and the\nreason resolution plans are increasingly used by financially distressed but operationally viable\ncompanies.<\/p>\n\n<h2>Sec 230 schemes during liquidation<\/h2>\n<p>If a corporate debtor enters liquidation under Chapter III of the IBC, the liquidator may, under\n<strong>Regulation 2B of the Liquidation Process Regulations 2016<\/strong>, propose a Sec 230 scheme\nof arrangement to revive the company instead of selling its assets piecemeal. NCLT must approve\nthe scheme; the standard CAA procedure applies, adapted to the liquidation context.<\/p>\n\n<p>This provides a \"second window\" of restructuring after the CIRP has failed but before the company\nis wound up. It has been used successfully in mid-sized cases where a strategic acquirer emerges\nlate.<\/p>\n\n<h2>Tax treatment of resolution plans<\/h2>\n\n<h3>Sec 79(2)(c) — Loss carry-forward relaxation<\/h3>\n<p>Ordinarily, under Sec 79, accumulated losses cannot be carried forward if there's a change in\nbeneficial shareholding of more than 49%. <strong>Sec 79(2)(c)<\/strong> relaxes this for cases where\nthe change in shareholding pursuant to a resolution plan approved under Sec 31 of the IBC has taken\nplace. This allows the successful resolution applicant to use the corporate debtor's accumulated\nlosses going forward — a major economic feature of resolution-plan structures.<\/p>\n\n<h3>Write-back of liabilities — capital or revenue?<\/h3>\n<p>When the resolution plan extinguishes a portion of unsecured creditor liability, the corporate\ndebtor recognises a credit in the P&L. Two views exist:<\/p>\n<ul>\n  <li><strong>Revenue receipt<\/strong> — Sec 41(1) — if the liability arose from a trading transaction (e.g., trade payables), the remission is taxable as deemed business income.<\/li>\n  <li><strong>Capital receipt<\/strong> — if the liability was capital in nature (e.g., loan from financial creditor for capex), the remission is a capital receipt not chargeable to tax.<\/li>\n<\/ul>\n<p>The Sec 31 order's \"binding on all\" language has been invoked to argue that the entire write-back\nis a capital receipt — the position is being litigated; safer to provide for tax exposure in the\nfinancial model.<\/p>\n\n<h3>MAT relief — Sec 115JB<\/h3>\n<p>For Sec 115JB MAT computation, a special carve-out exists for companies undergoing CIRP: the\nbook profit can be reduced by the lower of unabsorbed depreciation or business loss brought forward\n— a more generous adjustment than the normal MAT formula. Verify the current FY's exact text.<\/p>\n\n<h2>Stamp duty exemption<\/h2>\n<p>Under most State stamp legislations, the transfer of property pursuant to an NCLT-approved\nresolution plan is exempt from stamp duty (or charged at a nominal rate). The specific exemption\nmust be checked under each State's stamp schedule — Maharashtra, Karnataka, Telangana have specific\nnotifications; Delhi and Tamil Nadu have either explicit exemption or judicial reading-down.<\/p>\n\n<div class=\"callout\">\n<strong>Drafting tip.<\/strong> The resolution plan should expressly state that the transfer of\nassets to the resolution applicant is by operation of the NCLT order under Sec 31 of the IBC, and\ninvoke the State-specific stamp exemption. Generic language risks the State stamp authority charging\nad valorem.\n<\/div>\n\n<h2>The IBC as a M&A tool — strategic uses<\/h2>\n<ol>\n  <li><strong>Distressed acquisition<\/strong> — Sec 31 approval gives clean-slate ownership.<\/li>\n  <li><strong>Liability write-off<\/strong> at scale — through the resolution plan.<\/li>\n  <li><strong>Loss carry-forward preservation<\/strong> under Sec 79(2)(c).<\/li>\n  <li><strong>Avoidance of regulatory consents<\/strong> that would otherwise be required (the Sec 31 order binds statutory authorities).<\/li>\n  <li><strong>Stamp duty efficiency<\/strong> on the asset transfer.<\/li>\n<\/ol>\n\n<p>For these reasons, the resolution-plan route is sometimes <em>cheaper and faster<\/em> than a Sec 230 scheme\neven when the company is not in genuine financial distress — though this is being scrutinised by\nNCLT to prevent abuse.<\/p>\n", "slug": "notes-ibc-restructuring"}, {"kind": "Cheat Sheet", "title": "Sec 2(1B) Amalgamation — The Three-Condition Test", "summary": "Quick decision card: does your transaction qualify as a tax-neutral amalgamation?", "body": "\n<h2>The three conditions — ALL must be met<\/h2>\n<table>\n  <thead><tr><th>#<\/th><th>Condition<\/th><th>Common breach<\/th><\/tr><\/thead>\n  <tbody>\n    <tr>\n      <td>1<\/td>\n      <td><strong>All property<\/strong> of amalgamating co. becomes property of amalgamated co.<\/td>\n      <td>Retaining a brand IP or a key contract with the amalgamating co.<\/td>\n    <\/tr>\n    <tr>\n      <td>2<\/td>\n      <td><strong>All liabilities<\/strong> of amalgamating co. become liabilities of amalgamated co.<\/td>\n      <td>Carving out a contingent liability or a disputed tax demand.<\/td>\n    <\/tr>\n    <tr>\n      <td>3<\/td>\n      <td>Shareholders holding <strong>≥ 3/4 in value<\/strong> of shares of amalgamating co. (other than shares held by amalgamated co.) become shareholders of amalgamated co.<\/td>\n      <td>Cashing out minority shareholders pre-amalgamation; insufficient continuity.<\/td>\n    <\/tr>\n  <\/tbody>\n<\/table>\n\n<div class=\"callout\">\n<strong>Drafting test.<\/strong> If your scheme uses the words \"except for\", \"save and except\", or\n\"other than\" when describing the property or liabilities transferred, you have a Condition-1 or\nCondition-2 problem. Fix the scheme before filing.\n<\/div>\n\n<h2>The downstream tax benefits that depend on Sec 2(1B)<\/h2>\n<ul>\n  <li><span class=\"sec\">Sec 47(vi)<\/span> — transfer of capital asset is not regarded as a transfer.<\/li>\n  <li><span class=\"sec\">Sec 47(vii)<\/span> — issue of shares in lieu of amalgamating-co shares is not regarded as a transfer.<\/li>\n  <li><span class=\"sec\">Sec 49(2)<\/span> — cost of acquisition in the amalgamated co. is the cost in the amalgamating co.<\/li>\n  <li><span class=\"sec\">Sec 72A<\/span> — carry forward of losses and unabsorbed depreciation (subject to additional industrial-undertaking conditions).<\/li>\n<\/ul>\n\n<h2>Pre-filing checklist<\/h2>\n<ol>\n  <li>Schedule of all assets and liabilities at the appointed date — confirm comprehensiveness.<\/li>\n  <li>Shareholder roll on appointed date — compute the 3/4-by-value continuity.<\/li>\n  <li>List of \"carve-outs\" — there should be none. If any are commercially needed, restructure as two-step transaction.<\/li>\n  <li>Industrial-undertaking analysis for Sec 72A loss carry-forward (separate test).<\/li>\n  <li>Sec 47A risk register — to monitor 8-year post-merger compliance.<\/li>\n<\/ol>\n", "slug": "cheat-amalgamation-test"}, {"kind": "Cheat Sheet", "title": "Sec 2(19AA) Demerger — The Five-Condition Test", "summary": "The most-litigated definition. Each condition independently kills tax neutrality.", "body": "\n<h2>The five conditions — ALL must be met<\/h2>\n<table>\n  <thead><tr><th>#<\/th><th>Condition<\/th><th>What it means<\/th><\/tr><\/thead>\n  <tbody>\n    <tr>\n      <td>1<\/td>\n      <td>All <strong>property<\/strong> of the undertaking transfers to resulting co.<\/td>\n      <td>The \"undertaking\" must be a self-contained business; nothing related to it can stay back.<\/td>\n    <\/tr>\n    <tr>\n      <td>2<\/td>\n      <td>All <strong>liabilities relatable to the undertaking<\/strong> transfer to resulting co.<\/td>\n      <td>Direct-relatability test. Common liabilities apportioned on a reasonable basis (typically asset ratio).<\/td>\n    <\/tr>\n    <tr>\n      <td>3<\/td>\n      <td>Property and liabilities transfer <strong>at values appearing in the books<\/strong> (without revaluation).<\/td>\n      <td>No mark-to-market; reversal of upward revaluation is acceptable.<\/td>\n    <\/tr>\n    <tr>\n      <td>4<\/td>\n      <td>Resulting co. <strong>issues shares to demerged-co shareholders on a proportionate basis<\/strong>, except where resulting co. is already a shareholder of demerged co.<\/td>\n      <td>Pro-rata only. Cannot issue to a subset of shareholders or in non-proportionate ratios.<\/td>\n    <\/tr>\n    <tr>\n      <td>5<\/td>\n      <td>Shareholders holding <strong>≥ 3/4 in value<\/strong> of shares of demerged co. become shareholders of resulting co.<\/td>\n      <td>Shareholder-continuity test.<\/td>\n    <\/tr>\n  <\/tbody>\n<\/table>\n\n<h2>Bonus conditions tucked away in the definition<\/h2>\n<ul>\n  <li>Transfer must be on a <strong>going-concern basis<\/strong> (Condition (iv) of the explanation to Sec 2(19AA)).<\/li>\n  <li>The \"undertaking\" must include <strong>all assets and liabilities<\/strong> of that business unit; the explanation defines undertaking as \"any part of an undertaking, or a unit or division\".<\/li>\n  <li>The CBDT has clarified that a single business activity cannot be split — must transfer as a whole.<\/li>\n<\/ul>\n\n<div class=\"callout\">\n<strong>Quick diagnostic.<\/strong> Demergers fail Sec 2(19AA) most often because of (a) Condition 1\n— a non-relatable asset gets transferred or a relatable asset is retained, or (b) Condition 4 —\nshares issued in a non-proportionate ratio (e.g., promoters get more). Both are scheme-drafting\nissues, fixable at planning stage.\n<\/div>\n\n<h2>Downstream tax effects<\/h2>\n<ul>\n  <li><span class=\"sec\">Sec 47(vib)<\/span> — capital-gains exemption for transferring co.<\/li>\n  <li><span class=\"sec\">Sec 47(vid)<\/span> — exemption for shareholders receiving resulting-co shares.<\/li>\n  <li><span class=\"sec\">Sec 49(2C) / (2D)<\/span> — cost-allocation between demerged-co and resulting-co shares.<\/li>\n  <li><span class=\"sec\">Sec 72A(4)<\/span> — proportionate loss carry-forward to resulting co.<\/li>\n  <li><strong>SEBI Reg. 37<\/strong> — pre-NCLT approval for listed demerged co.<\/li>\n<\/ul>\n\n<h2>Cost-allocation formula — Sec 49(2C)<\/h2>\n<blockquote>\nCost of acquisition of resulting-co shares to shareholder<br>\n= Cost of original demerged-co shares ×<br>\n  (Net book value of assets transferred to resulting co.) ÷ (Net worth of demerged co. before demerger)\n<\/blockquote>\n<p>The balance is the cost of remaining demerged-co shares — Sec 49(2D).<\/p>\n", "slug": "cheat-demerger-test"}, {"kind": "Cheat Sheet", "title": "Sec 233 Fast-Track Merger — Eligibility & Procedure", "summary": "3–4 month merger route via RD, bypassing NCLT entirely.", "body": "\n<h2>Who is eligible (Sec 233(1) read with Rule 25 of CAA Rules 2016)<\/h2>\n<ul>\n  <li>Two or more <strong>small companies<\/strong> (paid-up capital ≤ ₹4 cr AND turnover ≤ ₹40 cr).<\/li>\n  <li>A <strong>holding company and its wholly-owned subsidiary<\/strong> (any size).<\/li>\n  <li>Two or more <strong>start-up companies<\/strong> (DPIIT-recognised).<\/li>\n  <li>A <strong>start-up company and a small company<\/strong>.<\/li>\n  <li>Per MCA notification September 2024: also extended to certain <strong>unlisted public companies<\/strong> meeting prescribed thresholds, and to <strong>inbound cross-border<\/strong> fast-track mergers between a foreign WOS and its Indian holding.<\/li>\n<\/ul>\n\n<h2>Procedure<\/h2>\n<ol>\n  <li><strong>Board resolution<\/strong> in both companies approving the scheme.<\/li>\n  <li><strong>Notice (Form CAA-9)<\/strong> inviting objections from ROC, OL and persons affected, with the proposed scheme. Time given: 30 days.<\/li>\n  <li><strong>Declaration of solvency (Form CAA-10)<\/strong> by each company.<\/li>\n  <li><strong>General meeting<\/strong>: approval by members representing <strong>90% of total shares<\/strong>.<\/li>\n  <li><strong>Meeting of creditors<\/strong>: approval by <strong>creditors representing 9/10 in value<\/strong> of total debts. (May be dispensed with by written consent.)<\/li>\n  <li><strong>Filing of scheme (Form CAA-11)<\/strong> with the Regional Director via the ROC, accompanied by the company's solvency declaration, creditor consents, and the scheme.<\/li>\n  <li>If RD has no objections — or if objections received are not substantive — RD passes order confirming the scheme (Form CAA-12).<\/li>\n  <li>If RD has reservations, the matter is transferred to NCLT — at which point the standard Sec 230–232 procedure resumes.<\/li>\n  <li>Order filed with ROC; the transferor stands dissolved.<\/li>\n<\/ol>\n\n<h2>What can the RD examine?<\/h2>\n<ul>\n  <li>Whether the eligibility conditions of Sec 233(1) are met.<\/li>\n  <li>Whether the scheme is in the public interest.<\/li>\n  <li>Whether the prescribed meetings/consents have been duly held.<\/li>\n  <li>Whether the accounting treatment is in accordance with applicable accounting standards.<\/li>\n  <li>Tax department, sectoral regulator and other government departments may file objections.<\/li>\n<\/ul>\n\n<div class=\"callout\">\n<strong>Time vs cost.<\/strong> A Sec 233 merger typically takes 3–4 months end-to-end at a fraction\nof the cost of a Sec 230 scheme. The trade-off: lower threshold for the 90% members / 9/10 creditors\nconsent, and inability to use Sec 233 if creditor universe is too dispersed or one major creditor objects.\n<\/div>\n\n<h2>Tax treatment<\/h2>\n<p>Identical to a regular Sec 230–232 amalgamation — Sec 2(1B), 47(vi)/(vii), 49(2), 72A all apply\nprovided their independent conditions are met. The RD-route mechanism does not give any tax\npreference; it only saves time on the corporate-law side.<\/p>\n", "slug": "cheat-fast-track"}, {"kind": "Cheat Sheet", "title": "Sec 234 Cross-Border Merger — Jurisdiction & Procedure Checklist", "summary": "Compliance map across Companies Act, FEMA, NDI/ODI, and tax.", "body": "\n<h2>Phase 1 — Eligibility<\/h2>\n<ul>\n  <li>Foreign company must be incorporated in a <strong>notified jurisdiction<\/strong> under Rule 25A:\n    <ul>\n      <li>FATF / IOSCO MMoU member country, OR<\/li>\n      <li>Country with a bilateral arrangement with India.<\/li>\n    <\/ul>\n  <\/li>\n  <li>No prohibition on the sectoral activity of the merging Indian entity (FDI sectoral cap test).<\/li>\n  <li><strong>PN3 screening<\/strong> — check beneficial ownership for neighbouring-country exposure.<\/li>\n  <li>If parties are listed, SEBI LODR Reg. 37 prior approval required.<\/li>\n<\/ul>\n\n<h2>Phase 2 — Corporate law<\/h2>\n<ol>\n  <li>Board approvals in both companies.<\/li>\n  <li>Valuation report by an independent valuer (internationally recognised, where the foreign entity is involved).<\/li>\n  <li>NCLT petition under Sec 230–232 read with Sec 234 and Rule 25A.<\/li>\n  <li>Meetings of creditors and members (or dispensation order).<\/li>\n  <li>Sanction order from NCLT, with the scheme.<\/li>\n  <li>Filing with ROC; in case of outbound, also with the foreign-jurisdiction authority.<\/li>\n<\/ol>\n\n<h2>Phase 3 — FEMA (Cross Border Merger Regulations 2018)<\/h2>\n<ul>\n  <li><strong>Compliance certificate<\/strong> — by managing director / WTD / company secretary, certifying compliance with the regulations.<\/li>\n  <li><strong>For inbound<\/strong>: share issuance to non-resident shareholders → NDI Rules 2019 pricing → FC-GPR within 30 days.<\/li>\n  <li><strong>For outbound<\/strong>: Indian shareholders receive foreign company shares → ODI Rules 2022 → Form FC + APR.<\/li>\n  <li><strong>2-year window<\/strong>: dispose of or make compliant any non-FEMA-compliant asset, borrowing or guarantee that comes through the merger.<\/li>\n<\/ul>\n\n<h2>Phase 4 — Tax<\/h2>\n<ul>\n  <li><strong>Sec 47(via)<\/strong> — amalgamation of foreign co. into Indian co. (inbound): exempt if conditions met.<\/li>\n  <li><strong>Sec 47(vic)<\/strong> — demerger of foreign co.: exempt if conditions met.<\/li>\n  <li><strong>Sec 47(vicc)<\/strong> — amalgamation/demerger of two foreign cos. holding shares in Indian co.: exempt subject to ≥ 25% shareholder continuity in the new foreign holding.<\/li>\n  <li><strong>Sec 9(1)(i)<\/strong> — indirect transfer: even with corporate-law cross-border merger, the indirect-transfer charge can apply to gains on Indian assets unless Sec 47 carve-out applies.<\/li>\n  <li><strong>GAAR<\/strong> — substance test on the merger's business rationale.<\/li>\n<\/ul>\n\n<h2>Phase 5 — Other clearances<\/h2>\n<ul>\n  <li><strong>CCI approval<\/strong> if combination thresholds (Sec 5) crossed.<\/li>\n  <li><strong>SEBI<\/strong> for listed entities — Reg. 37 and Master Circular on Schemes.<\/li>\n  <li><strong>Sectoral regulator<\/strong> — RBI for banking/NBFC, IRDAI for insurance, etc.<\/li>\n  <li><strong>Foreign-jurisdiction filings<\/strong> — to be coordinated with foreign counsel.<\/li>\n<\/ul>\n\n<h2>Common pitfalls<\/h2>\n<ol>\n  <li>Treating FEMA compliance as \"to be done after NCLT\". The compliance certificate must be ready at NCLT-petition stage.<\/li>\n  <li>Forgetting PN3 — Chinese ultimate ownership through Mauritius/Singapore is the most common trap.<\/li>\n  <li>Inheriting overseas non-compliant ECBs through inbound merger; 2-year cleanup window can be tight.<\/li>\n  <li>Ignoring Sec 9(1)(i) indirect-transfer charge even when Sec 47 exemption applies to the merger itself.<\/li>\n<\/ol>\n", "slug": "cheat-cross-border-checklist"}, {"kind": "Cheat Sheet", "title": "Sec 50B Slump Sale — Tax Computation Flow", "summary": "Step-by-step from lump-sum consideration to taxable capital gain.", "body": "\n<h2>Pre-test — is it actually a \"slump sale\"?<\/h2>\n<p>Per Sec 2(42C), four ingredients must coexist:<\/p>\n<ol>\n  <li>Transfer of <strong>an undertaking<\/strong> — i.e., a unit or division capable of being carried on as a separate business.<\/li>\n  <li>By way of <strong>sale<\/strong> — not exchange, gift, or compulsory acquisition.<\/li>\n  <li>For a <strong>lump-sum consideration<\/strong> — no value assigned to individual assets.<\/li>\n  <li>Transfer is on a <strong>going-concern basis<\/strong>.<\/li>\n<\/ol>\n<p>Fail any one and Sec 50B does not apply. The transaction is then taxed as itemised sale —\nindividual asset-wise capital gains/business income.<\/p>\n\n<h2>Step 1 — Sale consideration<\/h2>\n<p>The lump-sum consideration received. From AY 2022–23, if the lump sum is less than FMV of the\nundertaking under <strong>Rule 11UAE<\/strong>, the higher value is deemed the sale consideration.<\/p>\n\n<h2>Step 2 — Compute net worth<\/h2>\n<blockquote>\n<strong>Net worth<\/strong> = aggregate value of total assets of the undertaking − value of liabilities,\nappearing in the books of account.\n<\/blockquote>\n<p>Adjustments to \"aggregate value of total assets\":<\/p>\n<ul>\n  <li><strong>Depreciable assets<\/strong> — WDV under Sec 43(6) of the block.<\/li>\n  <li><strong>Capital assets on which 100% deduction allowed<\/strong> under Sec 35AD — value taken as nil.<\/li>\n  <li><strong>Other assets<\/strong> — book value (no revaluation effect).<\/li>\n  <li><strong>Self-generated goodwill<\/strong> — explicitly excluded from net worth (post-FY 2020–21).<\/li>\n<\/ul>\n\n<h2>Step 3 — Capital gain<\/h2>\n<blockquote>\n<strong>Capital gain<\/strong> = Sale consideration (step 1) − Net worth (step 2)\n<\/blockquote>\n\n<h2>Step 4 — Long-term vs short-term<\/h2>\n<ul>\n  <li>If the undertaking is held for <strong>more than 36 months<\/strong> — long-term capital gain.<\/li>\n  <li>Otherwise — short-term.<\/li>\n  <li><strong>Critical:<\/strong> indexation benefit is <em>not<\/em> available for slump-sale long-term gain.<\/li>\n  <li>Long-term gain taxed at <strong>20% + surcharge + cess<\/strong>; short-term at the company's normal rate.<\/li>\n<\/ul>\n\n<h2>Step 5 — Compliance<\/h2>\n<ul>\n  <li><strong>Form 3CEA<\/strong> — report by an accountant indicating computation of net worth — to be filed before the due date of return.<\/li>\n  <li>Disclosure in the return of income.<\/li>\n  <li>Where the transferee is a non-resident, Sec 50CA + Sec 56(2)(x) overlay may apply on the share-side if shares are part-consideration.<\/li>\n<\/ul>\n\n<h2>Worked example<\/h2>\n<table>\n  <thead><tr><th>Item<\/th><th>Amount (₹ cr)<\/th><\/tr><\/thead>\n  <tbody>\n    <tr><td>Lump-sum consideration received<\/td><td>500<\/td><\/tr>\n    <tr><td>FMV under Rule 11UAE<\/td><td>460<\/td><\/tr>\n    <tr><td>Sale consideration (higher)<\/td><td><strong>500<\/strong><\/td><\/tr>\n    <tr><td>Aggregate book value of assets<\/td><td>700<\/td><\/tr>\n    <tr><td>Less: Liabilities<\/td><td>400<\/td><\/tr>\n    <tr><td>Net worth<\/td><td><strong>300<\/strong><\/td><\/tr>\n    <tr><td>Capital gain (long-term)<\/td><td><strong>200<\/strong><\/td><\/tr>\n    <tr><td>Tax @ 20% + surcharge/cess (~23.3%)<\/td><td><strong>~46.6<\/strong><\/td><\/tr>\n  <\/tbody>\n<\/table>\n\n<div class=\"callout\">\n<strong>Watch for.<\/strong> If self-generated goodwill or revalued assets sit in the balance sheet,\nthey don't count in net worth. The net worth will be lower than the carrying balance-sheet number,\nand the taxable gain higher. Reconcile before pricing the transaction.\n<\/div>\n", "slug": "cheat-slump-sale-flow"}, {"kind": "Cheat Sheet", "title": "Sec 68 Buyback — Procedure Step-by-Step", "summary": "Limits, sources, voting, filings — and the October 2024 tax shift.", "body": "\n<h2>Step 1 — Eligibility & limits<\/h2>\n<ul>\n  <li>Articles must authorise the buyback.<\/li>\n  <li>Authorised by board resolution alone if buyback ≤ <strong>10%<\/strong> of paid-up equity + free reserves.<\/li>\n  <li>Special resolution required if &gt; 10% but ≤ <strong>25%<\/strong> of paid-up equity + free reserves.<\/li>\n  <li>Within the 25% cap, equity-share buyback in an FY cannot exceed 25% of total paid-up equity capital.<\/li>\n  <li>Debt-to-equity ratio post-buyback ≤ <strong>2:1<\/strong>.<\/li>\n  <li>Minimum <strong>1 year gap<\/strong> between two buybacks (Sec 68(2)(d)).<\/li>\n  <li>All shares to be bought back must be <strong>fully paid up<\/strong>.<\/li>\n<\/ul>\n\n<h2>Step 2 — Sources of funds (Sec 68(1))<\/h2>\n<ul>\n  <li>Free reserves.<\/li>\n  <li>Securities premium account.<\/li>\n  <li>Proceeds of fresh issue of <em>different<\/em> kind of shares/securities.<\/li>\n  <li>Not permissible: proceeds of an earlier issue of the same kind of shares.<\/li>\n<\/ul>\n\n<h2>Step 3 — Procedure<\/h2>\n<ol>\n  <li>Board meeting — approve buyback; appoint merchant banker (if listed) or determine method (if unlisted).<\/li>\n  <li>If special resolution required → notice + EGM/AGM.<\/li>\n  <li>Declaration of solvency (Form SH-9) — signed by ≥ 2 directors including MD; states that the company is capable of meeting its liabilities post-buyback.<\/li>\n  <li>For listed company: public announcement; SEBI Buyback Regulations 2018 procedure.<\/li>\n  <li>For unlisted company: offer letter to shareholders (Form SH-8); time for acceptance not less than 15 and not more than 30 days.<\/li>\n  <li>Open separate bank account; pay consideration only out of that account.<\/li>\n  <li>Extinguish certificates of shares within 7 days of buyback.<\/li>\n  <li>File Form SH-11 (return of buyback) with ROC within 30 days of completion.<\/li>\n  <li>Maintain register of shares bought back in Form SH-10.<\/li>\n<\/ol>\n\n<h2>Step 4 — Tax (post-1 October 2024)<\/h2>\n\n<table>\n  <thead><tr><th>Period<\/th><th>Tax in company<\/th><th>Tax in shareholder<\/th><\/tr><\/thead>\n  <tbody>\n    <tr>\n      <td>Up to 30 Sep 2024<\/td>\n      <td>20% buyback tax under Sec 115QA (+ surcharge & cess)<\/td>\n      <td>Exempt under Sec 10(34A)<\/td>\n    <\/tr>\n    <tr>\n      <td>1 Oct 2024 onwards<\/td>\n      <td>No buyback tax<\/td>\n      <td>Buyback consideration taxed as <strong>deemed dividend under Sec 2(22)<\/strong>; TDS under Sec 194; slab rate applies<\/td>\n    <\/tr>\n  <\/tbody>\n<\/table>\n\n<div class=\"callout\">\n<strong>Post-October 2024 economics.<\/strong> Buyback as a cash-return mechanism is now generally\ninferior to dividend for non-promoter shareholders (no rate differential), and broadly equivalent for\npromoter shareholders (slab rate either way). The case for buyback now rests on signalling, EPS\nmechanics, and the capital-loss available on extinguishment of shares — not on tax savings.\n<\/div>\n\n<h2>SEBI Buyback Regulations 2018 (for listed companies)<\/h2>\n<ul>\n  <li>Two routes: <strong>tender offer<\/strong> (open to all shareholders, proportionate acceptance) or <strong>open market<\/strong> (stock exchange or book-building).<\/li>\n  <li>Reservation for small shareholders (15%) in tender offers.<\/li>\n  <li>Maximum buyback price disclosed up-front.<\/li>\n  <li>Cooling period and reporting framework.<\/li>\n<\/ul>\n\n<h2>Common pitfalls<\/h2>\n<ol>\n  <li>Promoter cannot use buyback proceeds to subscribe to a fresh issue of the same kind of shares — circular flow prohibited.<\/li>\n  <li>Buyback cannot be funded by borrowed money (only free reserves / SP / fresh issue of different securities).<\/li>\n  <li>Post-buyback debt-equity ratio breach — board must verify projected balance sheet, not just historical.<\/li>\n  <li>Open-offer trigger under SAST if promoter's percentage increases beyond 25% post-buyback (creeping acquisition).<\/li>\n<\/ol>\n", "slug": "cheat-buyback-procedure"}, {"kind": "Case Digest", "title": "Marshall Sons & Co. (India) Ltd. v. ITO (1997)", "summary": "The appointed date in a sanctioned scheme is binding — even though the court order comes much later.", "body": "\n<h4>Citation<\/h4>\n<p>(1997) 223 ITR 809 (SC)<\/p>\n\n<h4>Court<\/h4>\n<p>Supreme Court of India.<\/p>\n\n<h4>The point of law<\/h4>\n<p>Whether the amalgamation under a court-sanctioned scheme is effective from the date specified\nin the scheme (the \"appointed date\") or from the date the court order is filed with the ROC.<\/p>\n\n<h4>The facts<\/h4>\n<p>A scheme of amalgamation specified an appointed date of 1 January 1982. The High Court sanctioned\nthe scheme much later. The Income-tax Officer attempted to assess the amalgamating company for the\nperiod between the appointed date and the order date, treating the amalgamating company as a\nseparate taxable entity for that interim period.<\/p>\n\n<h4>The holding<\/h4>\n<blockquote>\n\"Every scheme of amalgamation has to necessarily provide a date with effect from which the\namalgamation shall take place. […] Once the court sanctions the scheme, the amalgamation takes\neffect from the date specified in the scheme, even though the court's sanction comes much later.\"\n<\/blockquote>\n<p>The appointed date is binding on the tax authorities. From the appointed date, the amalgamating\ncompany ceases to exist as a separate taxable entity; income arising from its business thereafter\nis the income of the amalgamated company.<\/p>\n\n<h4>Why it matters<\/h4>\n<ul>\n  <li>This is the foundational case on the appointed date doctrine. Every scheme of arrangement —\n      amalgamation, demerger, slump exchange — operates on a backdated effectiveness premise,\n      and tax authorities cannot ignore it.<\/li>\n  <li>The case has been applied across statutes — for income-tax, sales tax, VAT and GST treatment\n      of the interim period.<\/li>\n  <li>However, MCA's August 2019 circular limits how far back the appointed date can be — generally\n      not more than 12 months prior to filing — to prevent abuse.<\/li>\n<\/ul>\n\n<div class=\"callout\">\n<strong>Practice point.<\/strong> Where the appointed date precedes the order date by &gt; 1 year,\nthe company should file: (a) consolidated/combined return for the post-appointed-date period in the\namalgamated company's name, (b) revised return for any earlier filings made in the amalgamating\ncompany's name. The CBDT has issued circulars facilitating this; ensure compliance with the\nmechanical reconciliation.\n<\/div>\n", "slug": "case-marshall-sons"}, {"kind": "Case Digest", "title": "Saraswati Industrial Syndicate Ltd. v. CIT (1990)", "summary": "On amalgamation, the amalgamating company ceases to exist; the amalgamated company is its successor for tax purposes.", "body": "\n<h4>Citation<\/h4>\n<p>(1990) 186 ITR 278 (SC)<\/p>\n\n<h4>Court<\/h4>\n<p>Supreme Court of India.<\/p>\n\n<h4>The point of law<\/h4>\n<p>What is the legal effect of amalgamation on the identity of the amalgamating company, and the\ntax assessment of post-amalgamation events?<\/p>\n\n<h4>The holding<\/h4>\n<blockquote>\n\"When two companies amalgamate and merge into one, the transferor company loses its entity as it\nceases to have its business. However, their respective rights or liabilities are determined under\nthe scheme of amalgamation, but the corporate entity of the transferor company ceases to exist with\neffect from the date the amalgamation is made effective.\"\n<\/blockquote>\n\n<h4>Why it matters<\/h4>\n<ul>\n  <li>Establishes that the amalgamated company is the <strong>successor<\/strong> of the amalgamating\n      company for all purposes — assets, liabilities, pending proceedings, statutory licences.<\/li>\n  <li>Pending tax assessments of the amalgamating company become assessments of the amalgamated\n      company. Notices must be served on the amalgamated company; notices in the amalgamating\n      company's name post-amalgamation are void (the celebrated <em>Spice Entertainment<\/em> and\n      <em>Maruti Suzuki India Ltd.<\/em> line follows this principle).<\/li>\n  <li>The carry-forward of losses under Sec 72A flows from this — the amalgamated company \"steps\n      into the shoes\" of the amalgamating company.<\/li>\n<\/ul>\n\n<h4>Subsequent application<\/h4>\n<p>This principle was reaffirmed and extended in <strong>PCIT v. Maruti Suzuki India Ltd. (2019) 416\nITR 613 (SC)<\/strong> — a tax assessment order issued in the name of the non-existent amalgamating\ncompany is a nullity, even if the amalgamated company participates in proceedings. Tax officers must\nupdate their records on receiving intimation of amalgamation.<\/p>\n", "slug": "case-saraswati-industrial-syndicate"}, {"kind": "Case Digest", "title": "Anarkali Sarabhai v. CIT (1997)", "summary": "Capital reduction with payment to shareholders is taxable as dividend to the extent of accumulated profits.", "body": "\n<h4>Citation<\/h4>\n<p>(1997) 224 ITR 422 (SC)<\/p>\n\n<h4>Court<\/h4>\n<p>Supreme Court of India.<\/p>\n\n<h4>The point of law<\/h4>\n<p>Is the amount received by a shareholder on reduction of share capital under Sec 66 (then Sec 100\nof the Companies Act 1956) a capital receipt — or a deemed dividend under Sec 2(22)(d) of the\nIncome-tax Act?<\/p>\n\n<h4>The facts<\/h4>\n<p>The shareholder received a substantial sum from the company on a court-sanctioned reduction of\nthe share capital. The company had significant accumulated profits. The Revenue argued the receipt\nwas a deemed dividend under Sec 2(22)(d) to the extent of the accumulated profits.<\/p>\n\n<h4>The holding<\/h4>\n<blockquote>\n\"Any distribution by the company on the reduction of its capital is, to the extent to which the\ncompany possesses accumulated profits, a deemed dividend, whether capitalised or not, in the hands\nof the recipient shareholder.\"\n<\/blockquote>\n\n<p>Mechanics:<\/p>\n<ul>\n  <li>Distribution ≤ accumulated profits → deemed dividend.<\/li>\n  <li>Distribution &gt; accumulated profits → balance is return of capital; reduces cost of acquisition.<\/li>\n<\/ul>\n\n<h4>Why it matters<\/h4>\n<ul>\n  <li>Every capital reduction in a profitable company must now be analysed through this lens.<\/li>\n  <li>Companies sometimes structure capital reductions believing them tax-neutral — they are\n      <em>not<\/em>, to the extent of accumulated profits.<\/li>\n  <li>Post-April 2020 (dividend taxation regime change), the deemed dividend is taxed at the\n      shareholder's slab rate; the older DDT regime no longer applies.<\/li>\n<\/ul>\n\n<div class=\"callout\">\n<strong>Planning note.<\/strong> If the goal is to return surplus to shareholders without a dividend\ncharge, a buyback under Sec 68 was traditionally preferred — but post-October 2024 the same\nshareholder-level deemed-dividend treatment now applies to buyback too. Capital reduction and\nbuyback are now broadly tax-equivalent for distribution-to-shareholder purposes.\n<\/div>\n", "slug": "case-anarkali-sarabhai"}, {"kind": "Case Digest", "title": "McDowell & Co. Ltd. v. CTO (1985)", "summary": "The colourable-device doctrine — tax planning that lacks commercial substance is not legitimate.", "body": "\n<h4>Citation<\/h4>\n<p>(1985) 154 ITR 148 (SC)<\/p>\n\n<h4>Court<\/h4>\n<p>Supreme Court of India.<\/p>\n\n<h4>The point of law<\/h4>\n<p>Is artificial tax planning, designed to avoid liability through colourable means rather than\ngenuine commercial transactions, permissible under Indian tax law?<\/p>\n\n<h4>The holding<\/h4>\n<blockquote>\n\"Tax planning may be legitimate provided it is within the framework of the law. Colourable devices\ncannot be part of tax planning and it is wrong to encourage or entertain the belief that it is\nhonourable to avoid the payment of tax by resorting to dubious methods.\"\n<\/blockquote>\n\n<h4>Why it matters in restructuring<\/h4>\n<ul>\n  <li>Every scheme of arrangement that is designed primarily for tax savings, with little or no\n      commercial rationale, can be tested against McDowell.<\/li>\n  <li>Recurring use: schemes that \"move\" losses to a profit-making group company purely to set them\n      off; or schemes that exploit the appointed-date doctrine to backdate income/loss recognition.<\/li>\n  <li>The doctrine has been refined in <strong>Union of India v. Azadi Bachao Andolan (2003) 263 ITR\n      706 (SC)<\/strong> and <strong>Vodafone International Holdings v. Union of India (2012) 341 ITR 1\n      (SC)<\/strong> — the Court drew a line between \"tax planning\" (permissible) and \"tax avoidance\"\n      (impermissible), with the substance-over-form test.<\/li>\n<\/ul>\n\n<h4>The GAAR overlay (post-2017)<\/h4>\n<p>Chapter X-A of the Income-tax Act 1961 — the General Anti-Avoidance Rule — codifies the\nMcDowell substance-over-form principle. An \"impermissible avoidance arrangement\" with the main\npurpose of obtaining a tax benefit can be re-characterised, and tax benefits denied. Restructuring\nschemes must therefore demonstrate <em>commercial substance<\/em>, not just legal form.<\/p>\n\n<div class=\"callout\">\n<strong>Documentation discipline.<\/strong> Every scheme should have a contemporaneous board paper\narticulating the commercial rationale — synergies, focus, regulatory, succession. The board paper\nis the first thing GAAR officers ask for. A scheme with only tax savings on the rationale slide\nis GAAR bait.\n<\/div>\n", "slug": "case-mcdowell"}, {"kind": "Case Digest", "title": "Vodafone International Holdings BV v. Union of India (2012)", "summary": "Indirect transfer of Indian assets through offshore share sale was not taxable in India under the pre-amendment law.", "body": "\n<h4>Citation<\/h4>\n<p>(2012) 341 ITR 1 (SC)<\/p>\n\n<h4>Court<\/h4>\n<p>Supreme Court of India.<\/p>\n\n<h4>The facts<\/h4>\n<p>In 2007, Vodafone (a Netherlands-incorporated entity) acquired Hutchison's stake in Hutchison Essar\n(an Indian telecom operator) through the acquisition of shares of CGP Investments — a Cayman Islands\nholding company that ultimately held the Indian operating company. The Indian tax department issued\na withholding-tax demand of ~₹11,000 crore, treating the transaction as a transfer of Indian assets.<\/p>\n\n<h4>The holding<\/h4>\n<blockquote>\n\"The sale of CGP shares by HTIL to Vodafone has been wrongly characterised by the Department as the\nsale of underlying Indian assets. The transaction was a bona fide structured FDI investment into\nIndia … not taxable in India under the law as it stood at the relevant time.\"\n<\/blockquote>\n<p>The Court held that:<\/p>\n<ul>\n  <li>Sec 9 (deemed Indian income) as it stood did not extend to <em>indirect<\/em> transfers of Indian assets.<\/li>\n  <li>Form (offshore share sale) prevailed over substance — provided there was genuine commercial substance and the offshore structure was not a sham.<\/li>\n  <li>Withholding under Sec 195 cannot apply where the income itself is not chargeable in India.<\/li>\n<\/ul>\n\n<h4>The legislative reaction<\/h4>\n<p>Parliament responded with the <strong>Finance Act 2012<\/strong> introducing <strong>retrospective\namendments<\/strong> to Sec 9(1)(i) and Sec 195, expressly bringing indirect transfers of shares deriving\ntheir value <em>substantially<\/em> from Indian assets within the Indian tax net. The retrospective\nnature triggered international criticism and bilateral disputes; eventually, in <strong>August 2021<\/strong>,\nthe retrospective application was withdrawn via the Taxation Laws (Amendment) Act 2021.<\/p>\n\n<h4>Why it matters in restructuring<\/h4>\n<ul>\n  <li>Cross-border restructurings involving Indian assets must always check Sec 9(1)(i) indirect-transfer\n      applicability. The threshold: target derives ≥ 50% of value from Indian assets and the value of\n      Indian assets exceeds ₹10 crore.<\/li>\n  <li>Genuine commercial-substance documentation is the best defence under GAAR + Sec 9(1)(i).<\/li>\n  <li>For inbound cross-border mergers under Sec 234, Sec 47(via)/(vic)/(vicc) exemptions must be\n      independently met — they are not a default carve-out from indirect-transfer.<\/li>\n<\/ul>\n", "slug": "case-vodafone"}, {"kind": "Case Digest", "title": "Miheer H. Mafatlal v. Mafatlal Industries Ltd. (1996)", "summary": "The court's role in sanctioning a scheme is supervisory, not appellate — it does not substitute its commercial judgment.", "body": "\n<h4>Citation<\/h4>\n<p>(1996) 87 Comp Cas 792 (SC)<\/p>\n\n<h4>Court<\/h4>\n<p>Supreme Court of India.<\/p>\n\n<h4>The point of law<\/h4>\n<p>What is the scope of a court's jurisdiction when sanctioning a scheme of arrangement under\nSec 391 of the Companies Act 1956 (now Sec 230–232 of the 2013 Act)? Should the court enquire\ninto the commercial merit, fairness of share exchange ratio, etc.?<\/p>\n\n<h4>The holding — the seven-fold test<\/h4>\n<p>The Court laid down the principles guiding judicial review of schemes:<\/p>\n<ol>\n  <li>Statutory procedure followed and meetings duly held.<\/li>\n  <li>The scheme is backed by the requisite statutory majority — ≥ 3/4 in value.<\/li>\n  <li>Concerned meetings are representative of the class.<\/li>\n  <li>No coercion or fraud; majority decides bona fide for the class.<\/li>\n  <li>The scheme is not violative of any law and is not contrary to public policy.<\/li>\n  <li>All material facts have been disclosed.<\/li>\n  <li>The scheme is not unconscionable; it is one which a reasonable shareholder would approve.<\/li>\n<\/ol>\n\n<blockquote>\n\"The court does not sit as a court of appeal over the commercial wisdom of the parties; it does not\nsubstitute its own judgment for the commercial judgment of those who voted in favour.\"\n<\/blockquote>\n\n<h4>Why it matters<\/h4>\n<ul>\n  <li>The Miheer Mafatlal principles are now the standard NCLT applies when sanctioning schemes\n      under Sec 232.<\/li>\n  <li>Objections to a scheme that merely argue \"the exchange ratio is unfair\" rarely succeed if\n      (a) the ratio was approved by the statutory majority, and (b) there is a valuation report by\n      an independent valuer.<\/li>\n  <li>Where objections allege oppression of minority, non-disclosure, or violation of law, the NCLT\n      has full power to remand or reject.<\/li>\n<\/ul>\n\n<h4>Subsequent development<\/h4>\n<p>The principles were applied in <strong>Hindustan Lever Employees' Union v. Hindustan Lever Ltd.\n(1995) 83 Comp Cas 30 (SC)<\/strong> — employee welfare considerations within a scheme — and\n<strong>Wood Polymer Ltd., In re (1977) 47 Comp Cas 597 (Guj)<\/strong> — the leading early case on\ncourt's discretion.<\/p>\n", "slug": "case-miheer-mafatlal"}, {"kind": "Case Digest", "title": "Hindustan Lever Employees' Union v. HLL (1995)", "summary": "Employee interests can be raised before the court but rarely override majority approval if the scheme is otherwise fair.", "body": "\n<h4>Citation<\/h4>\n<p>(1995) 83 Comp Cas 30 (SC)<\/p>\n\n<h4>Court<\/h4>\n<p>Supreme Court of India.<\/p>\n\n<h4>The point of law<\/h4>\n<p>Can employees of a company affected by a scheme of amalgamation challenge the scheme on grounds\nof employee interest, even when the statutory majorities of shareholders and creditors have approved\nit?<\/p>\n\n<h4>The holding<\/h4>\n<p>The Supreme Court held that <em>employees are not a \"class\"<\/em> within Sec 391/394 of the\nCompanies Act 1956 (now Sec 230 of 2013), and therefore do not have a statutory right to a meeting\nof their own. However, the court may consider representations from employees as part of the broader\npublic-interest enquiry under Sec 394(1) (proviso).<\/p>\n\n<p>In the specific case, the scheme involved the merger of TOMCO into HLL. The Union challenged on\ngrounds of (a) likely lay-offs, (b) loss of bargaining position. The Court found that:<\/p>\n<ul>\n  <li>The scheme expressly preserved employment terms.<\/li>\n  <li>The majority of shareholders had approved with full disclosure.<\/li>\n  <li>There was no evidence of mala fides.<\/li>\n<\/ul>\n<p>The scheme was sanctioned.<\/p>\n\n<h4>Why it matters<\/h4>\n<ul>\n  <li>The case settles that employees are not entitled to vote on a scheme — they cannot block it.<\/li>\n  <li>However, schemes that <em>retrench employees<\/em>, change service conditions, or do not\n      preserve continuity-of-service are vulnerable to objections.<\/li>\n  <li>Standard scheme practice now includes <strong>express preservation of employment terms<\/strong>\n      — \"employees of the transferor shall continue to be employed by the transferee on the same\n      terms and conditions of service\".<\/li>\n<\/ul>\n", "slug": "case-hindustan-lever"}, {"kind": "Case Digest", "title": "CoC of Essar Steel India Ltd. v. Satish Kumar Gupta (2019)", "summary": "The 'clean slate' doctrine — once a resolution plan is approved, all undisclosed past liabilities are extinguished.", "body": "\n<h4>Citation<\/h4>\n<p>(2020) 8 SCC 531<\/p>\n\n<h4>Court<\/h4>\n<p>Supreme Court of India.<\/p>\n\n<h4>The facts<\/h4>\n<p>ArcelorMittal's resolution plan for Essar Steel was approved by NCLT after a prolonged contest\nwith operational creditors who claimed they were paid disproportionately less than financial\ncreditors. Multiple appeals reached the Supreme Court on (a) the CoC's commercial wisdom, (b)\ntreatment of operational creditors vs financial creditors, (c) the binding effect of the approved\nplan on undisclosed past dues.<\/p>\n\n<h4>The holding<\/h4>\n<p>The Court laid down two foundational principles:<\/p>\n\n<h4>1. Primacy of CoC's commercial wisdom<\/h4>\n<blockquote>\n\"The CoC's commercial wisdom is non-justiciable except on the grounds set out in Section 30(2) of\nthe Code. Courts will not interfere with the CoC's commercial decisions on whether a particular\nresolution plan is the best one.\"\n<\/blockquote>\n\n<h4>2. The clean-slate doctrine<\/h4>\n<blockquote>\n\"On the date of approval of the resolution plan by the Adjudicating Authority, all such claims, which\nare not part of the resolution plan, shall stand extinguished … No person shall be entitled to\ninitiate or continue any proceedings in respect to a claim which is not part of the resolution plan.\"\n<\/blockquote>\n\n<p>This was further codified by the 2019 amendment to <strong>Sec 31 of the IBC<\/strong>, expressly\nstating that the approved plan binds all stakeholders including the Central / State Government and\nany local authority.<\/p>\n\n<h4>Why it matters in restructuring<\/h4>\n<ul>\n  <li>The IBC resolution-plan route is now the only mechanism in Indian law that provides a\n      <strong>true clean slate<\/strong> — including against statutory and tax authorities.<\/li>\n  <li>For a successful resolution applicant, even unknown contingent liabilities and undisclosed\n      tax demands of past periods are extinguished — this is uniquely valuable when acquiring a\n      distressed business with messy historical records.<\/li>\n  <li>The principle has been extended in subsequent cases (<em>Ghanashyam Mishra and Sons v.\n      Edelweiss ARC<\/em>, <em>RPS Infrastructure v. Mukul Kumar<\/em>) — statutory dues not part of\n      the approved plan are also extinguished.<\/li>\n<\/ul>\n\n<div class=\"callout\">\n<strong>M&A planning point.<\/strong> A buyer evaluating a distressed target should compare a Sec 230\nscheme route with the IBC resolution-plan route on this dimension alone. The clean-slate advantage\nof the IBC route is often worth the procedural overhead.\n<\/div>\n", "slug": "case-essar-steel"}, {"kind": "Case Digest", "title": "PCIT v. Maruti Suzuki India Ltd. (2019)", "summary": "A tax assessment order issued in the name of a non-existent (amalgamated-away) entity is a nullity.", "body": "\n<h4>Citation<\/h4>\n<p>(2019) 416 ITR 613 (SC)<\/p>\n\n<h4>Court<\/h4>\n<p>Supreme Court of India.<\/p>\n\n<h4>The facts<\/h4>\n<p>Maruti Suzuki India Ltd. was the successor to Suzuki Powertrain India Ltd. (SPIL) following an\namalgamation effective 1 April 2012. The amalgamation was duly intimated to the Assessing Officer\nin March 2013. Despite this, the AO issued the assessment order in the name of SPIL — a non-existent\nentity at that date.<\/p>\n\n<h4>The holding<\/h4>\n<blockquote>\n\"Once the amalgamating entity ceases to exist, no notice or order in its name can be valid. The\namalgamated entity is the successor for all purposes, and proceedings must be conducted against\nit … An assessment order in the name of a non-existent entity is a nullity. Mere participation by\nthe successor in the proceedings cannot cure the jurisdictional defect.\"\n<\/blockquote>\n\n<h4>Why it matters<\/h4>\n<ul>\n  <li>This is the standard authority cited when tax notices/orders are received in the name of the\n      amalgamating company post-merger.<\/li>\n  <li>The principle protects taxpayers from delays and confusion when the tax department fails to\n      update its records.<\/li>\n  <li>However, the inverse is also true — the taxpayer must intimate the amalgamation. Failure to\n      do so leaves the taxpayer exposed.<\/li>\n<\/ul>\n\n<h4>Compliance protocol on amalgamation<\/h4>\n<ol>\n  <li>Within 30 days of the effective date — written intimation to the jurisdictional AO of both\n      transferor and transferee, with a copy of the NCLT order and the certified scheme.<\/li>\n  <li>PAN cancellation request for the transferor (Form 49A).<\/li>\n  <li>Update tax-deductor records (TAN intimations, TDS returns).<\/li>\n  <li>Update GST registrations; transfer ITC via Form GST ITC-02.<\/li>\n  <li>Update bank, vendor, customer records — operational, not statutory, but essential.<\/li>\n<\/ol>\n\n<div class=\"callout\">\n<strong>Note.<\/strong> The <em>Mahagun Realtors<\/em> case (2022) — also a Supreme Court decision —\nappears to dilute Maruti Suzuki in cases where the assessment is \"substantive\" and the successor\nparticipated without objection. Tax-law practice continues to apply Maruti Suzuki as the default,\nwith Mahagun Realtors as the narrow exception. Always object to jurisdictional defects at the\nearliest opportunity.\n<\/div>\n", "slug": "case-maruti-suzuki"}, {"kind": "Case Digest", "title": "Union of India v. Azadi Bachao Andolan (2003)", "summary": "Treaty benefits are available based on form, provided there is no sham; refined the McDowell doctrine.", "body": "\n<h4>Citation<\/h4>\n<p>(2003) 263 ITR 706 (SC)<\/p>\n\n<h4>Court<\/h4>\n<p>Supreme Court of India.<\/p>\n\n<h4>The point of law<\/h4>\n<p>Are treaty benefits under the India-Mauritius DTAA available to investors who are tax-resident in\nMauritius purely by virtue of incorporation, even if they have no significant commercial substance\nin Mauritius? Does McDowell's anti-avoidance principle override the treaty form?<\/p>\n\n<h4>The holding<\/h4>\n<blockquote>\n\"Tax planning may be legitimate provided it is within the framework of the law. The Mauritius\nTax Residency Certificate is sufficient evidence of treaty residence. Treaty shopping is not\nillegitimate per se, and the Mauritius route, used widely for FDI into India, is consistent with\nboth Indian law and international practice.\"\n<\/blockquote>\n\n<p>The Court drew a distinction:<\/p>\n<ul>\n  <li><strong>Tax planning<\/strong> — arranging affairs within the framework of the law — permissible.<\/li>\n  <li><strong>Tax avoidance<\/strong> — colourable devices, sham transactions — impermissible.<\/li>\n<\/ul>\n\n<h4>Why it matters in restructuring<\/h4>\n<ul>\n  <li>Many Indian M&A structures involve Mauritius or Singapore holding companies. Azadi Bachao\n      validated their use for nearly two decades.<\/li>\n  <li>The position has been modified by (a) <strong>2017 protocol<\/strong> to the India-Mauritius DTAA\n      withdrawing the capital-gains exemption phased over 2017–2019, (b) the introduction of GAAR\n      (Chapter X-A) effective April 2017, (c) the Multilateral Instrument (MLI) and Principal\n      Purpose Test (PPT) effective from April 2020.<\/li>\n  <li>Today, the substance test is more robust — but the underlying recognition of legitimate\n      tax planning survives.<\/li>\n<\/ul>\n\n<div class=\"callout\">\n<strong>Current position.<\/strong> Treaty benefits in cross-border restructuring require a\ncombination of (i) valid TRC, (ii) commercial substance in the treaty jurisdiction, (iii) passing\nthe PPT under the MLI, and (iv) GAAR-compliance. Pure paper structures are no longer viable. But\ngenuine treaty-residency-based planning remains permissible.\n<\/div>\n", "slug": "case-azadi-bachao"}], "matrix": {"columns": ["Companies Act 2013", "Income-tax (1961 / 2025)", "FEMA", "SEBI / Stamp", "Competition / GST / Other"], "rows": [["Merger / Amalgamation", "Sec 230–232; CAA Rules 2016; appointed date logic", "Sec 2(1B); 47(vi)/(vii); 49(2); 72A loss CF; 56(2)(x)", "Domestic — N/A unless inbound", "LODR Reg. 37 if listed; State stamp on the order", "Ind AS 103; Sec 87 GST transferee liability; Sec 18 ITC transfer"], ["Demerger / Spin-off", "Sec 230–232; appointed date + going concern conditions", "Sec 2(19AA) five conditions; 47(vib)/(vid); 49(2C)/(2D); 72A(4)", "Generally N/A", "LODR Reg. 37; SEBI Master Circular on schemes; State stamp", "Pro-rata ITC transfer u/s 18 GST; Ind AS 103 acquirer test"], ["Slump Sale (BTA)", "Sec 180(1)(a) member approval if substantial undertaking", "Sec 50B + Sec 2(42C); Rule 11UAE FMV; Sec 50CA + 56(2)(x)", "NDI Rules if foreign buyer; pricing guidelines", "BTA stamp (State-specific); SAST 3/4 if change of control", "GST — supply as a going concern is exempt; ITC transfer u/s 18(3)"], ["Buyback", "Sec 68–70; SH-7 / SH-9 filings; Sec 67 prohibition", "Sec 115QA — note Oct 2024 shift to shareholder-level taxation", "NDI Rules pricing & reporting for non-resident shareholders", "SEBI Buyback Regs 2018 if listed; stamp on share certificates", "No GST; check FDI sectoral cap before tender route"], ["Capital Reduction", "Sec 66; NCLT approval; creditor protection", "Sec 2(22)(d) deemed dividend; capital gains; Anarkali Sarabhai", "NDI Rules + pricing if non-resident shareholders involved", "LODR if listed; stamp varies by State on NCLT order", "Ind AS — equity adjustment; no GST"], ["Cross-border Merger", "Sec 234; Rule 25A; notified jurisdictions only", "Sec 47(via)/(vic)/(vicc); Sec 9(1)(i) indirect transfer; GAAR", "FEMA (Cross Border Merger) Regs 2018; deemed RBI approval; 2-yr window", "NDI pricing on share issue; State stamp; SEBI if listed", "PN3 security clearance if neighbouring country; CCI thresholds"], ["Fast-track Merger (Sec 233)", "Sec 233 + Rule 25 — small co. / WOS / holding-sub; RD/ROC route", "Same as regular merger — Sec 2(1B) & Sec 47 apply", "Now extended to inbound cross-border (MCA notif. Sept 2024)", "Stamp same as regular scheme; SEBI N/A if unlisted", "Faster — no NCLT; CCI still applies if thresholds met"]]}, "books": [{"title": "Mergers et al — Issues, Implications and Case Law in Corporate Restructuring", "author": "S. Ramanujam", "publisher": "LexisNexis · 5th Edition · 2025", "priority": "Essential — buy first", "why": "The desk reference most senior CAs keep. Strongest on case-law analysis and pre/post-scheme secretarial detail. The 5th edition covers reverse-flip strategy, 2025 IBC case law, and recent Bombay/Delhi stamp duty rulings on schemes."}, {"title": "Master Guide to Mergers and Acquisitions in India — Tax & Regulatory", "author": "Ernst & Young LLP", "publisher": "Taxmann / LexisNexis · check latest edition", "priority": "Essential — tax lens", "why": "The book for tax structuring. Covers every mode — amalgamation, slump sale, demerger, hive-off, buyback, capital reduction — with flowcharts, tax due diligence, GAAR analysis and cross-border considerations. Verify the latest edition is current with Finance Act 2025."}, {"title": "Mergers, Acquisitions & Corporate Restructuring — Strategies & Practices", "author": "Dr. Rabi Narayan Kar & Dr. Minakshi", "publisher": "Taxmann · 4th Edition · October 2025", "priority": "Strategic foundation", "why": "More academic than Ramanujam, but the latest edition is current on the Companies Act, SEBI Takeover Code, Competition Act and IBC. Best for the 'why and when' of choosing a restructuring route."}, {"title": "Corporate Restructuring — Law and Practice", "author": "K.R. Sampath", "publisher": "Snow White Publications", "priority": "Drafting templates", "why": "The practitioner's drafting bible. Model schemes of amalgamation, demerger, slump sale agreements, capital reduction petitions, secretarial drafts. Less analytical, very template-driven. Pairs well with Ramanujam."}, {"title": "Guide to the Companies Act", "author": "A. Ramaiya", "publisher": "LexisNexis · 2-volume set", "priority": "Section-by-section reference", "why": "Stable, exhaustive commentary on Sections 230–240, 66, 68 and the CAA Rules. You don't read it cover-to-cover — you look up sections. Every CA office should have a copy."}, {"title": "FEMA Manual — with Cross Border Merger Regulations", "author": "Taxmann editorial", "publisher": "Taxmann · annual edition", "priority": "For weeks 9–10", "why": "Bare act + RBI Master Directions + Cross Border Merger Regulations 2018 + NDI/ODI rules with commentary. Indispensable for the FEMA piece — no other book consolidates these as cleanly."}, {"title": "The Law and Practice of Income Tax", "author": "Kanga, Palkhivala & Vyas", "publisher": "LexisNexis", "priority": "Underlying tax law", "why": "The gold standard for the underlying capital gains, Section 47/49/72A analysis and judicial interpretation. Vinod Singhania's Direct Taxes Law & Practice (Taxmann) is the lighter, more affordable alternative."}], "sources": [{"name": "MCA — Acts & Rules e-Book Portal", "type": "Primary regulator", "url": "https://www.mca.gov.in/content/mca/global/en/acts-rules/ebooks.html", "description": "Companies Act 2013, CAA Rules 2016, NCLT Rules 2016 with amendment history. Source of truth for Sections 230–240."}, {"name": "MCA — Notifications & Circulars", "type": "Primary regulator", "url": "https://www.mca.gov.in/content/mca/global/en/acts-rules/ebooks/notifications.html", "description": "Section 233 fast-track extensions and Section 234 notified-jurisdiction updates are published here."}, {"name": "NCLT — Date-wise Orders", "type": "Tribunal orders", "url": "https://nclt.gov.in/order-judgement-date-wise", "description": "Search sanctioned scheme orders date-wise. Read 15–20 to internalise scheme-drafting conventions."}, {"name": "Income-tax Department — Income-tax Act 2025", "type": "Primary regulator", "url": "https://www.incometaxindia.gov.in/income-tax-act-2025", "description": "Official text of the Income-tax Act 2025 (in force from 1 April 2026). The 1961 Act now stands repealed for transactions on or after that date."}, {"name": "RBI — Master Directions", "type": "Primary regulator", "url": "https://www.rbi.org.in/Scripts/BS_ViewMasDirections.aspx", "description": "Master Direction on Foreign Investment in India and the FEMA (Cross Border Merger) Regulations 2018. Current consolidated text."}, {"name": "RBI — FEMA Notifications", "type": "Primary regulator", "url": "https://www.rbi.org.in/Scripts/BS_FemaNotifications.aspx", "description": "NDI Rules 2019 (with all amendments), ODI Rules & Regulations 2022 (Notif. 400). The consolidated PDFs for current pricing and reporting."}, {"name": "SEBI — Regulations Portal", "type": "Securities regulator", "url": "https://www.sebi.gov.in/sebiweb/home/HomeAction.do?doListing=yes&sid=1&ssid=3&smid=0", "description": "SAST 2011 Takeover Code, LODR, ICDR, Buyback Regulations
