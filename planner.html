<\/p>\n<ul>\n  <li>Some states (Madhya Pradesh, Uttar Pradesh, Gujarat) — Rules notified for some codes.<\/li>\n  <li>Other states — still in draft stage.<\/li>\n  <li>Operational implications: until State Rules are notified, the old laws continue.<\/li>\n<\/ul>\n\n<div class=\"callout\">\n<strong>Practical advice.<\/strong> Build a state-by-state matrix tracking notification status of\nrules under each of the 4 codes for the states where your employer/clients operate. Update monthly.\nThis is the difference between knowing the codes academically and being operationally useful.\n<\/div>\n\n<h2>Saving clauses and transitions<\/h2>\n<ul>\n  <li>Pending cases under old acts continue under those acts.<\/li>\n  <li>Registrations granted under old acts deemed valid under new codes (subject to migration).<\/li>\n  <li>Acts repealed by the new codes are listed in each code's schedule — note the date of repeal.<\/li>\n<\/ul>\n\n<h2>Penalties<\/h2>\n<ul>\n  <li>Generally — fines ranging from ₹50,000 to ₹3 lakh per contravention; imprisonment for serious offences.<\/li>\n  <li>First-offence warning concept — many minor offences require a warning before penalty.<\/li>\n  <li>Compounding option for most offences with payment of 50% of maximum fine.<\/li>\n<\/ul>\n", "books": [{"title": "Labour Laws", "author": "Avtar Singh", "publisher": "Universal Law Publishing / LexisNexis · latest edition", "why": "The standard university and practitioner reference. Excellent for the underlying jurisprudence on which the codes build."}, {"title": "The New Labour Codes — A Complete Guide", "author": "Taxmann editorial", "publisher": "Taxmann · latest edition", "why": "All four codes with bare text, section-wise commentary, comparative table with old acts, and State Rules tracker."}, {"title": "Practical Guide to the Four Labour Codes", "author": "CA Vikrant Suryavanshi / industry practitioners", "publisher": "Bharat Law House · latest edition", "why": "HR/payroll-focused commentary with compliance calendar, format checklists, model documents."}, {"title": "Industrial and Labour Laws", "author": "SN Misra", "publisher": "Central Law Publications · latest edition", "why": "Comprehensive treatment of each labour law with case law. Useful for understanding the regulatory logic before mapping to the new codes."}, {"title": "Handbook on Compliance Calendar — Labour Codes", "author": "ICSI / NIRC", "publisher": "ICSI / Wadhwa & Co.", "why": "Compliance-focused reference. Month-by-month checklist for an HR professional."}], "sources": [{"name": "Ministry of Labour & Employment", "url": "https://labour.gov.in/", "description": "Central ministry website with all four codes, draft rules, FAQs and notification status. The authoritative source."}, {"name": "EPFO — Employees' Provident Fund Organisation", "url": "https://www.epfindia.gov.in/", "description": "EPF circulars, contribution rates, FAQ on Code on Social Security provisions."}, {"name": "ESIC — Employees' State Insurance Corporation", "url": "https://www.esic.gov.in/", "description": "ESI registration, contribution, benefits, and the Code on Social Security mapping."}, {"name": "DGFASLI — Factory Advice Service", "url": "https://dgfasli.gov.in/introduction", "description": "Occupational safety, factory inspections, safety committees under the OSH Code."}, {"name": "Shram Suvidha Portal", "url": "https://shramsuvidha.gov.in/", "description": "Unified compliance portal — single registration, returns, inspection management."}, {"name": "ICSI — Labour Law Updates", "url": "https://www.icsi.edu/", "description": "ICSI's Compendium on Labour Codes and webinar archive. Strong on company-secretarial compliance angle."}, {"name": "Nishith Desai — HR Law (Employment & Labour)", "url": "https://www.nishithdesai.com/SectionArticleList/32/Areas-of-Service/167/HumanResourcesLawEmploymentandLabour.html", "description": "Industry-leading practitioner papers on the labour codes — implementation impact, sector-specific issues."}, {"name": "Bar & Bench", "url": "https://www.barandbench.com/", "description": "Latest judgments on labour disputes; case-law tracking by sector."}]}, {"slug": "auditing", "title": "Auditing — ICAI Latest Updates", "subtitle": "Standards on Auditing (SAs), CARO 2020, ICFR and the NFRA framework.", "summary": "Statutory audit is governed by Sections 139–148 of the Companies Act 2013 read with the Standards on Auditing (SAs) issued by ICAI. The SA framework is harmonised with the International Standards on Auditing (ISAs) of the IAASB. ICAI revises specific SAs periodically — most recently SA 600 (group audits) and SA 315 (risk assessment). Master the standards, CARO 2020 reporting, and the ICFR framework.", "task_prefix": "m4_w", "weeks": [{"week": "1", "title": "Audit Framework", "focus": "The legal mandate and the standard-setting architecture.", "tasks": ["Sec 139–148 of Companies Act 2013 — appointment, term, rotation, removal of auditor", "Sec 139(2) and Rule 5 — auditor rotation thresholds (individual 5 years, firm 10 years)", "Sec 144 — prohibited services (the negative list)", "Sec 141 — eligibility, qualifications, disqualifications", "ICAI Auditing and Assurance Standards Board (AASB) — role; SAs vs SREs vs SAEs", "NFRA — jurisdiction (over Big-listed companies and other prescribed); disciplinary actions"]}, {"week": "2", "title": "Audit Reporting — SA 700 series", "focus": "The auditor's report and the Key Audit Matters (KAM) regime.", "tasks": ["SA 700 (revised) — Forming an Opinion and Reporting on Financial Statements", "SA 701 — Communicating Key Audit Matters (KAM) — applicable to listed entities", "SA 705 — Modifications to the Opinion (qualified, adverse, disclaimer)", "SA 706 — Emphasis of Matter and Other Matter paragraphs", "SA 710 — Comparative Information; corresponding figures vs comparative financial statements", "Practical reading — pull 3 recent audit reports from listed-company annual reports; identify KAMs, EOM, OM"]}, {"week": "3", "title": "Risk Assessment — SA 315 (Revised)", "focus": "The new risk-assessment standard, effective FY 2022-23.", "tasks": ["SA 315 (revised) — five elements of system of internal control; understanding the entity", "Inherent risk factors — the new spectrum-of-risk concept (subjectivity, complexity, uncertainty, etc.)", "Significant risks vs other risks", "Stand-back review — overall assessment of risk identification completeness", "Linkage with SA 330 — responses to assessed risks"]}, {"week": "4", "title": "Fraud, Laws, Communication — SA 240, 250, 260, 265", "focus": "The auditor's responsibilities beyond ordinary risk.", "tasks": ["SA 240 — Auditor's Responsibilities Relating to Fraud; the fraud triangle (incentive, opportunity, rationalisation)", "SA 240 — presumed significant risk of management override of controls; journal entry testing", "SA 250 — Consideration of Laws and Regulations (NOCLAR — Non-compliance with Laws and Regulations)", "SA 260 — Communication with Those Charged with Governance; required vs other communications", "SA 265 — Communicating Deficiencies in Internal Control"]}, {"week": "5", "title": "Audit Evidence — SA 500 series", "focus": "How auditors gather, evaluate and use evidence.", "tasks": ["SA 500 — Audit Evidence; sufficient and appropriate; reliability hierarchy", "SA 501 — Specific considerations for inventory, litigation, segment information", "SA 505 — External Confirmations; positive vs negative; bank confirmations", "SA 520 — Analytical Procedures; substantive analytical procedures", "SA 530 — Audit Sampling; statistical vs non-statistical; sample size determination", "SA 540 (revised) — Auditing Accounting Estimates; the new risk-based approach", "SA 550 — Related Parties; identification; transactions in normal course of business"]}, {"week": "6", "title": "Group Audits — SA 600 (Revised)", "focus": "Group audit responsibilities — major revision effective from FY 2026-27 (verify current effective date).", "tasks": ["SA 600 — Using the Work of Another Auditor (original)", "SA 600 (revised) — Special Considerations — Audits of Group Financial Statements", "Component identification; component materiality; component audits", "Direction, supervision, review of component auditor's work", "ICAI's recent guidance on group audits — Big-listed group challenges"]}, {"week": "7", "title": "CARO 2020 — The Reporting Companion", "focus": "The 21 reporting clauses every audit report on a non-exempt company carries.", "tasks": ["Applicability — Sec 143(11); exemptions (small companies, OPC, certain charitable companies)", "Clause-by-clause — property, plant and equipment; inventory; loans given; statutory compliance; income tax disputes; etc.", "Clause 3(xi) — fraud reporting; relationship with SA 240; whistleblower mechanism", "Clause 3(xvi) — NBFC/RBI registration; CIC; recent additions", "Documentation requirements per clause — typical evidence file structure"]}, {"week": "8", "title": "ICFR, Quality Control, Specialised Audits", "focus": "Beyond financial statement audit — the broader assurance toolkit.", "tasks": ["Sec 143(3)(i) — ICFR audit; Companies (Audit and Auditors) Rules 2014 Rule 10A", "ICAI Guidance Note on Audit of Internal Financial Controls Over Financial Reporting", "SQC 1 — Quality Control for Firms; current; new ISQM 1 / ISQM 2 (international move to quality management)", "Tax audit u/s 44AB — Form 3CA/3CB and 3CD; recent CBDT amendments", "Transfer pricing audit — Form 3CEB", "Statutory branch audit, concurrent audit (banks), revenue audit (banks)", "Final wrap-up — review SAs 200–810 once over via the ICAI Compendium index"]}], "topics": ["Sec 139–148 Companies Act — auditor appointment, rotation, prohibited services", "ICAI AASB and NFRA jurisdictions", "SAs framework — SA 100–999 numbering; ISA convergence", "SA 200 — Overall Objectives", "SA 220 — Quality Control; SQC 1; ISQM 1", "SA 240 — Fraud; journal entry testing; management override", "SA 250 — Laws and regulations; NOCLAR", "SA 260 — Communication with TCWG; SA 265 — deficiencies", "SA 300, 315 (revised), 320, 330 — Audit planning and risk", "SA 500–580 — Audit evidence", "SA 540 (revised) — Accounting estimates", "SA 600 (revised) — Group audits", "SA 700–710 — Reporting; KAM", "SA 720 — Other Information", "CARO 2020 — 21 clauses", "ICFR — Sec 143(3)(i); Guidance Note", "Tax audit — Form 3CD; Schedules", "Specialised audits — bank concurrent, transfer pricing, GST audit", "NFRA disciplinary orders — learning from real cases"], "note_body": "\n<h2>The audit framework<\/h2>\n\n<h3>Statutory mandate<\/h3>\n<p>Audit of company financial statements is governed by Sections 139–148 of the Companies Act 2013\nread with the Companies (Audit and Auditors) Rules 2014. Key provisions:<\/p>\n<ul>\n  <li><strong>Sec 139<\/strong> — Appointment of auditors. First auditor appointed by board within 30 days of incorporation; subsequent auditors at first AGM for 5-year term.<\/li>\n  <li><strong>Sec 139(2) + Rule 5<\/strong> — Auditor rotation. Individual auditor: 5-year term, then 5-year cooling-off. Audit firm: 10-year term, then 5-year cooling-off. Applies to listed and prescribed companies.<\/li>\n  <li><strong>Sec 140<\/strong> — Removal, resignation, casual vacancy.<\/li>\n  <li><strong>Sec 141<\/strong> — Eligibility, qualifications, disqualifications.<\/li>\n  <li><strong>Sec 142<\/strong> — Remuneration.<\/li>\n  <li><strong>Sec 143<\/strong> — Powers and duties; the principal section. Sec 143(3)(i) is the ICFR opinion.<\/li>\n  <li><strong>Sec 144<\/strong> — Auditor not to render certain services (the \"prohibited services\" — bookkeeping, internal audit, financial management, actuarial, etc.).<\/li>\n  <li><strong>Sec 145<\/strong> — Auditor's signature.<\/li>\n  <li><strong>Sec 146<\/strong> — Auditor's attendance at AGM.<\/li>\n  <li><strong>Sec 147<\/strong> — Punishment for contraventions.<\/li>\n  <li><strong>Sec 148<\/strong> — Central government's power to direct cost audit.<\/li>\n<\/ul>\n\n<h3>The standard-setting architecture<\/h3>\n<p><strong>ICAI Auditing and Assurance Standards Board (AASB)<\/strong> issues:<\/p>\n<ul>\n  <li>Standards on Auditing (SAs) — for audit of historical financial information.<\/li>\n  <li>Standards on Review Engagements (SREs) — for limited assurance reviews.<\/li>\n  <li>Standards on Assurance Engagements (SAEs) — for assurance other than audit/review.<\/li>\n  <li>Standards on Related Services (SRSs) — for compilation and agreed-upon procedures.<\/li>\n  <li>Standards on Quality Control (SQC 1).<\/li>\n  <li>Guidance Notes (GNs).<\/li>\n<\/ul>\n<p>SAs are converged with the International Standards on Auditing (ISAs) issued by IAASB.<\/p>\n\n<h2>The structure of SAs<\/h2>\n<ul>\n  <li>SA 100–199 — Introductory Matters (currently primarily SA 200, SA 220).<\/li>\n  <li>SA 200–299 — General Principles and Responsibilities.<\/li>\n  <li>SA 300–499 — Risk Assessment and Response.<\/li>\n  <li>SA 500–599 — Audit Evidence.<\/li>\n  <li>SA 600–699 — Using the Work of Others.<\/li>\n  <li>SA 700–799 — Audit Conclusions and Reporting.<\/li>\n  <li>SA 800–899 — Specialised Areas.<\/li>\n<\/ul>\n\n<h2>SA 200 — Overall Objectives<\/h2>\n<p>The fundamental SA. The objectives:<\/p>\n<ul>\n  <li>Obtain reasonable assurance that the financial statements as a whole are free from material misstatement.<\/li>\n  <li>Report on the financial statements in accordance with the auditor's findings.<\/li>\n<\/ul>\n<p><strong>Reasonable assurance<\/strong> = high (not absolute) level of assurance. Acknowledges\ninherent limitations: nature of financial reporting (estimates), nature of audit procedures (sampling).<\/p>\n\n<h2>SA 220 — Quality Control for an Audit<\/h2>\n<p>Engagement-level quality. Combined with <strong>SQC 1<\/strong> (firm-level quality control) — the\nICAI standard equivalent to international ISQC 1. <strong>ISQM 1 and ISQM 2<\/strong> are new\ninternational standards on Quality Management (replacing ISQC 1); ICAI is in process of issuing\nequivalent SAs.<\/p>\n\n<h2>Risk assessment — SA 300, 315 (revised), 320, 330<\/h2>\n\n<h3>SA 315 (Revised) — Identifying and Assessing Risks<\/h3>\n<p>The risk-assessment standard, effective for audits of financial statements for periods commencing\non or after 1 April 2022 in India. Significant changes from the prior version:<\/p>\n<ul>\n  <li><strong>Spectrum of inherent risk<\/strong> — risks are now evaluated along factors: subjectivity, complexity, uncertainty, change, susceptibility to fraud or management bias.<\/li>\n  <li><strong>Five elements of system of internal control<\/strong> — control environment, risk assessment, monitoring of controls, information system, control activities.<\/li>\n  <li><strong>Significant risks<\/strong> — defined as risks of material misstatement that are at the higher end of the spectrum of inherent risk OR are required to be treated as significant.<\/li>\n  <li><strong>Stand-back<\/strong> — after risk identification, evaluate whether the overall risk-identification effort is complete.<\/li>\n<\/ul>\n\n<h3>SA 320 — Materiality<\/h3>\n<p>Materiality at the financial-statement level (overall materiality) and at the assertion level\n(performance materiality, typically 50–75% of overall). Specific materiality for particular accounts\nor disclosures if lower thresholds apply.<\/p>\n\n<h3>SA 330 — Responses to Assessed Risks<\/h3>\n<p>Plan and perform audit procedures responsive to assessed risks. Combination of controls testing\n(if reliance is placed on controls) and substantive procedures (test of details and substantive\nanalytical procedures).<\/p>\n\n<h2>SA 240 — Fraud<\/h2>\n<p>Auditor's responsibilities relating to fraud. Key concepts:<\/p>\n<ul>\n  <li><strong>Fraud triangle<\/strong> — incentive/pressure + opportunity + rationalisation.<\/li>\n  <li><strong>Presumed significant risk of management override of controls<\/strong> — every audit, journal-entry testing must be performed.<\/li>\n  <li><strong>Revenue recognition<\/strong> — presumed significant risk in most cases.<\/li>\n  <li>Mandatory team discussion about fraud risks.<\/li>\n  <li>Specific responses — unpredictable procedures, increased sample sizes, year-end testing rather than interim.<\/li>\n<\/ul>\n\n<h2>SA 250 — Laws and Regulations<\/h2>\n<p>Two categories:<\/p>\n<ul>\n  <li>Laws affecting financial statements (e.g., tax, company law) — auditor must understand and consider effect.<\/li>\n  <li>Other laws material to operations (e.g., environmental, FEMA) — auditor must perform specified procedures.<\/li>\n<\/ul>\n<p><strong>NOCLAR<\/strong> (Non-compliance with Laws and Regulations) — concept globally; in India,\nauditor's response is to communicate with TCWG and assess implications.<\/p>\n\n<h2>SA 260 + SA 265 — Communication<\/h2>\n<ul>\n  <li>SA 260 — Communication with Those Charged with Governance (audit committee). Mandatory communications: audit plan, significant findings, auditor independence.<\/li>\n  <li>SA 265 — Communicating Deficiencies in Internal Control. Significant deficiencies and material weaknesses to be communicated in writing.<\/li>\n<\/ul>\n\n<h2>Audit evidence — SA 500 series<\/h2>\n\n<h3>SA 500 — Audit Evidence<\/h3>\n<p>Audit evidence must be <strong>sufficient and appropriate<\/strong>:<\/p>\n<ul>\n  <li>Sufficiency — quantity.<\/li>\n  <li>Appropriateness — quality (relevance + reliability).<\/li>\n<\/ul>\n<p>Reliability hierarchy (from most reliable to least): external + direct corroboration; internal\n+ external; internal + good control environment; internal + weak control.<\/p>\n\n<h3>SA 505 — External Confirmations<\/h3>\n<p>Bank confirmations, trade-receivable confirmations, lawyer's confirmations. <strong>Positive<\/strong>\n(reply expected even if balance is correct) and <strong>negative<\/strong> (reply expected only if\nbalance is incorrect).<\/p>\n\n<h3>SA 530 — Audit Sampling<\/h3>\n<p>Statistical and non-statistical sampling. Two main methods:<\/p>\n<ul>\n  <li><strong>Attribute sampling<\/strong> — for controls testing; estimate failure rate.<\/li>\n  <li><strong>Variables sampling / Monetary Unit Sampling (MUS)<\/strong> — for substantive testing; estimate monetary misstatement.<\/li>\n<\/ul>\n\n<h3>SA 540 (Revised) — Auditing Accounting Estimates<\/h3>\n<p>The new SA 540 (effective audits of FS for periods beginning on or after 1 April 2023 in India)\ntakes a risk-based approach to estimates. Three categories of estimates by complexity:<\/p>\n<ul>\n  <li>Simple — straightforward computation (e.g., depreciation on PPE).<\/li>\n  <li>Complex — significant judgment (e.g., expected credit losses, fair value of unlisted investments).<\/li>\n  <li>Highly complex — multiple assumptions, scenarios (e.g., goodwill impairment).<\/li>\n<\/ul>\n<p>Audit response calibrated to complexity.<\/p>\n\n<h3>SA 550 — Related Parties<\/h3>\n<p>Identify related parties beyond those disclosed by management; understand business rationale of\nrelated-party transactions; evaluate whether they are at arm's length.<\/p>\n\n<h2>Reporting — SA 700 series<\/h2>\n\n<h3>SA 700 (Revised) — Forming an Opinion<\/h3>\n<ul>\n  <li>Opinion section first (not last).<\/li>\n  <li>Basis for opinion section.<\/li>\n  <li>Going concern section (if applicable).<\/li>\n  <li>Key Audit Matters (for listed entities — SA 701).<\/li>\n  <li>Responsibilities of management and TCWG.<\/li>\n  <li>Auditor's responsibilities (detailed).<\/li>\n  <li>Other Information (SA 720).<\/li>\n  <li>Report on other legal and regulatory requirements (CARO).<\/li>\n<\/ul>\n\n<h3>SA 701 — Key Audit Matters<\/h3>\n<p>Communication of <strong>matters that were of most significance<\/strong> in the audit, selected\nfrom those communicated to TCWG. Each KAM has:<\/p>\n<ul>\n  <li>Description — the matter.<\/li>\n  <li>Why considered KAM — the auditor's reasoning.<\/li>\n  <li>How addressed — the audit response.<\/li>\n<\/ul>\n<p>Typical KAMs: revenue recognition, ECL, fair valuation, going concern, deferred tax, contingent\nliabilities, business combinations.<\/p>\n\n<h3>SA 705 — Modifications to the Opinion<\/h3>\n<table>\n  <thead><tr><th>Nature of misstatement<\/th><th>Material but not pervasive<\/th><th>Material AND pervasive<\/th><\/tr><\/thead>\n  <tbody>\n    <tr><td>Disagreement with management<\/td><td>Qualified opinion<\/td><td>Adverse opinion<\/td><\/tr>\n    <tr><td>Inability to obtain evidence<\/td><td>Qualified opinion<\/td><td>Disclaimer of opinion<\/td><\/tr>\n  <\/tbody>\n<\/table>\n\n<h3>SA 706 — Emphasis of Matter (EOM) and Other Matter (OM)<\/h3>\n<ul>\n  <li><strong>EOM<\/strong> — draws attention to a matter appropriately disclosed in the FS that is fundamental to user understanding.<\/li>\n  <li><strong>OM<\/strong> — draws attention to a matter not disclosed in the FS but relevant to user understanding.<\/li>\n<\/ul>\n\n<h2>Group audits — SA 600 (Revised)<\/h2>\n<p>SA 600 (Revised) — effective for audits of group financial statements for periods commencing on\nor after 1 April 2026 in India (verify current effective date). Significant changes:<\/p>\n<ul>\n  <li>Component identification based on risks, not just size.<\/li>\n  <li>Component materiality determined by group auditor.<\/li>\n  <li>Direction, supervision and review of component auditor's work — more rigorous documentation.<\/li>\n  <li>Quality management oversight at group level.<\/li>\n<\/ul>\n\n<h2>CARO 2020 — Companies (Auditor's Report) Order<\/h2>\n<p>The auditor's additional report under Sec 143(11). 21 clauses covering:<\/p>\n<ol>\n  <li>Property, Plant and Equipment (PPE register, physical verification, title deeds).<\/li>\n  <li>Inventory (physical verification, working capital limits from banks).<\/li>\n  <li>Loans, investments, guarantees, security given.<\/li>\n  <li>Compliance with Sec 185 and 186 on loans/investments.<\/li>\n  <li>Acceptance of deposits — Sec 73–76.<\/li>\n  <li>Cost records — Sec 148.<\/li>\n  <li>Statutory dues (PF, ESI, GST, income tax) and disputed amounts.<\/li>\n  <li>Income disclosed in tax assessments not recorded in books.<\/li>\n  <li>Default in repayment of loans/borrowings; default in financial creditor (wilful defaulter).<\/li>\n  <li>IPO/Further public offer fund utilisation.<\/li>\n  <li>Fraud reporting — by company, on company, by company officials.<\/li>\n  <li>Nidhi company specifics.<\/li>\n  <li>Sec 177 (audit committee) and Sec 188 (related party transactions) compliance.<\/li>\n  <li>Internal audit system adequacy.<\/li>\n  <li>Non-cash transactions with directors per Sec 192.<\/li>\n  <li>NBFC/RBI registration; CIC.<\/li>\n  <li>Cash losses in financial year.<\/li>\n  <li>Resignation of statutory auditors during year.<\/li>\n  <li>Material uncertainty about meeting liabilities.<\/li>\n  <li>CSR — transfer of unspent amount.<\/li>\n  <li>Reporting of fraud by company on company.<\/li>\n<\/ol>\n\n<h2>ICFR — Sec 143(3)(i)<\/h2>\n<p>Read with the ICAI Guidance Note on Audit of Internal Financial Controls Over Financial Reporting.\nTwo-track approach:<\/p>\n<ul>\n  <li><strong>Standalone audit report<\/strong> on adequacy of internal financial controls — for listed and prescribed companies.<\/li>\n  <li><strong>Integrated with financial statement audit<\/strong> — for non-listed companies that meet thresholds.<\/li>\n<\/ul>\n\n<h2>Specialised audits<\/h2>\n<ul>\n  <li><strong>Tax audit under Sec 44AB<\/strong> — for businesses with turnover &gt; ₹1 crore (or ₹10 crore if cash transactions &lt; 5%); for professionals with receipts &gt; ₹50 lakh. Form 3CA/3CB + 3CD.<\/li>\n  <li><strong>Transfer pricing audit under Sec 92E<\/strong> — Form 3CEB.<\/li>\n  <li><strong>GST audit<\/strong> — for taxpayers with turnover above prescribed threshold (Section 35(5) — though the audit requirement was relaxed; reconciliation statement Form GSTR-9C is now self-certified).<\/li>\n  <li><strong>Bank statutory audit<\/strong> — annual; appointed by RBI/bank board.<\/li>\n  <li><strong>Bank concurrent audit<\/strong> — continuous; covering ~50% of business.<\/li>\n  <li><strong>Bank revenue audit<\/strong> — focus on income leakage.<\/li>\n  <li><strong>Cost audit under Sec 148<\/strong> — sector-specific notifications.<\/li>\n<\/ul>\n\n<h2>NFRA<\/h2>\n<p>National Financial Reporting Authority — established under Sec 132 of the Companies Act 2013.\nJurisdiction:<\/p>\n<ul>\n  <li>Listed companies.<\/li>\n  <li>Unlisted companies above prescribed thresholds (assets ≥ ₹500 cr; turnover ≥ ₹1,000 cr).<\/li>\n  <li>Banks, insurance, electricity sector entities.<\/li>\n  <li>Subsidiaries of foreign listed entities.<\/li>\n<\/ul>\n<p>NFRA can:<\/p>\n<ul>\n  <li>Make recommendations to MCA on standards.<\/li>\n  <li>Monitor and enforce compliance with accounting and auditing standards.<\/li>\n  <li>Conduct inspection of audit firms.<\/li>\n  <li>Take disciplinary action — financial penalties, debarment from auditing for specified period.<\/li>\n<\/ul>\n<p><strong>NFRA inspection reports and disciplinary orders<\/strong> are public and an excellent source\nof learning about common audit failures.<\/p>\n\n<div class=\"callout\">\n<strong>Recent regulatory focus.<\/strong> Three priority areas for NFRA: (a) audit of internal\nfinancial controls — depth and documentation; (b) related-party transactions — substantive procedures\nbeyond management disclosure; (c) going concern — robust evaluation of going-concern assumption,\nparticularly for companies in distress. Calibrate your audit approach to these priorities.\n<\/div>\n", "books": [{"title": "Auditing and Assurance Standards — Compendium", "author": "ICAI", "publisher": "ICAI Publication · annual edition", "why": "The bare SAs with explanatory text. Mandatory primary source for every audit. Always cite from the latest published version."}, {"title": "Students' Guide to Auditing Standards", "author": "CA Surbhi Bansal", "publisher": "Bestword / VSI · latest edition", "why": "The most widely-used student/practitioner companion to the SAs. Each SA explained in plain language with chart summaries and exam-style questions."}, {"title": "Auditing and Assurance — Padhuka's Students' Guide", "author": "GS Saxena & Ravi Kapoor", "publisher": "Padhuka / Commercial Law Publishers · latest edition", "why": "Comprehensive treatment of auditing concepts, SAs, CARO, and Companies Act audit provisions. Strong on practical examples."}, {"title": "Practical Auditing", "author": "BN Tandon, Sudharsanam, Sundharabahu", "publisher": "S Chand · latest edition", "why": "The classic Indian auditing reference. Excellent for understanding the audit process from planning to reporting."}, {"title": "Guidance Note on Audit of Internal Financial Controls Over Financial Reporting", "author": "ICAI", "publisher": "ICAI Publication", "why": "Essential for the Sec 143(3)(i) ICFR opinion. Read alongside the SAs for any listed-company audit."}, {"title": "CARO 2020 — Practical Guide", "author": "ICAI / Taxmann editorial", "publisher": "Taxmann · annual edition", "why": "Clause-wise commentary on CARO 2020 with sample working papers and reporting language. Indispensable for every audit closure."}], "sources": [{"name": "ICAI Auditing & Assurance Standards Board", "url": "https://www.icai.org/post/auditing-assurance-standards-board", "description": "All SAs, Guidance Notes, Implementation Guides. The starting point for any audit query."}, {"name": "ICAI Board of Studies — Knowledge Portal", "url": "https://www.icai.org/post/bos-knowledge-portal", "description": "Searchable repository of ICAI publications, study material and revision videos. Cross-references between SAs and Companies Act provisions."}, {"name": "MCA — Acts & Rules", "url": "https://www.mca.gov.in/content/mca/global/en/acts-rules/ebooks.html", "description": "Section 139–148, Audit Rules, CARO 2020 notification. Authoritative source for the statutory mandate."}, {"name": "NFRA — Inspection Reports & Disciplinary Orders", "url": "https://nfra.gov.in/", "description": "Real-world quality-control findings and disciplinary orders against audit firms. The best source for learning about common audit failures."}, {"name": "IAASB — International Standards on Auditing", "url": "https://www.iaasb.org/", "description": "The underlying global standards on which Indian SAs are based. New ISA developments (e.g., ISA 600 revision, ISQM 1/2) signal upcoming SA revisions."}, {"name": "PwC India — Audit & Assurance", "url": "https://www.pwc.in/audit-services.html", "description": "Thought leadership on SA implementation, ICFR, ESG and IT audit. KPMG, EY and Deloitte India publish similar series."}, {"name": "Comptroller & Auditor General of India (CAG)", "url": "https://cag.gov.in/en", "description": "India's Supreme Audit Institution. Performance audits, compliance audits and reports tabled in Parliament — useful reference for public-sector auditors."}, {"name": "Income-tax Department — Notifications", "url": "https://www.incometaxindia.gov.in/notifications", "description": "Annual Form 3CD updates, tax-audit threshold notifications, due-date extensions."}]}, {"slug": "english", "title": "Spoken English & Grammar", "subtitle": "From foundational grammar to professional fluency — the language layer that compounds every other skill.", "summary": "Strong English compounds with every other skill on this plan — your audit reports are clearer, your client emails are more persuasive, and your professional confidence grows. The plan combines daily grammar drills, vocabulary building, listening, and spoken practice. Consistency over intensity — 30 minutes a day for 8 weeks beats binge-studying.", "task_prefix": "m5_w", "weeks": [{"week": "1", "title": "Sentence Structure & Parts of Speech", "focus": "Foundation. The building blocks of grammar.", "tasks": ["Parts of speech — noun, pronoun, verb, adjective, adverb, preposition, conjunction, interjection", "Sentence types — declarative, interrogative, imperative, exclamatory", "Subject and predicate; finite vs non-finite verbs", "Phrases (noun, verb, adjective, adverb, prepositional) and clauses (independent, dependent)", "Wren & Martin Chapter 1–5; do 20 sentences in writing daily"]}, {"week": "2", "title": "The 12 Tenses", "focus": "The single most common source of error for Indian speakers.", "tasks": ["Simple present, present continuous, present perfect, present perfect continuous", "Simple past, past continuous, past perfect, past perfect continuous", "Simple future, future continuous, future perfect, future perfect continuous", "Tense usage in narration; sequence of tenses", "Daily writing — 5 sentences per tense; record yourself saying them aloud"]}, {"week": "3", "title": "Articles, Prepositions, Conjunctions", "focus": "The small words that trip up non-native speakers.", "tasks": ["Articles — a, an, the; zero article; common errors with Indian English", "Prepositions of time, place, direction, manner; collocations (interested IN, depend ON, suffer FROM)", "Coordinating conjunctions (FANBOYS — for, and, nor, but, or, yet, so)", "Subordinating conjunctions — when, while, because, although, if, unless", "Correlative conjunctions — either…or, neither…nor, not only…but also, both…and", "Practical Usage by Michael Swan — pick 10 problem prepositions and master them"]}, {"week": "4", "title": "Active/Passive, Direct/Indirect, Modals", "focus": "Transformations and modal verbs.", "tasks": ["Active to passive — rules across tenses; when to use passive (formal writing, unknown agent)", "Direct to indirect speech — tense back-shift; reporting verbs", "Modals — can, could, may, might, must, shall, should, will, would; meanings and contexts", "Modal perfects — must have, should have, could have; subjunctive mood", "Conditional sentences — zero, first, second, third, mixed"]}, {"week": "5", "title": "Vocabulary Building", "focus": "Word roots, prefixes, suffixes — the engine of English vocabulary.", "tasks": ["Norman Lewis Word Power Made Easy — 1 chapter daily; flashcard review", "Common Latin and Greek roots — bene, mal, mort, vit, hydro, geo, phon, vid", "Common prefixes — un-, re-, dis-, mis-, in-, im-, pre-, post-, sub-, super-", "Common suffixes — -tion, -ment, -ness, -ity, -able, -ous, -ly", "Phrasal verbs — 20 most common; one verb (e.g., 'get') across all its phrasal forms", "Idioms — 5 idioms per day; use in writing same day"]}, {"week": "6", "title": "Pronunciation & Common Errors", "focus": "The Indian English specifics.", "tasks": ["IPA — the 44 sounds of English; vowels (12) + consonants (24) + diphthongs (8)", "Indian English specifics — TH sounds (think, this), V vs W, schwa /ə/, syllable stress", "Word stress patterns — re-CORD (verb) vs RE-cord (noun); two-syllable rule", "Sentence stress and intonation — content words vs function words; rising vs falling intonation", "BBC Learning English Pronunciation series — 1 video daily; shadow the speaker", "Record yourself reading a 200-word passage daily; compare with native speaker reference"]}, {"week": "7", "title": "Spoken English — Fluency Building", "focus": "From hesitant to fluent — the practice-based week.", "tasks": ["Daily 5-minute self-talk on a topic in English (news, work, hobbies)", "Shadowing — listen to BBC News and repeat aloud, matching pace and intonation", "Conversation partners — find one on iTalki, Cambly, or a local English-speaking colleague", "Topic-based monologues — describe a process from your work in 2 minutes", "Common spoken constructions — fillers (well, you know, like), polite forms, opinion phrases (in my view, I'd argue, the way I see it)", "Role plays — meet a client, present an audit finding, decline a request politely"]}, {"week": "8", "title": "Business English — Writing & Speaking", "focus": "The professional register of English.", "tasks": ["Business emails — subject lines, opening, body, closing; passive vs active voice in formal writing", "Audit reports — concise, factual, observation-based language; avoiding hedging", "Meeting language — chairing, contributing, summarising, disagreeing politely", "Presentations — structure (signposting), engagement (questions, examples), closing", "Common Indian English vs Standard English — kindly (overused), revert (often misused), prepone (Indianism), do the needful (avoid)", "Final wrap-up — write a 500-word professional summary of your 2-month journey; record a 2-minute spoken version"]}], "topics": ["Parts of speech and sentence structure", "The 12 tenses — formation and usage", "Articles and zero article", "Prepositions — time, place, direction; collocations", "Conjunctions — coordinating, subordinating, correlative", "Active and passive voice", "Direct and indirect speech", "Modal verbs and modal perfects", "Conditional sentences — all four types", "Subjunctive mood", "Vocabulary — roots, prefixes, suffixes", "Phrasal verbs and idioms", "Pronunciation — IPA, word stress, sentence stress", "Indian English vs Standard English", "Business email writing", "Audit-report language", "Meeting and presentation skills", "Listening — BBC, VOA, podcasts", "Speaking — shadowing, monologues, role plays", "Vocabulary in context — read a quality newspaper daily"], "note_body": "\n<h2>Why this matters<\/h2>\n<p>Strong English compounds with every other skill on this plan. Audit reports that are clearer\ntake less revision time; client emails that are more precise reduce back-and-forth; presentation\nfluency builds professional confidence. The investment is small (30 minutes daily) and the return\ncompounds over a career.<\/p>\n\n<h2>Grammar fundamentals<\/h2>\n\n<h3>Parts of speech<\/h3>\n<ul>\n  <li><strong>Noun<\/strong> — person, place, thing, idea. Concrete (chair) vs abstract (justice); proper (Delhi) vs common (city); countable (book/books) vs uncountable (water).<\/li>\n  <li><strong>Pronoun<\/strong> — replaces a noun. Personal (he, she, they), possessive (his, hers), reflexive (himself, themselves), demonstrative (this, that), interrogative (who, what), relative (who, which, that).<\/li>\n  <li><strong>Verb<\/strong> — action or state. Transitive (takes object) vs intransitive (doesn't). Finite (with tense) vs non-finite (infinitive, gerund, participle).<\/li>\n  <li><strong>Adjective<\/strong> — qualifies a noun. Descriptive, demonstrative, possessive, indefinite, numerical, interrogative.<\/li>\n  <li><strong>Adverb<\/strong> — qualifies verb/adjective/another adverb. Of manner, time, place, frequency, degree.<\/li>\n  <li><strong>Preposition<\/strong> — relates noun/pronoun to another word. In, on, at, by, with, for, to, of.<\/li>\n  <li><strong>Conjunction<\/strong> — joins words/phrases/clauses. Coordinating (and, but, or), subordinating (because, although, if), correlative (either…or, neither…nor).<\/li>\n  <li><strong>Interjection<\/strong> — expresses emotion. Oh!, Alas!, Wow!<\/li>\n<\/ul>\n\n<h3>Sentence structure<\/h3>\n<p>Every English sentence has at minimum a <strong>subject<\/strong> and a <strong>predicate<\/strong>.\nFour basic sentence patterns:<\/p>\n<ul>\n  <li><strong>S + V<\/strong> — She sleeps.<\/li>\n  <li><strong>S + V + O<\/strong> — She reads books.<\/li>\n  <li><strong>S + V + IO + DO<\/strong> — She gives him books.<\/li>\n  <li><strong>S + V + O + OC<\/strong> — She painted the wall blue.<\/li>\n<\/ul>\n\n<h3>Phrases vs clauses<\/h3>\n<p>A <strong>phrase<\/strong> is a group of words without a subject-verb combination. A\n<strong>clause<\/strong> has a subject and a verb. Independent clauses stand alone; dependent clauses\ndo not.<\/p>\n\n<h2>The 12 tenses — the core of spoken accuracy<\/h2>\n\n<table>\n  <thead><tr><th><\/th><th>Simple<\/th><th>Continuous<\/th><th>Perfect<\/th><th>Perfect Continuous<\/th><\/tr><\/thead>\n  <tbody>\n    <tr><td>Present<\/td><td>I write<\/td><td>I am writing<\/td><td>I have written<\/td><td>I have been writing<\/td><\/tr>\n    <tr><td>Past<\/td><td>I wrote<\/td><td>I was writing<\/td><td>I had written<\/td><td>I had been writing<\/td><\/tr>\n    <tr><td>Future<\/td><td>I will write<\/td><td>I will be writing<\/td><td>I will have written<\/td><td>I will have been writing<\/td><\/tr>\n  <\/tbody>\n<\/table>\n\n<h3>When to use each<\/h3>\n<ul>\n  <li><strong>Simple present<\/strong> — habits, general truths, scheduled events. \"I commute by metro.\"<\/li>\n  <li><strong>Present continuous<\/strong> — actions in progress now, temporary states. \"I am working on the audit.\"<\/li>\n  <li><strong>Present perfect<\/strong> — past action with present relevance. \"I have completed the engagement.\"<\/li>\n  <li><strong>Present perfect continuous<\/strong> — action started in past, continuing now. \"I have been working since 8 AM.\"<\/li>\n  <li><strong>Simple past<\/strong> — completed action at a specific past time. \"I finished the report yesterday.\"<\/li>\n  <li><strong>Past continuous<\/strong> — action in progress at a past time. \"I was writing when she called.\"<\/li>\n  <li><strong>Past perfect<\/strong> — action completed before another past action. \"I had submitted before the deadline.\"<\/li>\n  <li><strong>Past perfect continuous<\/strong> — duration before a past time. \"I had been waiting for 30 minutes when he arrived.\"<\/li>\n  <li><strong>Simple future<\/strong> — future intention or prediction. \"I will finish tomorrow.\"<\/li>\n  <li><strong>Future continuous<\/strong> — action in progress at a future time. \"I will be presenting at 10 AM.\"<\/li>\n  <li><strong>Future perfect<\/strong> — action completed before a future time. \"I will have finished by 5 PM.\"<\/li>\n  <li><strong>Future perfect continuous<\/strong> — duration up to a future point. \"By December, I will have been working here for 5 years.\"<\/li>\n<\/ul>\n\n<h2>Articles — the silent killers<\/h2>\n<ul>\n  <li><strong>A / An<\/strong> — indefinite; first mention or one of many. \"I saw a movie.\" Use \"an\" before vowel sounds (an hour, but a university).<\/li>\n  <li><strong>The<\/strong> — definite; specific, already mentioned, unique, superlative. \"The movie was good.\"<\/li>\n  <li><strong>Zero article<\/strong> — generic plural, abstract noun in general sense, proper noun. \"Books are valuable.\" \"Tigers are endangered.\" \"Delhi is the capital.\"<\/li>\n<\/ul>\n\n<h3>Indian English common errors<\/h3>\n<ul>\n  <li>\"He is going to <s>the<\/s> Delhi\" — no \"the\" before city names.<\/li>\n  <li>\"I have <s>the<\/s> headache\" — no \"the\" with personal afflictions.<\/li>\n  <li>\"<s>The<\/s> Mr. Sharma is here\" — no \"the\" before titles.<\/li>\n<\/ul>\n\n<h2>Prepositions — the most error-prone<\/h2>\n\n<h3>Time<\/h3>\n<ul>\n  <li><strong>At<\/strong> — specific times. \"at 5 PM\", \"at midnight\", \"at the weekend (BrE)\".<\/li>\n  <li><strong>On<\/strong> — days, dates. \"on Monday\", \"on 15 June\", \"on my birthday\".<\/li>\n  <li><strong>In<\/strong> — months, years, decades, longer periods. \"in June\", \"in 2025\", \"in the 1990s\".<\/li>\n<\/ul>\n\n<h3>Place<\/h3>\n<ul>\n  <li><strong>At<\/strong> — specific point. \"at the office\", \"at the bus stop\".<\/li>\n  <li><strong>On<\/strong> — surface. \"on the table\", \"on the wall\".<\/li>\n  <li><strong>In<\/strong> — enclosed space. \"in the room\", \"in the box\", \"in the city\".<\/li>\n<\/ul>\n\n<h3>Common verb-preposition collocations<\/h3>\n<ul>\n  <li>interested IN, depend ON, suffer FROM, succeed IN, agree WITH (person) / TO (proposal), arrive AT (small place) / IN (big place), apologise FOR (action) / TO (person), congratulate ON, listen TO, look AT/FOR/AFTER, consist OF, accuse OF, blame FOR.<\/li>\n<\/ul>\n\n<h2>Active and passive voice<\/h2>\n<ul>\n  <li>Active: <em>The auditor signed the report.<\/em> (Subject does the action.)<\/li>\n  <li>Passive: <em>The report was signed by the auditor.<\/em> (Subject receives the action.)<\/li>\n<\/ul>\n<p>Formation: form of \"be\" + past participle. Tense determined by \"be\" form.<\/p>\n<ul>\n  <li>Present: am/is/are + V3 → \"The report is signed.\"<\/li>\n  <li>Past: was/were + V3 → \"The report was signed.\"<\/li>\n  <li>Future: will be + V3 → \"The report will be signed.\"<\/li>\n  <li>Perfect: has/had been + V3 → \"The report has been signed.\"<\/li>\n  <li>Continuous: am being / was being + V3 → \"The report is being signed.\"<\/li>\n<\/ul>\n\n<h3>When to use passive<\/h3>\n<ul>\n  <li>When the agent is unknown or unimportant.<\/li>\n  <li>When the focus is on the action or result.<\/li>\n  <li>In formal/scientific writing.<\/li>\n  <li>To avoid blaming a specific person.<\/li>\n<\/ul>\n\n<h2>Modal verbs<\/h2>\n<ul>\n  <li><strong>Can / Could<\/strong> — ability; permission (could is more polite). \"I can play tennis.\" / \"Could I leave early?\"<\/li>\n  <li><strong>May / Might<\/strong> — possibility; permission (may is more formal). \"It may rain.\" / \"May I come in?\"<\/li>\n  <li><strong>Must / Have to<\/strong> — obligation. \"I must finish today.\" \"Mustn't\" = prohibition; \"don't have to\" = no obligation. Critical distinction.<\/li>\n  <li><strong>Should / Ought to<\/strong> — advice, weak obligation. \"You should rest.\"<\/li>\n  <li><strong>Will / Would<\/strong> — future; willingness; polite request; habitual past. \"Would you mind…?\"<\/li>\n  <li><strong>Shall<\/strong> — formal future; suggestions. \"Shall we go?\" (BrE prefers; AmE uses \"should\" more.)<\/li>\n<\/ul>\n\n<h2>Direct vs Indirect speech<\/h2>\n<p>Tense back-shift on reporting:<\/p>\n<table>\n  <thead><tr><th>Direct<\/th><th>Indirect<\/th><\/tr><\/thead>\n  <tbody>\n    <tr><td>\"I am tired.\"<\/td><td>He said he was tired.<\/td><\/tr>\n    <tr><td>\"I have finished.\"<\/td><td>He said he had finished.<\/td><\/tr>\n    <tr><td>\"I finished yesterday.\"<\/td><td>He said he had finished the previous day.<\/td><\/tr>\n    <tr><td>\"I will go tomorrow.\"<\/td><td>He said he would go the next day.<\/td><\/tr>\n  <\/tbody>\n<\/table>\n<p>Time and place adverbs also shift: <em>here → there, now → then, today → that day, tomorrow →\nthe next day, yesterday → the previous day<\/em>.<\/p>\n\n<h2>Conditional sentences<\/h2>\n<ul>\n  <li><strong>Zero conditional<\/strong> — general truths. \"If you heat water, it boils.\" (if + present, present)<\/li>\n  <li><strong>First conditional<\/strong> — real future possibility. \"If it rains, I will stay home.\" (if + present, will + V1)<\/li>\n  <li><strong>Second conditional<\/strong> — unreal present/future. \"If I had time, I would help.\" (if + past, would + V1)<\/li>\n  <li><strong>Third conditional<\/strong> — unreal past. \"If I had known, I would have come.\" (if + past perfect, would have + V3)<\/li>\n  <li><strong>Mixed conditional<\/strong> — past condition + present result. \"If I had studied more, I would be a doctor now.\"<\/li>\n<\/ul>\n\n<h2>Vocabulary building — the etymological approach<\/h2>\n<p>Norman Lewis's method: learn the root + prefix + suffix and you decode hundreds of words. Examples:<\/p>\n\n<h3>Common Latin/Greek roots<\/h3>\n<ul>\n  <li><strong>BENE<\/strong> (good) — benefactor, beneficiary, benevolent, benediction.<\/li>\n  <li><strong>MAL<\/strong> (bad) — malice, malfunction, malevolent, malign.<\/li>\n  <li><strong>VIT/VIV<\/strong> (life) — vital, vivid, revive, vitamin.<\/li>\n  <li><strong>MORT<\/strong> (death) — mortal, immortal, mortality, mortician.<\/li>\n  <li><strong>PHON<\/strong> (sound) — phone, symphony, microphone, euphony.<\/li>\n  <li><strong>GEO<\/strong> (earth) — geography, geology, geopolitics.<\/li>\n  <li><strong>BIO<\/strong> (life) — biology, biography, biosphere.<\/li>\n  <li><strong>CHRON<\/strong> (time) — chronicle, chronological, anachronism.<\/li>\n<\/ul>\n\n<h3>Common prefixes<\/h3>\n<ul>\n  <li>UN-, DIS-, IN-, IM-, IL-, IR- (not, opposite) — unhappy, disagree, inactive, impossible, illegal, irregular.<\/li>\n  <li>RE- (again, back) — return, restart, revise.<\/li>\n  <li>PRE- (before) — preview, predict, prevent.<\/li>\n  <li>POST- (after) — postpone, postscript, postwar.<\/li>\n  <li>MIS- (wrong) — misunderstand, mislead, misuse.<\/li>\n  <li>SUB- (under) — submarine, subway, subordinate.<\/li>\n  <li>SUPER- (over) — superior, superhuman, supervise.<\/li>\n<\/ul>\n\n<h2>Phrasal verbs — the spoken-English challenge<\/h2>\n<p>Phrasal verbs are verb + preposition/adverb combinations with meanings different from the\nindividual words. Examples around the verb <em>get<\/em>:<\/p>\n<ul>\n  <li>get up — rise from bed.<\/li>\n  <li>get along (with) — have a good relationship.<\/li>\n  <li>get away — escape.<\/li>\n  <li>get by — manage with limited resources.<\/li>\n  <li>get over — recover from.<\/li>\n  <li>get through — successfully complete OR endure.<\/li>\n  <li>get on — board; succeed.<\/li>\n  <li>get off — leave; finish work.<\/li>\n<\/ul>\n\n<h2>Pronunciation — IPA basics<\/h2>\n<p>English has 44 phonemes: 24 consonants + 12 pure vowels + 8 diphthongs. Indian speakers\ncommonly need to work on:<\/p>\n<ul>\n  <li><strong>/θ/ and /ð/<\/strong> — \"th\" sounds. think, this. Tip of tongue between teeth.<\/li>\n  <li><strong>/v/ vs /w/<\/strong> — distinct in English (vine vs wine). In some Indian languages both become similar sounds.<\/li>\n  <li><strong>/z/<\/strong> — voiced \"s\" sound. <em>amazing<\/em>, <em>noisy<\/em>.<\/li>\n  <li><strong>Schwa /ə/<\/strong> — the most common English vowel; unstressed syllables. <em>about<\/em>, <em>banana<\/em>, <em>support<\/em>.<\/li>\n  <li><strong>Word stress<\/strong> — different stress changes meaning. RECORD (n.) vs reCORD (v.); PRESENT (n.) vs preSENT (v.).<\/li>\n<\/ul>\n\n<h2>Sentence stress and intonation<\/h2>\n<p>English is a <strong>stress-timed<\/strong> language (vs. syllable-timed like Hindi). Content words\n(nouns, verbs, adjectives, adverbs) are stressed; function words (articles, prepositions,\nauxiliary verbs) are unstressed and reduced.<\/p>\n<p>Compare: \"I'm GOING to the OFFICE to MEET the CLIENT.\" — only capitalised words receive stress.<\/p>\n\n<h2>Common Indian English errors<\/h2>\n<ul>\n  <li>\"<s>Discuss about<\/s>\" → discuss (no preposition).<\/li>\n  <li>\"<s>Reach to<\/s> the office\" → reach the office.<\/li>\n  <li>\"<s>Cope up with<\/s>\" → cope with.<\/li>\n  <li>\"<s>Marry with<\/s>\" → marry (no preposition).<\/li>\n  <li>\"<s>Order for<\/s>\" → order (transitive).<\/li>\n  <li>\"<s>Revert back<\/s>\" → revert (or reply / respond).<\/li>\n  <li>\"<s>Prepone<\/s>\" → bring forward; reschedule earlier.<\/li>\n  <li>\"<s>Kindly do the needful<\/s>\" → please proceed with the necessary action.<\/li>\n  <li>\"<s>I am having<\/s> a car\" (continuous for possession) → I have a car.<\/li>\n  <li>\"<s>What is your good name<\/s>\" → What is your name?<\/li>\n<\/ul>\n\n<h2>Business writing principles<\/h2>\n<ol>\n  <li><strong>Lead with the point.<\/strong> What do you want the reader to do? State it first.<\/li>\n  <li><strong>One idea per paragraph.<\/strong> Topic sentence first; supporting sentences after.<\/li>\n  <li><strong>Active voice over passive<\/strong> (with exceptions for diplomatic tone).<\/li>\n  <li><strong>Concrete over abstract.<\/strong> \"The audit will take 6 weeks.\" not \"The engagement will be conducted over a reasonable period.\"<\/li>\n  <li><strong>Short sentences over long.<\/strong> Aim for average 15–20 words.<\/li>\n  <li><strong>Edit ruthlessly.<\/strong> Strunk & White's \"omit needless words\" — every word should earn its place.<\/li>\n<\/ol>\n\n<h2>Audit-report language<\/h2>\n<p>Specific to your professional context, audit-report language follows conventions:<\/p>\n<ul>\n  <li><strong>Factual, observation-based<\/strong> — describe what is, without interpretation. \"The vendor master had 1,234 active vendors at year-end.\"<\/li>\n  <li><strong>Specific, not vague<\/strong> — \"12 of 30 sampled vendor records lacked required documentation\" beats \"several vendor records had documentation gaps\".<\/li>\n  <li><strong>Risk-implication language<\/strong> — \"this exposes the company to risk of duplicate or fictitious vendor payments\" — concrete consequence, not generic risk.<\/li>\n  <li><strong>Recommendation language<\/strong> — actionable, with owner and timeline. \"Recommendation: Implement quarterly vendor master review by Finance team; target completion by [date].\"<\/li>\n  <li><strong>Hedge language to avoid<\/strong> — \"may\", \"could\", \"it appears that\" — these dilute impact. Use only when genuinely uncertain.<\/li>\n<\/ul>\n\n<h2>A 30-minute daily practice routine<\/h2>\n<ol>\n  <li><strong>10 minutes — Grammar/vocabulary.<\/strong> 1 chapter of Wren & Martin OR 1 chapter of Norman Lewis; do all exercises.<\/li>\n  <li><strong>10 minutes — Listening.<\/strong> 1 episode of BBC 6 Minute English OR 1 TED Talk. Take notes; look up unknown words.<\/li>\n  <li><strong>10 minutes — Speaking.<\/strong> Read aloud a 300-word passage from a quality newspaper (The Hindu, Business Standard). Record yourself. Listen back. Identify pronunciation errors.<\/li>\n<\/ol>\n\n<div class=\"callout\">\n<strong>Consistency over intensity.<\/strong> 30 minutes daily for 8 weeks compounds far more than\n3 hours once a week. Block the time in your calendar. Don't break the streak — even on weekends,\neven when busy. The single most important variable is consistency.\n<\/div>\n", "books": [{"title": "High School English Grammar and Composition", "author": "Wren & Martin (revised by N.D.V. Prasada Rao)", "publisher": "S. Chand · latest edition", "why": "The foundational Indian English-grammar textbook for 100 years. Comprehensive coverage with thousands of exercises. Best place to start."}, {"title": "Practical English Usage", "author": "Michael Swan", "publisher": "Oxford University Press · 4th Edition", "why": "The world's leading reference on English usage. Alphabetical entries on every common difficulty — articles, prepositions, tenses, common errors. Indispensable."}, {"title": "Word Power Made Easy", "author": "Norman Lewis", "publisher": "Goyal Publishers / Anchor", "why": "The single best book for vocabulary building in English. Etymology-based; teaches you to deconstruct unknown words. Indian classic."}, {"title": "English Vocabulary in Use (Pre-Intermediate, Intermediate, Advanced)", "author": "Stuart Redman / Felicity O'Dell", "publisher": "Cambridge University Press · latest editions", "why": "Topic-organised vocabulary with exercises. Three levels; pick your starting point honestly and progress."}, {"title": "Spoken English — A Self-Learning Guide to Conversation Practice", "author": "V. Sasikumar & P.V. Dhamija", "publisher": "Tata McGraw-Hill · latest edition", "why": "Designed for the Indian learner. Functional units (greetings, agreeing/disagreeing, requesting, complaining) with sample dialogues."}, {"title": "The Elements of Style", "author": "William Strunk Jr. and E.B. White", "publisher": "Pearson · 4th Edition", "why": "A short, classic style guide. The 'omit needless words' philosophy will transform your professional writing. Read it in one sitting; re-read annually."}], "sources": [{"name": "BBC Learning English", "url": "https://www.bbc.co.uk/learningenglish", "description": "The single best free resource for spoken English. 6 Minute English (vocabulary), English at Work (business), Pronunciation in the News (IPA-based)."}, {"name": "British Council India", "url": "https://www.britishcouncil.in/english", "description": "Free LearnEnglish app and online courses. Strong on grammar exercises and IELTS preparation."}, {"name": "Cambridge Dictionary", "url": "https://dictionary.cambridge.org/", "description": "Free dictionary with pronunciation audio (British and American), example sentences, collocations. Better than Google Translate for nuance."}, {"name": "VOA Learning English", "url": "https://learningenglish.voanews.com/", "description": "News stories at three levels of speed. Best for slow-paced listening practice that builds up to native speed."}, {"name": "Grammarly Blog", "url": "https://www.grammarly.com/blog", "description": "Bite-sized articles on grammar, usage, and writing style. Browser extension catches common errors in real time."}, {"name": "engVid", "url": "https://www.engvid.com/", "description": "Free video lessons by native-speaker teachers. Particularly strong on pronunciation and accent."}, {"name": "Coursera / edX — English Courses", "url": "https://www.coursera.org/browse/language-learning/learning-english", "description": "University-level English courses. The Georgia Tech 'Business Writing' course is excellent for professional writing."}, {"name": "TED Talks (with English subtitles)", "url": "https://www.ted.com/", "description": "10–18 minute talks on a wide range of topics. Best for practising listening to varied accents and absorbing rhetorical structure."}]}];

const STORAGE_KEY = "structuring_planner_v1";
const state = JSON.parse(localStorage.getItem(STORAGE_KEY) || "{}");
state.tasks = state.tasks || {};
state.books = state.books || {};
state.notes = state.notes || "";

function save() { localStorage.setItem(STORAGE_KEY, JSON.stringify(state)); }

function escapeHTML(s) {
  return String(s == null ? "" : s).replace(/[&<>"']/g, c => ({
    "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;"
  }[c]));
}

let materialFilter = "all";

function taskId(area, wi, ti) {
  return area.task_prefix + wi + "_t" + ti;
}

function sectionShell(title, count, body, open) {
  const openAttr = open ? " open" : "";
  const countHTML = count != null ? '<span class="section-count">' + escapeHTML(count) + '</span>' : "";
  return '<details class="content-section"' + openAttr + '>' +
    '<summary>' +
      '<span class="section-title">' +
        '<span class="section-title-text">' + escapeHTML(title) + '</span>' +
        countHTML +
      '</span>' +
      '<span class="section-chevron"></span>' +
    '</summary>' +
    '<div class="section-body">' + body + '</div>' +
  '</details>';
}

// ----- per-subject section renderers -----

function renderWeeksSection(area) {
  const rows = area.weeks.map((w, wi) => {
    const tasks = w.tasks.map((t, ti) => {
      const id = taskId(area, wi, ti);
      const done = !!state.tasks[id];
      return '<li class="task ' + (done ? 'done' : '') + '">' +
        '<input type="checkbox" data-id="' + escapeHTML(id) + '" ' + (done ? 'checked' : '') + '>' +
        '<span>' + escapeHTML(t) + '</span></li>';
    }).join("");
    const allDone = w.tasks.length > 0 && w.tasks.every((_, ti) => state.tasks[taskId(area, wi, ti)]);
    return '<article class="week-card ' + (allDone ? 'complete' : '') + '">' +
      '<div class="week-head">' +
        '<span class="week-tag">Week ' + escapeHTML(w.week) + '</span>' +
        '<span class="week-title">' + escapeHTML(w.title) + '</span>' +
      '</div>' +
      '<p class="week-focus">' + escapeHTML(w.focus) + '</p>' +
      '<ul class="tasks">' + tasks + '</ul></article>';
  }).join("");
  const count = area.weeks.length + " weeks";
  return sectionShell("Roadmap", count, '<div class="weeks-grid">' + rows + '</div>', true);
}

function renderConceptsSection(area) {
  if (!area.concepts || !area.concepts.length) return "";
  const html = area.concepts.map(c => {
    const example = c.example ? '<h4>Example</h4><div class="example">' + c.example + '</div>' : '';
    const hooks = c.hooks ? '<h4>Statutory hooks</h4><p>' + c.hooks + '</p>' : '';
    const pitfalls = c.pitfalls ? '<h4>Common pitfalls</h4><p>' + c.pitfalls + '</p>' : '';
    return '<details class="concept">' +
      '<summary>' +
        '<span class="concept-tag">' + escapeHTML(c.tag) + '</span>' +
        '<div class="concept-title">' + escapeHTML(c.title) + '</div>' +
        '<div class="concept-summary">' + escapeHTML(c.summary) + '</div>' +
      '</summary>' +
      '<div class="concept-body">' +
        '<h4>The idea</h4><p>' + c.body + '</p>' +
        example + hooks + pitfalls +
      '</div></details>';
  }).join("");
  return sectionShell("Concepts & Examples", area.concepts.length, html, false);
}

function renderTopicsSection(area) {
  if (!area.topics || !area.topics.length) return "";
  const items = area.topics.map(t => '<li>' + escapeHTML(t) + '</li>').join("");
  return sectionShell("Key Topics", area.topics.length, '<ul class="topics-list">' + items + '</ul>', false);
}

function renderDeepDiveSection(area) {
  if (!area.note_body) return "";
  const body = '<div class="deep-dive-body article-body">' + area.note_body + '</div>';
  return sectionShell("Deep-Dive Study Note", null, body, false);
}

function renderMaterialsSection(area) {
  if (!area.materials || !area.materials.length) return "";
  const filters = ['<button class="materials-filter ' + (materialFilter === "all" ? "active" : "") + '" data-filter="all">All</button>',
                   '<button class="materials-filter ' + (materialFilter === "Study Note" ? "active" : "") + '" data-filter="Study Note">Study Notes</button>',
                   '<button class="materials-filter ' + (materialFilter === "Cheat Sheet" ? "active" : "") + '" data-filter="Cheat Sheet">Cheat Sheets</button>',
                   '<button class="materials-filter ' + (materialFilter === "Case Digest" ? "active" : "") + '" data-filter="Case Digest">Case Law</button>'].join("");

  const groups = { "Study Note": [], "Cheat Sheet": [], "Case Digest": [] };
  area.materials.forEach(m => { if (groups[m.kind]) groups[m.kind].push(m); });
  const order = ["Study Note", "Cheat Sheet", "Case Digest"];
  const labels = { "Study Note": "Study Notes", "Cheat Sheet": "Cheat Sheets", "Case Digest": "Case Digests" };

  const groupsHTML = order.filter(k => groups[k].length && (materialFilter === "all" || materialFilter === k)).map(k => {
    const items = groups[k].map(m =>
      '<details class="material-item" id="mat-' + escapeHTML(m.slug) + '">' +
        '<summary>' +
          '<div class="material-item-title">' + escapeHTML(m.title) + '</div>' +
          '<div class="material-item-summary">' + escapeHTML(m.summary) + '</div>' +
        '</summary>' +
        '<div class="material-item-body article-body">' + m.body + '</div>' +
      '</details>'
    ).join("");
    return '<div class="material-group"><div class="material-group-head">' + escapeHTML(labels[k]) + '</div>' + items + '</div>';
  }).join("");

  const body = '<div class="materials-controls">' + filters + '</div>' +
               '<div id="materials-' + escapeHTML(area.slug) + '">' + groupsHTML + '</div>';
  return sectionShell("Notes, Cheat Sheets & Case Law", area.materials.length, body, false);
}

function renderBooksSection(area) {
  if (!area.books || !area.books.length) return "";
  const cards = area.books.map((b, i) => {
    const id = "book_" + area.slug + "_" + i;
    const owned = !!state.books[id];
    const priority = b.priority || "";
    const publisher = b.publisher || "";
    return '<article class="book-card">' +
      (priority ? '<div class="book-priority">' + escapeHTML(priority) + '</div>' : "") +
      '<div class="book-title">' + escapeHTML(b.title) + '</div>' +
      '<div class="book-author">' + escapeHTML(b.author) + '</div>' +
      '<div class="book-publisher">' + escapeHTML(publisher) + '</div>' +
      '<p class="book-why">' + escapeHTML(b.why) + '</p>' +
      '<label class="book-toggle">' +
        '<input type="checkbox" data-book="' + escapeHTML(id) + '" ' + (owned ? "checked" : "") + '>' +
        '<span class="toggle-dot"></span>' +
        '<span class="toggle-label">' + (owned ? "In library" : "Mark acquired") + '</span>' +
      '</label></article>';
  }).join("");
  return sectionShell("Books", area.books.length, '<div class="books-grid">' + cards + '</div>', false);
}

function renderSourcesSection(area) {
  if (!area.sources || !area.sources.length) return "";
  const cards = area.sources.map(s =>
    '<a class="source-card" href="' + escapeHTML(s.url) + '" target="_blank" rel="noopener">' +
      (s.type ? '<div class="source-type">' + escapeHTML(s.type) + '</div>' : "") +
      '<div class="source-title">' + escapeHTML(s.name) + ' →</div>' +
      '<div class="source-desc">' + escapeHTML(s.description) + '</div>' +
      '<div class="source-url">' + escapeHTML(s.url) + '</div>' +
    '</a>'
  ).join("");
  return sectionShell("Online Sources", area.sources.length, '<div class="sources-list">' + cards + '</div>', false);
}

function renderMatrixSection(area) {
  if (!area.matrix) return "";
  const m = area.matrix;
  const headers = ["Mode"].concat(m.columns);
  const head = '<thead><tr>' + headers.map(h => '<th>' + escapeHTML(h) + '</th>').join("") + '</tr></thead>';
  const body = '<tbody>' + m.rows.map(r =>
    '<tr>' + r.map(c => '<td>' + escapeHTML(c) + '</td>').join("") + '</tr>'
  ).join("") + '</tbody>';
  return sectionShell("Cross-Statute Matrix", m.rows.length + " modes", '<div class="matrix-wrap"><table>' + head + body + '</table></div>', false);
}

// ----- top-level renderers -----

function renderTabs() {
  const tabs = document.getElementById("tabs");
  let html = AREAS.map((a, i) =>
    '<button class="tab ' + (i === 0 ? "active" : "") + '" data-target="panel-' + escapeHTML(a.slug) + '">' +
      escapeHTML(a.title) +
    '</button>'
  ).join("");
  html += '<button class="tab" data-target="panel-notebook">Notebook</button>';
  tabs.innerHTML = html;
}

function renderPanels() {
  const panels = document.getElementById("panels");
  let html = AREAS.map((a, i) => {
    return '<section class="tab-panel ' + (i === 0 ? "active" : "") + '" id="panel-' + escapeHTML(a.slug) + '">' +
      '<div class="area-intro">' +
        '<h2>' + escapeHTML(a.title) + '</h2>' +
        '<p class="subtitle-line">' + escapeHTML(a.subtitle) + '</p>' +
        (a.summary ? '<p class="area-summary">' + escapeHTML(a.summary) + '</p>' : "") +
      '</div>' +
      renderWeeksSection(a) +
      renderConceptsSection(a) +
      renderTopicsSection(a) +
      renderDeepDiveSection(a) +
      renderMaterialsSection(a) +
      renderBooksSection(a) +
      renderSourcesSection(a) +
      renderMatrixSection(a) +
    '</section>';
  }).join("");

  // Notebook panel
  html += '<section class="tab-panel" id="panel-notebook">' +
    '<div class="area-intro">' +
      '<h2>Notebook</h2>' +
      '<p class="subtitle-line">A scratchpad for case-law digests, section numbers and questions. Saves automatically in this browser.</p>' +
    '</div>' +
    '<div class="notes-pad">' +
      '<textarea id="notes-text" placeholder="Begin writing — your notes are saved locally in this browser…"></textarea>' +
      '<div class="notes-meta">' +
        '<span>Auto-saved locally</span>' +
        '<span id="word-count">0 words</span>' +
      '</div>' +
    '</div>' +
  '</section>';

  panels.innerHTML = html;
}

function attachHandlers() {
  // Tab switching
  document.querySelectorAll(".tab").forEach(tab => {
    tab.addEventListener("click", () => {
      document.querySelectorAll(".tab").forEach(t => t.classList.remove("active"));
      document.querySelectorAll(".tab-panel").forEach(p => p.classList.remove("active"));
      tab.classList.add("active");
      const target = document.getElementById(tab.dataset.target);
      if (target) target.classList.add("active");
      window.scrollTo({ top: 0, behavior: "smooth" });
    });
  });

  // Task checkboxes
  document.querySelectorAll('.task input[type="checkbox"]').forEach(cb => {
    cb.addEventListener("change", () => {
      state.tasks[cb.dataset.id] = cb.checked;
      save();
      renderPanels();
      attachHandlers();
      updateProgress();
    });
  });

  // Book toggles
  document.querySelectorAll('input[data-book]').forEach(cb => {
    cb.addEventListener("change", () => {
      state.books[cb.dataset.book] = cb.checked;
      save();
      renderPanels();
      attachHandlers();
    });
  });

  // Material filters
  document.querySelectorAll('.materials-filter').forEach(btn => {
    btn.addEventListener("click", () => {
      materialFilter = btn.dataset.filter;
      renderPanels();
      attachHandlers();
    });
  });

  // Notebook
  const notesEl = document.getElementById("notes-text");
  const wcEl = document.getElementById("word-count");
  if (notesEl) {
    notesEl.value = state.notes;
    const wordCount = t => t.trim() ? t.trim().split(/\s+/).length : 0;
    if (wcEl) wcEl.textContent = wordCount(notesEl.value) + " words";
    let saveTimer;
    notesEl.addEventListener("input", () => {
      state.notes = notesEl.value;
      if (wcEl) wcEl.textContent = wordCount(notesEl.value) + " words";
      clearTimeout(saveTimer);
      saveTimer = setTimeout(save, 350);
    });
  }
}

function updateProgress() {
  let total = 0, done = 0;
  AREAS.forEach(a => {
    a.weeks.forEach((w, wi) => {
      total += w.tasks.length;
      done += w.tasks.filter((_, ti) => state.tasks[taskId(a, wi, ti)]).length;
    });
  });
  const pct = total ? Math.round((done / total) * 100) : 0;
  document.getElementById("pct").textContent = pct;
  document.getElementById("bar").style.width = pct + "%";
  document.getElementById("done-count").textContent = done;
  document.getElementById("total-count").textContent = total;
}

// Restore active tab from hash, if any
function restoreFromHash() {
  if (location.hash) {
    const slug = location.hash.replace("#", "");
    const tab = document.querySelector('[data-target="panel-' + slug + '"]');
    if (tab) tab.click();
  }
}

// Boot
renderTabs();
renderPanels();
attachHandlers();
updateProgress();
restoreFromHash();
</script>
</body>
</html>
