<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Study Planner — Restructuring &amp; Mastery</title>
<style>
:root {
  --bg: #faf7f0;
  --bg-tint: #fdfbf6;
  --paper: #ffffff;
  --paper-2: #fbf8f1;
  --paper-3: #f7f2e6;
  --ink: #2c2a28;
  --ink-soft: #5a554c;
  --ink-mute: #9c968a;
  --accent: #a05661;
  --accent-deep: #7e3d49;
  --accent-soft: #d6a8b0;
  --accent-tint: #f7e8eb;
  --gold: #b48854;
  --gold-soft: #e0c194;
  --gold-tint: #f8efdb;
  --sage: #7d9484;
  --sage-tint: #e6ede8;
  --border: #ede4d0;
  --border-soft: #f4ecd9;
  --code-bg: #f7ecd4;
  --shadow-sm: 0 1px 2px rgba(160, 130, 90, 0.08);
  --shadow: 0 2px 4px rgba(160, 130, 90, 0.06), 0 6px 18px rgba(160, 130, 90, 0.08);
  --shadow-lg: 0 4px 8px rgba(160, 130, 90, 0.08), 0 16px 36px rgba(160, 130, 90, 0.10);
}

* { box-sizing: border-box; margin: 0; padding: 0; }
html { scroll-behavior: smooth; }

body {
  background: var(--bg);
  background-image:
    radial-gradient(at 20% 0%, var(--accent-tint) 0%, transparent 35%),
    radial-gradient(at 90% 100%, var(--sage-tint) 0%, transparent 45%);
  background-attachment: fixed;
  color: var(--ink);
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
  font-size: 16px;
  line-height: 1.65;
  -webkit-font-smoothing: antialiased;
  letter-spacing: 0.005em;
}

.container {
  max-width: 1100px;
  margin: 0 auto;
  padding: 40px 28px 80px;
}

a { color: var(--accent); text-decoration: none; }
a:hover { text-decoration: underline; }

/* === Header === */
.header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  flex-wrap: wrap;
  gap: 28px;
  padding: 28px 32px;
  margin-bottom: 28px;
  background: var(--paper);
  border: 1px solid var(--border-soft);
  border-radius: 16px;
  box-shadow: var(--shadow);
}
.header-text { flex: 1; min-width: 280px; }
.eyebrow {
  font-size: 10px;
  font-weight: 700;
  letter-spacing: 0.22em;
  text-transform: uppercase;
  color: var(--accent);
  margin-bottom: 8px;
  display: inline-block;
  background: var(--accent-tint);
  padding: 4px 10px;
  border-radius: 12px;
}
h1 {
  font-size: clamp(1.8rem, 4vw, 2.3rem);
  font-weight: 700;
  letter-spacing: -0.02em;
  line-height: 1.15;
  color: var(--ink);
}
.subtitle {
  margin-top: 8px;
  font-size: 0.98rem;
  color: var(--ink-soft);
  max-width: 620px;
  line-height: 1.55;
}
.progress-card {
  background: linear-gradient(135deg, var(--gold-tint), var(--accent-tint));
  border: 1px solid var(--border-soft);
  padding: 16px 22px;
  min-width: 200px;
  border-radius: 12px;
  box-shadow: var(--shadow-sm);
}
.progress-card .label {
  font-size: 10px;
  letter-spacing: 0.16em;
  text-transform: uppercase;
  color: var(--ink-soft);
  margin-bottom: 4px;
  font-weight: 600;
}
.progress-card .value {
  font-size: 1.8rem;
  font-weight: 700;
  color: var(--ink);
  letter-spacing: -0.02em;
}
.progress-card .pct { color: var(--accent); margin-left: 2px; font-size: 1rem; }
.progress-bar {
  margin-top: 8px;
  height: 6px;
  background: rgba(255, 255, 255, 0.65);
  border-radius: 4px;
  overflow: hidden;
}
.progress-bar-fill {
  height: 100%;
  width: 0;
  background: linear-gradient(90deg, var(--gold), var(--accent));
  border-radius: 4px;
  transition: width 0.6s cubic-bezier(0.16, 1, 0.3, 1);
}
.progress-card .meta {
  margin-top: 6px;
  font-size: 11px;
  color: var(--ink-mute);
}

/* === Tabs === */
.tabs {
  display: flex;
  gap: 8px;
  margin-bottom: 28px;
  padding: 6px;
  background: var(--paper);
  border: 1px solid var(--border-soft);
  border-radius: 14px;
  box-shadow: var(--shadow-sm);
  overflow-x: auto;
  flex-wrap: wrap;
}
.tab {
  background: transparent;
  border: 1px solid transparent;
  padding: 9px 16px;
  font-size: 0.92rem;
  font-weight: 500;
  color: var(--ink-soft);
  cursor: pointer;
  border-radius: 9px;
  white-space: nowrap;
  font-family: inherit;
  transition: all 0.18s ease;
  letter-spacing: 0.01em;
}
.tab:hover {
  color: var(--ink);
  background: var(--paper-2);
}
.tab.active {
  color: var(--accent);
  background: var(--accent-tint);
  border-color: var(--accent-soft);
  font-weight: 600;
}

.tab-panel { display: none; }
.tab-panel.active { display: block; animation: fade 0.3s cubic-bezier(0.16, 1, 0.3, 1); }
@keyframes fade { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: none; } }

/* === Area header === */
.area-intro {
  margin-bottom: 24px;
  padding: 24px 28px;
  background: linear-gradient(135deg, var(--accent-tint) 0%, var(--paper) 60%);
  border: 1px solid var(--border-soft);
  border-radius: 14px;
  box-shadow: var(--shadow-sm);
}
.area-intro h2 {
  font-size: 1.6rem;
  font-weight: 700;
  letter-spacing: -0.02em;
  color: var(--ink);
  margin-bottom: 4px;
}
.area-intro .subtitle-line {
  font-size: 0.98rem;
  color: var(--accent-deep);
  margin-bottom: 8px;
  font-weight: 500;
}
.area-intro .area-summary {
  font-size: 0.95rem;
  color: var(--ink-soft);
  max-width: 760px;
  line-height: 1.6;
}

/* === Section accordion === */
.content-section {
  margin-bottom: 14px;
  background: var(--paper);
  border: 1px solid var(--border-soft);
  border-radius: 12px;
  box-shadow: var(--shadow-sm);
  overflow: hidden;
  transition: box-shadow 0.2s;
}
.content-section[open] { box-shadow: var(--shadow); }
.content-section > summary {
  list-style: none;
  cursor: pointer;
  padding: 18px 26px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 14px;
  position: relative;
  transition: background 0.15s;
}
.content-section > summary::-webkit-details-marker { display: none; }
.content-section > summary:hover { background: var(--paper-2); }
.section-title {
  display: flex;
  align-items: center;
  gap: 14px;
  flex: 1;
}
.section-title-text {
  font-size: 1.05rem;
  font-weight: 700;
  color: var(--ink);
  letter-spacing: -0.005em;
}
.section-count {
  display: inline-block;
  font-size: 11px;
  font-weight: 600;
  letter-spacing: 0.06em;
  color: var(--ink-soft);
  background: var(--paper-3);
  padding: 3px 10px;
  border-radius: 10px;
  border: 1px solid var(--border-soft);
}
.section-chevron {
  width: 28px;
  height: 28px;
  border-radius: 50%;
  background: var(--accent-tint);
  color: var(--accent);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 1.05rem;
  font-weight: 600;
  line-height: 1;
  transition: transform 0.25s ease;
}
.content-section[open] .section-chevron { transform: rotate(180deg); }
.section-chevron::before { content: "▾"; }
.section-body {
  padding: 6px 26px 28px;
  border-top: 1px solid var(--border-soft);
}

/* === Week cards === */
.weeks-grid { display: grid; gap: 12px; }
.week-card {
  background: var(--paper-2);
  border: 1px solid var(--border-soft);
  border-radius: 10px;
  padding: 18px 22px;
  position: relative;
  transition: all 0.2s ease;
}
.week-card::before {
  content: "";
  position: absolute;
  left: 0;
  top: 16px;
  bottom: 16px;
  width: 3px;
  background: var(--border);
  border-radius: 0 3px 3px 0;
  transition: background 0.2s;
}
.week-card:hover {
  background: var(--paper);
  box-shadow: var(--shadow-sm);
}
.week-card:hover::before { background: var(--accent-soft); }
.week-card.complete {
  background: linear-gradient(135deg, var(--gold-tint), var(--paper));
  border-color: var(--gold-soft);
}
.week-card.complete::before { background: var(--gold); }
.week-card.complete::after {
  content: "✓ COMPLETE";
  position: absolute;
  top: 18px;
  right: 22px;
  font-size: 10px;
  letter-spacing: 0.14em;
  color: var(--gold);
  font-weight: 700;
}
.week-head {
  display: flex;
  align-items: baseline;
  gap: 12px;
  margin-bottom: 6px;
  flex-wrap: wrap;
}
.week-tag {
  font-size: 10px;
  font-weight: 700;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  color: var(--accent);
  background: var(--accent-tint);
  padding: 4px 10px;
  border-radius: 10px;
  border: 1px solid var(--accent-soft);
}
.week-title {
  font-size: 1.1rem;
  font-weight: 700;
  color: var(--ink);
}
.week-focus {
  font-size: 0.95rem;
  color: var(--ink-soft);
  font-style: italic;
  margin-bottom: 10px;
}
.tasks { list-style: none; }
.task {
  display: flex;
  gap: 10px;
  align-items: flex-start;
  padding: 7px 0;
  cursor: pointer;
  font-size: 0.94rem;
  color: var(--ink-soft);
  border-bottom: 1px dashed var(--border-soft);
}
.task:last-child { border-bottom: none; }
.task:hover { color: var(--ink); }
.task input[type="checkbox"] {
  appearance: none;
  -webkit-appearance: none;
  width: 16px;
  height: 16px;
  border: 1.5px solid var(--ink-mute);
  border-radius: 3px;
  margin-top: 3px;
  flex-shrink: 0;
  cursor: pointer;
  position: relative;
}
.task input[type="checkbox"]:checked {
  background: var(--accent);
  border-color: var(--accent);
}
.task input[type="checkbox"]:checked::after {
  content: "";
  position: absolute;
  left: 4px;
  top: 1px;
  width: 4px;
  height: 9px;
  border: solid #fff;
  border-width: 0 1.5px 1.5px 0;
  transform: rotate(45deg);
}
.task.done { color: var(--ink-mute); text-decoration: line-through; }

/* === Concept cards (restructuring) === */
.concept {
  background: var(--paper-2);
  border: 1px solid var(--border-soft);
  border-radius: 10px;
  padding: 18px 22px;
  margin-bottom: 10px;
  transition: all 0.18s;
}
.concept:hover { background: var(--paper); box-shadow: var(--shadow-sm); }
.concept[open] { background: var(--paper); box-shadow: var(--shadow-sm); }
.concept summary {
  cursor: pointer;
  list-style: none;
  outline: none;
  position: relative;
  padding-right: 30px;
}
.concept summary::-webkit-details-marker { display: none; }
.concept summary::after {
  content: "+";
  position: absolute;
  right: 0;
  top: -2px;
  font-size: 1.4rem;
  color: var(--accent);
  font-weight: 300;
  line-height: 1;
}
.concept[open] summary::after { content: "−"; }
.concept-tag {
  display: inline-block;
  font-size: 10px;
  font-weight: 700;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  color: var(--sage);
  background: var(--sage-tint);
  padding: 4px 10px;
  border-radius: 10px;
  margin-bottom: 8px;
}
.concept-title {
  font-size: 1.1rem;
  font-weight: 700;
  color: var(--ink);
  margin-bottom: 4px;
}
.concept-summary {
  font-size: 0.95rem;
  color: var(--ink-soft);
  font-style: italic;
}
.concept-body {
  margin-top: 14px;
  padding-top: 14px;
  border-top: 1px solid var(--border-soft);
  font-size: 0.96rem;
  color: var(--ink-soft);
}
.concept-body h4 {
  font-size: 0.78rem;
  text-transform: uppercase;
  letter-spacing: 0.12em;
  color: var(--gold);
  margin: 14px 0 6px;
  font-weight: 700;
}
.concept-body h4:first-child { margin-top: 0; }
.concept-body p { margin-bottom: 8px; }
.concept-body .example {
  background: var(--paper-2);
  border-left: 3px solid var(--gold);
  padding: 12px 16px;
  margin: 10px 0;
  border-radius: 0 4px 4px 0;
}
.concept-body code, .concept-body .sec {
  background: var(--code-bg);
  padding: 1px 6px;
  border-radius: 3px;
  font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
  font-size: 0.88em;
  color: var(--ink);
}

/* === Topics list === */
.topics-list {
  columns: 2;
  column-gap: 28px;
  margin-left: 18px;
}
.topics-list li {
  margin-bottom: 5px;
  font-size: 0.95rem;
  color: var(--ink-soft);
  break-inside: avoid;
}
@media (max-width: 720px) {
  .topics-list { columns: 1; }
}

/* === Deep-dive note (now rendered as inline article inside its dropdown) === */
.deep-dive-body {
  background: var(--paper-2);
  padding: 24px 28px;
  border-radius: 10px;
  font-size: 0.98rem;
  line-height: 1.7;
  color: var(--ink-soft);
}

/* Article body shared styles — used by deep-dive AND material-item bodies */
.article-body h2 {
  font-size: 1.22rem;
  color: var(--ink);
  margin: 22px 0 8px;
  font-weight: 700;
  letter-spacing: -0.005em;
}
.article-body h2:first-child { margin-top: 0; }
.article-body h3 {
  font-size: 1.05rem;
  color: var(--ink);
  margin: 18px 0 6px;
  font-weight: 700;
}
.article-body h4 {
  font-size: 0.78rem;
  text-transform: uppercase;
  letter-spacing: 0.12em;
  color: var(--accent);
  margin: 16px 0 6px;
  font-weight: 700;
}
.article-body p { margin-bottom: 8px; }
.article-body ul, .article-body ol { margin: 0 0 10px 22px; }
.article-body li { margin-bottom: 3px; }
.article-body code, .article-body .sec {
  background: var(--code-bg);
  padding: 1px 6px;
  border-radius: 3px;
  font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
  font-size: 0.86em;
  color: var(--ink);
}
.article-body blockquote {
  border-left: 3px solid var(--gold);
  background: var(--paper);
  padding: 10px 16px;
  margin: 10px 0;
  font-style: italic;
  color: var(--ink-soft);
  border-radius: 0 4px 4px 0;
}
.article-body .callout {
  border-left: 3px solid var(--accent);
  background: rgba(122, 43, 52, 0.05);
  padding: 12px 16px;
  margin: 14px 0;
  border-radius: 0 4px 4px 0;
}
.article-body .callout strong { color: var(--accent); }
.article-body table {
  width: 100%;
  min-width: 0;
  margin: 12px 0;
  border-collapse: collapse;
  font-size: 0.9rem;
}
.article-body table th {
  background: var(--paper);
  text-align: left;
  padding: 10px 12px;
  border-bottom: 2px solid var(--accent);
  border-right: 1px solid var(--border-soft);
  font-size: 11px;
  text-transform: uppercase;
  letter-spacing: 0.08em;
  color: var(--accent);
  font-weight: 700;
}
.article-body table td {
  padding: 10px 12px;
  border-bottom: 1px solid var(--border-soft);
  border-right: 1px solid var(--border-soft);
  vertical-align: top;
}
.article-body table th:last-child,
.article-body table td:last-child { border-right: none; }

/* === Material items (restructuring's notes/cheat sheets/case digests) === */
.materials-controls {
  display: flex;
  flex-wrap: wrap;
  gap: 6px;
  margin-bottom: 14px;
}
.materials-filter {
  background: var(--paper-2);
  border: 1px solid var(--border-soft);
  border-radius: 16px;
  padding: 6px 14px;
  font: inherit;
  font-size: 12px;
  font-weight: 500;
  letter-spacing: 0.03em;
  color: var(--ink-soft);
  cursor: pointer;
  transition: all 0.15s;
}
.materials-filter:hover { border-color: var(--accent-soft); color: var(--ink); background: var(--accent-tint); }
.materials-filter.active {
  background: var(--accent);
  color: #fff;
  border-color: var(--accent);
}
.material-group { margin-bottom: 22px; }
.material-group-head {
  font-size: 0.78rem;
  text-transform: uppercase;
  letter-spacing: 0.14em;
  color: var(--accent);
  font-weight: 700;
  margin-bottom: 10px;
}
.material-item {
  background: var(--paper-2);
  border: 1px solid var(--border-soft);
  border-radius: 10px;
  margin-bottom: 8px;
  overflow: hidden;
  transition: all 0.15s;
}
.material-item:hover { background: var(--paper); }
.material-item[open] { background: var(--paper); box-shadow: var(--shadow-sm); }
.material-item summary {
  list-style: none;
  cursor: pointer;
  padding: 12px 20px;
  position: relative;
  padding-right: 50px;
  transition: background 0.15s;
}
.material-item summary::-webkit-details-marker { display: none; }
.material-item summary:hover { background: var(--paper-2); }
.material-item summary::after {
  content: "+";
  position: absolute;
  top: 10px;
  right: 20px;
  font-size: 1.4rem;
  color: var(--accent);
  font-weight: 300;
  line-height: 1;
}
.material-item[open] summary::after { content: "−"; }
.material-item-title {
  font-size: 1rem;
  font-weight: 700;
  color: var(--ink);
  margin-bottom: 2px;
}
.material-item-summary {
  font-size: 0.9rem;
  color: var(--ink-soft);
  font-style: italic;
}
.material-item-body {
  border-top: 1px solid var(--border-soft);
  padding: 22px 28px 26px;
  background: var(--paper);
  font-size: 0.97rem;
  line-height: 1.7;
  color: var(--ink-soft);
}

/* === Books === */
.books-grid {
  display: grid;
  gap: 14px;
  grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
}
.book-card {
  background: linear-gradient(180deg, var(--paper) 60%, var(--gold-tint) 100%);
  border: 1px solid var(--border-soft);
  border-radius: 12px;
  padding: 18px 20px;
  display: flex;
  flex-direction: column;
  position: relative;
  transition: all 0.2s ease;
}
.book-card::before {
  content: "";
  position: absolute;
  left: 0;
  top: 18px;
  bottom: 18px;
  width: 3px;
  background: var(--gold);
  border-radius: 0 3px 3px 0;
}
.book-card:hover { transform: translateY(-2px); box-shadow: var(--shadow); }
.book-priority {
  font-size: 10px;
  font-weight: 700;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  color: var(--gold);
  margin-bottom: 6px;
}
.book-title {
  font-size: 1rem;
  font-weight: 700;
  color: var(--ink);
  margin-bottom: 2px;
  line-height: 1.25;
}
.book-author {
  font-size: 0.92rem;
  color: var(--ink-soft);
  font-style: italic;
  margin-bottom: 2px;
}
.book-publisher {
  font-size: 11px;
  color: var(--ink-mute);
  text-transform: uppercase;
  letter-spacing: 0.06em;
  margin-bottom: 8px;
}
.book-why {
  font-size: 0.92rem;
  color: var(--ink-soft);
  margin-bottom: 12px;
  flex: 1;
}
.book-toggle {
  font-size: 11px;
  text-transform: uppercase;
  letter-spacing: 0.1em;
  color: var(--ink-mute);
  cursor: pointer;
  padding-top: 10px;
  border-top: 1px solid var(--border-soft);
  display: flex;
  align-items: center;
  gap: 8px;
  user-select: none;
}
.book-toggle input { display: none; }
.toggle-dot {
  width: 10px;
  height: 10px;
  border-radius: 50%;
  border: 1.5px solid var(--ink-mute);
}
.book-toggle input:checked + .toggle-dot { background: var(--gold); border-color: var(--gold); }
.book-toggle input:checked ~ .toggle-label { color: var(--gold); }

/* === Sources === */
.sources-list { display: grid; gap: 10px; }
.source-card {
  background: var(--paper-2);
  border: 1px solid var(--border-soft);
  border-radius: 10px;
  padding: 14px 20px;
  display: block;
  color: var(--ink);
  position: relative;
  transition: all 0.18s ease;
}
.source-card::before {
  content: "";
  position: absolute;
  left: 0;
  top: 14px;
  bottom: 14px;
  width: 3px;
  background: var(--sage);
  border-radius: 0 3px 3px 0;
  opacity: 0.6;
  transition: opacity 0.18s;
}
.source-card:hover {
  background: var(--paper);
  box-shadow: var(--shadow-sm);
  text-decoration: none;
  transform: translateX(2px);
}
.source-card:hover::before { opacity: 1; }
.source-type {
  font-size: 10px;
  text-transform: uppercase;
  letter-spacing: 0.14em;
  color: var(--sage);
  font-weight: 700;
  margin-bottom: 4px;
}
.source-title { font-size: 1rem; font-weight: 700; color: var(--ink); margin-bottom: 4px; }
.source-desc { font-size: 0.92rem; color: var(--ink-soft); margin-bottom: 4px; }
.source-url { font-size: 11px; color: var(--ink-mute); word-break: break-all; }

/* === Matrix === */
.matrix-wrap {
  overflow-x: auto;
  border: 1px solid var(--border-soft);
  background: var(--paper);
  border-radius: 10px;
}
.matrix-wrap table { width: 100%; border-collapse: collapse; font-size: 0.86rem; min-width: 900px; }
.matrix-wrap th, .matrix-wrap td {
  text-align: left;
  padding: 12px 14px;
  border-bottom: 1px solid var(--border-soft);
  border-right: 1px solid var(--border-soft);
  vertical-align: top;
}
.matrix-wrap th {
  font-size: 10px;
  text-transform: uppercase;
  letter-spacing: 0.1em;
  color: var(--accent);
  font-weight: 700;
  background: rgba(122, 43, 52, 0.04);
  white-space: nowrap;
}
.matrix-wrap td:first-child {
  font-weight: 700;
  color: var(--ink);
  background: var(--paper-2);
  white-space: nowrap;
}
.matrix-wrap td { color: var(--ink-soft); line-height: 1.5; }
.matrix-wrap tr:last-child td { border-bottom: none; }
.matrix-wrap th:last-child, .matrix-wrap td:last-child { border-right: none; }

/* === Notebook === */
.notes-pad {
  background: var(--paper);
  border: 1px solid var(--border-soft);
  border-radius: 12px;
  box-shadow: var(--shadow-sm);
}
.notes-pad textarea {
  width: 100%;
  min-height: 480px;
  border: none;
  background: transparent;
  padding: 24px 28px;
  font-family: inherit;
  font-size: 1rem;
  line-height: 1.7;
  color: var(--ink);
  resize: vertical;
  outline: none;
}
.notes-meta {
  padding: 10px 28px;
  border-top: 1px solid var(--border-soft);
  font-size: 11px;
  color: var(--ink-mute);
  text-transform: uppercase;
  letter-spacing: 0.1em;
  display: flex;
  justify-content: space-between;
}

/* === Footer === */
.footer {
  margin-top: 56px;
  padding-top: 22px;
  border-top: 1px solid var(--border);
  text-align: center;
  font-size: 11px;
  color: var(--ink-mute);
  letter-spacing: 0.12em;
  text-transform: uppercase;
}

@media (max-width: 720px) {
  .container { padding: 28px 16px 60px; }
  .header { flex-direction: column; align-items: stretch; }
  .progress-card { text-align: left; }
  .material-item summary { padding: 10px 16px; padding-right: 44px; }
  .material-item-body { padding: 18px 16px; }
  .deep-dive summary { padding: 14px 18px; }
  .deep-dive-body { padding: 18px 18px 22px; }
}

<script>
const AREAS = [{"slug": "restructuring", "title": "Restructuring", "subtitle": "12-week curriculum across the Companies Act, Income-tax Act, FEMA, SEBI and allied regimes.", "summary": "A staged path through every statute that touches a corporate restructuring transaction. The 12-week roadmap covers schemes, tax, FEMA, listed-company specifics and IBC — paired with concepts, case-law digests, cheat sheets and a cross-statute matrix.", "task_prefix": "w", "weeks": [{"week": "1–2", "title": "Conceptual Base", "focus": "Build the mental map. Why companies restructure, and the menu of routes available.", "tasks": ["Kar & Minakshi — Chapters 1–3: types of restructuring, motivations, M&A theories", "Kar & Minakshi — Chapter on India's merger waves", "ICSI CS Professional study material — procedural overview chapter", "Build a one-page personal taxonomy: merger vs demerger vs slump sale vs buyback vs reduction"]}, {"week": "3", "title": "Companies Act — Schemes Framework", "focus": "Sections 230–232. The procedural backbone of every scheme of arrangement.", "tasks": ["Ramaiya — Section 230 commentary (compromises and arrangements)", "Ramaiya — Section 231 (tribunal powers) and Section 232 (mergers and amalgamations)", "Read the CAA Rules, 2016 end-to-end with Rule 6 and Rule 25 specifically marked", "Pull and read one sanctioned NCLT merger order; underline the dispositive paragraphs"]}, {"week": "4", "title": "Companies Act — Special Routes", "focus": "Section 233 fast-track, Section 234 cross-border, Section 66 reduction, Section 68 buyback.", "tasks": ["Section 233 fast-track + Rule 25 — small co. / WOS / holding-subsidiary thresholds", "Section 234 + Rule 25A — cross-border mergers and the notified jurisdictions", "Section 66 — capital reduction procedure; read alongside NCLT Rules 2016", "Section 68–70 — buyback procedure and the Section 67/70 prohibitions"]}, {"week": "5", "title": "Companies Act — Read Real Schemes", "focus": "The fastest way to learn drafting: read what got sanctioned.", "tasks": ["Read a sanctioned demerger scheme from NCLT portal — note the appointed date logic", "Read a sanctioned capital reduction order — note the rationale and minority protection", "Read a fast-track merger order — note ROC/RD process flow", "Read a cross-border merger order (post-2018) — note the FEMA compliance certificate", "Read a rejected scheme — understand what tribunals flag (under-valuation, oppression)"]}, {"week": "6", "title": "Tax — Amalgamation & Demerger", "focus": "The defining tax sections. Most exam-relevant and most client-relevant.", "tasks": ["Section 2(1B) — definition of amalgamation; three conditions", "Section 2(19AA) — definition of demerger; five conditions", "Section 47(vi)/(vii) for amalgamation; 47(vib)/(vid) for demerger", "Section 49(2)/(2C)/(2D) — cost of acquisition in successor's hands", "Section 72A — carry forward of losses on amalgamation (industrial undertaking test)", "Section 72A(4) — loss carry forward in demerger; proportionate allocation"]}, {"week": "7", "title": "Tax — Slump Sale, Buyback, Reduction", "focus": "The non-court routes. Often more practical than schemes for mid-sized clients.", "tasks": ["Section 50B + Section 2(42C) — slump sale mechanics and Rule 11UAE valuation", "Section 50CA + Section 56(2)(x) — anti-abuse on unquoted share transfers", "Section 115QA buyback tax — track the post-Oct 2024 shift to shareholder taxation", "Section 2(22)(d) and capital-reduction taxation; Anarkali Sarabhai principle", "Section 47A — the withdrawal of exemption clauses; common audit pitfall"]}, {"week": "8", "title": "Tax — The IT Act 2025 Mapping", "focus": "Build your personal section-mapping sheet. Non-optional now that the 2025 Act is in force.", "tasks": ["Map Section 2(1B) → corresponding clause in IT Act 2025", "Map Section 2(19AA) → corresponding clause in IT Act 2025", "Map Section 47 sub-clauses → IT Act 2025 equivalents", "Map Section 72A → IT Act 2025 equivalent; note any change in conditions", "Map Section 50B and Section 56(2)(x) → IT Act 2025 equivalents", "Read at least one Taxmann or Taxsutra digest commentary on the M&A provisions of IT Act 2025"]}, {"week": "9", "title": "FEMA — Cross-Border Mergers", "focus": "The Cross Border Merger Regulations 2018 and the deemed-approval mechanism.", "tasks": ["Read FEMA (Cross Border Merger) Regulations, 2018 in full", "RBI Master Direction on Foreign Investment — the current consolidated text", "Nishith Desai paper: Cross-Border Mergers — Regulatory Overview", "Map inbound vs outbound merger conditions side-by-side", "Understand the 2-year compliance window for non-compliant assets/borrowings"]}, {"week": "10", "title": "FEMA — Investment Rules & Pricing", "focus": "NDI Rules 2019 and ODI Rules 2022 — the foreign exchange overlay on every M&A deal.", "tasks": ["NDI Rules 2019 — pricing guidelines, entry routes, sectoral caps for non-residents", "ODI Rules and Regulations, 2022 — outbound investment for Indian acquirer", "Nishith Desai paper: Reverse Flipping — Time to Internalise into India Inc", "PN3 implications and 'beneficial owner' tests for neighbouring-country investors", "FEMA reporting forms: FC-GPR, FC-TRS, ODI Form, APR — when each triggers"]}, {"week": "11", "title": "SEBI, Stamp, Competition, GST Overlays", "focus": "The four parallel regimes most often missed in tax-only treatment.", "tasks": ["SAST Regulations 2011 — open offer triggers under Regulation 3 and Regulation 4", "LODR Regulation 37 — scheme approval for listed companies; SEBI Master Circular on schemes", "Stamp duty: Telangana stamp schedule for schemes of arrangement; compare with Maharashtra", "Competition Act — Section 5/6 thresholds; the Deal Value Threshold notification (Sept 2024)", "GST: Schedule II, Section 18 ITC transfer on amalgamation, Section 87 transferee liability"]}, {"week": "12", "title": "IBC as a Restructuring Tool", "focus": "Resolution plans and Section 230 schemes during liquidation. The distressed-restructuring path.", "tasks": ["IBC Sections 30–31 — resolution plan as a corporate restructuring vehicle", "Section 230 schemes during liquidation — Regulation 2B of Liquidation Regulations", "Tax treatment of write-backs in resolution; Section 79(2)(c) and Section 115BBI", "Stamp duty exemption on transfer pursuant to NCLT-approved resolution plan", "Final wrap-up: complete the cross-statute matrix on the Matrix tab for your reference"]}], "concepts": [{"tag": "Foundation", "title": "Why companies restructure", "summary": "The five economic motives — and how each maps to a different statutory route.", "body": "Restructuring is never an end in itself. Every transaction answers some commercial pressure: <strong>scale<\/strong> (acquire to grow faster than organically), <strong>synergy<\/strong> (combine to extract cost or revenue gains), <strong>focus<\/strong> (separate non-core businesses so each can be funded and managed on its own merits), <strong>tax efficiency<\/strong> (use loss carry-forwards, reset cost bases, eliminate double taxation), and <strong>regulatory or family<\/strong> reasons (succession, promoter exit, listing, distressed turnaround). Identify the motive first; the legal route follows from it.", "example": "<strong>Example.<\/strong> A diversified group runs FMCG and pharma under one listed entity. The pharma business has different margins, capex cycle, and investor profile. Management <em>demerges<\/em> pharma under Sec 230–232 read with Sec 2(19AA) into a separately listed entity, so each unit gets focused capital. The motive — focus — drives the choice of demerger over slump sale.", "hooks": "Companies Act <span class='sec'>Sec 230–232<\/span> · Income-tax <span class='sec'>Sec 2(1B)<\/span>, <span class='sec'>Sec 2(19AA)<\/span>, <span class='sec'>Sec 50B<\/span> · FEMA Cross Border Merger Regulations 2018.", "pitfalls": "Letting tax tail wag the commercial dog. A scheme designed only for tax efficiency without commercial substance attracts <strong>GAAR<\/strong> and <strong>McDowell<\/strong> scrutiny. Always document the business rationale in the explanatory statement."}, {"tag": "Comparison", "title": "Merger vs Demerger vs Slump Sale vs Buyback vs Capital Reduction", "summary": "When to use each route. The taxonomy every CA needs to know cold.", "body": "Five routes, five mental models. <strong>Merger<\/strong>: company A dissolves into company B; everything moves; shareholders of A get shares of B. <strong>Demerger<\/strong>: one undertaking of company A spins off into a new company R; A continues, R is born; A's shareholders get shares of R pro rata. <strong>Slump sale<\/strong>: company A sells an undertaking to buyer B for cash; no court, no scheme, but tax under Sec 50B. <strong>Buyback<\/strong>: company returns cash to shareholders by buying back its own shares; capital comes down. <strong>Capital reduction<\/strong>: NCLT-approved write-down of paid-up capital, often to clean up accumulated losses or return surplus.", "example": "<strong>Example.<\/strong> Promoter wants to exit one division and take cash. <em>Slump sale<\/em> works if a buyer wants the whole undertaking — fastest, no court. <em>Demerger<\/em> works if the promoter wants to keep ownership but separate listings. <em>Capital reduction<\/em> works if the goal is to return cash from accumulated reserves without divesting the business. Same starting facts, three different routes — pick by commercial goal.", "hooks": "Merger/Demerger: Companies Act <span class='sec'>Sec 230–232<\/span>. Slump sale: Income-tax <span class='sec'>Sec 50B<\/span>, <span class='sec'>Sec 2(42C)<\/span>. Buyback: Companies Act <span class='sec'>Sec 68–70<\/span>, IT <span class='sec'>Sec 115QA<\/span>. Capital reduction: Companies Act <span class='sec'>Sec 66<\/span>, IT <span class='sec'>Sec 2(22)(d)<\/span>.", "pitfalls": "Treating slump sale and itemised sale as interchangeable. If individual asset values are assigned, Sec 50B will not apply — and you lose the favourable treatment. <strong>Drafting note:<\/strong> the BTA must clearly state a lump-sum consideration."}, {"tag": "Tax timing", "title": "Appointed date vs effective date", "summary": "The single most-tested timing concept in scheme practice.", "body": "Every scheme has two dates. The <strong>appointed date<\/strong> is the date the transaction is deemed to take effect for accounting, tax and ownership purposes — the legal fiction. The <strong>effective date<\/strong> is the date the NCLT order is filed with the ROC and the scheme actually operates in real time. The gap between them is usually 6–18 months. All P&L and asset movements between the two dates are deemed to be on behalf of the transferee — even though, in reality, the transferor ran the business.", "example": "<strong>Example.<\/strong> A scheme sets appointed date = 1 April 2024. NCLT sanctions on 15 October 2025. Effective date = 30 October 2025. For FY 2024–25, the transferred undertaking's income is taxed in the transferee's hands, even though tax was paid by the transferor during the year. Reconciliation through a <em>combined return<\/em> or <em>revised return<\/em> is then needed. This is the principle in <strong>Marshall Sons & Co. (India) Ltd. v. ITO (1996) — appointed date binds even when the order comes later<\/strong>.", "hooks": "Companies Act <span class='sec'>Sec 232(6)<\/span> · MCA circular dated 21 August 2019 (appointed date may be a specific date or contingent date; generally not more than 12 months prior to filing) · Marshall Sons principle.", "pitfalls": "Setting an appointed date far in the past (>12 months before filing) without strong commercial justification. The MCA pushes back, and the tax department may treat it as a colourable device. Document the rationale."}, {"tag": "Tax design", "title": "Tax-neutral vs taxable restructuring", "summary": "How the Sec 47 exemption regime works — and how it can be lost.", "body": "The Income-tax Act treats every transfer of a capital asset as a taxable event, unless it falls within <strong>Sec 47<\/strong>. Mergers, demergers, certain cross-border transactions and intra-group share transfers each have specific exemptions: <span class='sec'>Sec 47(vi)/(vii)<\/span> for amalgamation, <span class='sec'>Sec 47(vib)/(vid)<\/span> for demerger, <span class='sec'>Sec 47(via)/(vic)/(vicc)<\/span> for cross-border. Each exemption rides on definitions in <span class='sec'>Sec 2(1B)<\/span> and <span class='sec'>Sec 2(19AA)<\/span> being met. If you fail a single condition, the exemption falls and the entire transaction becomes taxable.", "example": "<strong>Example.<\/strong> Demerger of a logistics undertaking. The scheme transfers vehicles, contracts, employees and goodwill — but the parent <em>retains<\/em> the key customer contract because it's tied to its name. Sec 2(19AA) requires <em>all<\/em> properties of the undertaking to transfer. The exemption fails. Capital gains arise on the entire transfer. <strong>Fix:<\/strong> assign or novate the contract; or restructure so the contract was never part of the undertaking definition in the first place.", "hooks": "Definitions in <span class='sec'>Sec 2(1B)<\/span> (amalgamation) and <span class='sec'>Sec 2(19AA)<\/span> (demerger); exemption sections in <span class='sec'>Sec 47<\/span>; cost rules in <span class='sec'>Sec 49(2)/(2C)/(2D)<\/span>; loss carry-forward in <span class='sec'>Sec 72A<\/span>; withdrawal of exemption in <span class='sec'>Sec 47A<\/span>.", "pitfalls": "Sec 47A withdrawal is the silent killer. If conditions are breached within 8 years (e.g., the transferee disposes of the undertaking, fails the 75% asset retention test), the originally exempt transaction is reassessed as taxable in the year of breach. <strong>Maintain post-transaction monitoring memos.<\/strong>"}, {"tag": "Cross-border", "title": "Domestic vs cross-border restructuring", "summary": "What changes when the transaction crosses India's borders.", "body": "A domestic merger touches the Companies Act and the Income-tax Act. A cross-border merger adds two more regimes: <strong>FEMA<\/strong> (foreign exchange) and <strong>regulatory clearance<\/strong> from sectoral regulators. The Companies Act permits cross-border mergers only between an Indian company and a foreign company incorporated in a <em>notified jurisdiction<\/em> (essentially FATF-compliant, with a bilateral arrangement). FEMA Cross Border Merger Regulations 2018 grant <em>deemed RBI approval<\/em> if the regulations are complied with, including the two-year window to dispose of non-compliant assets and borrowings.", "example": "<strong>Example.<\/strong> A Mauritius holding company wants to merge into its Indian operating subsidiary — a classic <em>reverse flip<\/em>. Steps: (1) Companies Act Sec 234 + Rule 25A scheme, (2) NCLT petition with shareholders' approval, (3) FEMA Cross Border Merger Regulations 2018 compliance certificate, (4) NDI Rules 2019 pricing for any new shares issued to the Mauritius shareholders, (5) tax under Sec 47(via)/(vic) if conditions met. Five regulators, one transaction. Sequence and timing matter — get Companies Act / FEMA simultaneously rather than serially.", "hooks": "Companies Act <span class='sec'>Sec 234<\/span> + Rule 25A · FEMA Cross Border Merger Regs 2018 · NDI Rules 2019 (inbound) · ODI Rules 2022 (outbound) · IT <span class='sec'>Sec 47(via)/(vic)/(vicc)<\/span> · PN3 if neighbouring country.", "pitfalls": "Forgetting that PN3 (Press Note 3 of 2020) requires <strong>government route<\/strong> for any investment with a beneficial owner in a country sharing a land border with India. A Mauritius vehicle with Chinese ultimate ownership <em>does not<\/em> escape PN3."}, {"tag": "Listed companies", "title": "Extra hoops for listed companies", "summary": "SEBI's overlay on every scheme involving a listed entity.", "body": "If any party is listed, SEBI's <strong>LODR Regulation 37<\/strong> kicks in: the listed company must obtain stock exchange / SEBI <em>prior approval<\/em> before filing the scheme with NCLT. The SEBI <strong>Master Circular on Schemes of Arrangement<\/strong> specifies what the application must contain — fairness opinion from an independent merchant banker, valuation report, no-objection from stock exchanges, post-scheme listing undertaking, and a positive recommendation from the audit committee and the committee of independent directors. Separately, <strong>SAST Regulations 2011<\/strong> may trigger an open offer if the scheme results in acquisition of 25% or more (Reg. 3) or change of control (Reg. 4).", "example": "<strong>Example.<\/strong> A promoter wants to demerge a listed cement business into a separately listed entity. Sequence: (1) board approval, (2) merchant banker fairness opinion, (3) audit committee recommendation, (4) BSE/NSE in-principle approval under Reg. 37, (5) SEBI observation letter, (6) shareholder approval — note: majority of minority shareholders required if related-party scheme, (7) NCLT petition, (8) post-sanction listing of new entity. Skipping the SEBI step or filing NCLT first invites rejection or remand.", "hooks": "SEBI LODR <span class='sec'>Reg. 37<\/span> · SEBI Master Circular on Schemes (latest version) · SAST 2011 <span class='sec'>Reg. 3, 4, 10(1)(d)<\/span> · ICDR for any preferential issue of new shares post-scheme.", "pitfalls": "<strong>Related-party schemes<\/strong> need majority-of-minority approval — promoters cannot vote on their own scheme. Many schemes have failed at this gate. Plan governance approvals as carefully as legal ones."}, {"tag": "Procedure", "title": "Court route vs out-of-court route", "summary": "Trade-off: certainty (NCLT) vs speed (BTA, buyback, simple share transfer).", "body": "Two ways to move assets between companies. The <strong>court route<\/strong> — Sections 230–234, NCLT-sanctioned scheme — gives universal binding effect: all creditors and shareholders are bound by the order, automatic vesting of property, stamp-duty treatment as a court order rather than a registered instrument, and a clean record. The <strong>out-of-court route<\/strong> — slump sale BTA, buyback under Sec 68, share transfer — is faster (3–6 months vs 12–18 months) and avoids tribunal exposure, but requires individual consents (creditor novations, customer assignments, employee transfers), separate stamping of each instrument, and is more fragile if any third party refuses to consent.", "example": "<strong>Example.<\/strong> Two group companies want to combine their FMCG businesses. Option A — Scheme of arrangement: 12 months, NCLT, but clean and tax-neutral if Sec 2(1B) met. Option B — Slump sale BTA: 4 months, no court, but capital gains tax under Sec 50B and stamp duty on the conveyance. Choose A if the businesses share employees and creditors that would be hard to novate individually. Choose B if speed dominates and the parties can absorb the tax.", "hooks": "Court route: Companies Act <span class='sec'>Sec 230–234<\/span>, CAA Rules 2016. Out-of-court: <span class='sec'>Sec 50B<\/span> slump sale, <span class='sec'>Sec 68<\/span> buyback, <span class='sec'>Sec 180(1)(a)<\/span> shareholder approval for substantial asset disposal.", "pitfalls": "Choosing the out-of-court route to save time, then discovering halfway that 30 customers have anti-assignment clauses. Run a contracts heat-map <em>before<\/em> committing to either route."}, {"tag": "Universal principle", "title": "The going-concern principle", "summary": "The single test that runs across slump sale, demerger and cross-border alike.", "body": "Every tax-favoured restructuring depends on transferring the business as a <em>going concern<\/em> — i.e., the business is functional, employees are in place, contracts are live, and the buyer can continue operations from day one. <strong>Sec 2(19AA)(iv)<\/strong> requires demerger to be on a going-concern basis. <strong>GST Notification 12/2017<\/strong> exempts business transfer as a going concern from GST. <strong>Slump sale<\/strong> under Sec 2(42C) implies transfer of an undertaking — which means it must be functional, not a heap of dismantled assets. The unifying idea: tax law rewards transfers that <em>preserve economic activity<\/em>; it penalises transfers that are pure asset-stripping.", "example": "<strong>Example.<\/strong> A factory has been shut for 18 months. The owner sells the land, building and machinery to a buyer. Is this a slump sale or an itemised sale? If the business is not <em>capable of being carried on<\/em>, courts have held it's not a going concern — therefore not a slump sale under Sec 2(42C), and not GST-exempt. <strong>Drafting test:<\/strong> can the buyer start operations on the date of transfer without re-procuring anything material? If yes, going concern. If no, you have a tax problem.", "hooks": "<span class='sec'>Sec 2(19AA)(iv)<\/span> demerger condition · <span class='sec'>Sec 2(42C)<\/span> slump sale undertaking · GST Notification 12/2017 entry 2 · FEMA Cross Border Merger Regs 2018 compliance certificate referring to going concern.", "pitfalls": "Pre-closing reorganisations that dismantle the workforce or terminate the lease <em>before<\/em> closing can break the going-concern characterisation. Sequence the operational reorganisation <em>after<\/em> the closing date, not before."}], "materials": [{"kind": "Study Note", "title": "Companies Act — Schemes of Arrangement (Sec 230–232)", "summary": "The procedural backbone of every NCLT-sanctioned restructuring.", "body": "\n<h2>The three sections at a glance<\/h2>\n<ul>\n  <li><span class=\"sec\">Sec 230<\/span> — Compromise or arrangement with creditors and/or members. This is the parent enabling section: any reorganisation that involves classes of creditors/members goes through here.<\/li>\n  <li><span class=\"sec\">Sec 231<\/span> — Tribunal's powers to enforce the compromise/arrangement; supervise implementation; modify if needed.<\/li>\n  <li><span class=\"sec\">Sec 232<\/span> — Specific provisions for mergers and amalgamations, including treatment of property, contracts, employees and accounting.<\/li>\n<\/ul>\n\n<h2>The Sec 230 procedure<\/h2>\n<ol>\n  <li><strong>Board approval<\/strong> of the scheme.<\/li>\n  <li><strong>Application to NCLT<\/strong> by the company, creditor, member or liquidator. Disclosures required under Rule 6, CAA Rules 2016 — material facts, latest auditor's report, investigation reports, the auditor's certificate on accounting treatment under Ind AS 103 or AS 14.<\/li>\n  <li><strong>Meetings of classes<\/strong> of creditors and members — convened pursuant to NCLT directions. Approval threshold: <strong>majority in number representing three-fourths in value<\/strong> of each class present and voting (Sec 230(6)).<\/li>\n  <li><strong>Sanction petition<\/strong> back to NCLT after meetings. The order is binding on the company, all creditors, members and the liquidator.<\/li>\n  <li><strong>Filing with ROC<\/strong> within 30 days of the order.<\/li>\n<\/ol>\n\n<h2>Sec 232 — the merger specifics<\/h2>\n<p>Section 232 layers additional requirements on top of Sec 230 for mergers and amalgamations:<\/p>\n<ul>\n  <li>Mandatory documents under <strong>Sec 232(2)<\/strong>: draft scheme, valuation report by a registered valuer, explanatory statement, latest auditor's report on the books of the transferor.<\/li>\n  <li><strong>Accounting treatment<\/strong> under <strong>Sec 232(3)(i)<\/strong>: scheme must conform to accounting standards under Sec 133. Departure invites tribunal's adverse comment.<\/li>\n  <li><strong>Statutory authorities<\/strong> are entitled to make representations: Central Government (via RD/ROC), Income-tax authorities, RBI, SEBI, CCI, sectoral regulators. Most schemes are decided on the back of the RD/ROC report.<\/li>\n  <li><strong>Appointed date logic<\/strong> — Sec 232(6): the scheme takes effect from the date specified, which may be a date earlier than the order date. The MCA circular dated 21 August 2019 clarifies that appointed date should generally not be more than 12 months before the date of filing.<\/li>\n<\/ul>\n\n<h2>CAA Rules 2016 — what to memorise<\/h2>\n<ul>\n  <li><strong>Rule 6<\/strong> — application format; disclosures required in the explanatory statement under Sec 230(3).<\/li>\n  <li><strong>Rule 8<\/strong> — notice of meeting; advertisement requirements (newspapers, website).<\/li>\n  <li><strong>Rule 15<\/strong> — petition for sanction after meetings.<\/li>\n  <li><strong>Rule 25<\/strong> — the fast-track procedure under Sec 233.<\/li>\n  <li><strong>Rule 25A<\/strong> — cross-border mergers under Sec 234.<\/li>\n<\/ul>\n\n<div class=\"callout\">\n<strong>Drafting tip.<\/strong> The single best predictor of a sanctioned scheme is the quality of the\nexplanatory statement. It must cover: business rationale, valuation methodology, share exchange ratio\nfairness, treatment of employees, treatment of any pending litigation, and the effect on minority\nshareholders. Tribunals routinely reject schemes for thin explanatory statements.\n<\/div>\n\n<h2>What tribunals look for — the rejection grounds<\/h2>\n<ol>\n  <li><strong>Undervaluation<\/strong> — the share exchange ratio favours the dominant shareholder.<\/li>\n  <li><strong>Oppression of minority<\/strong> — minority shareholders disadvantaged without commensurate benefit.<\/li>\n  <li><strong>Tax avoidance dressed up as commercial<\/strong> — see <em>Vodafone Essar / In re Sun Pharmaceutical<\/em> line of reasoning.<\/li>\n  <li><strong>Non-disclosure<\/strong> of related-party transactions, pending litigation, or material liabilities.<\/li>\n  <li><strong>Wrong appointed date<\/strong> — too far in the past without justification, or where it conflicts with the FY of audit.<\/li>\n<\/ol>\n\n<h2>The order — what it does<\/h2>\n<p>The NCLT order under Sec 232 produces, by operation of law, the following effects from the appointed date:<\/p>\n<ul>\n  <li>Transfer of <strong>all property, rights and powers<\/strong> of the transferor to the transferee.<\/li>\n  <li>Transfer of <strong>all liabilities and duties<\/strong> of the transferor to the transferee.<\/li>\n  <li><strong>Pending legal proceedings<\/strong> continue against the transferee.<\/li>\n  <li>The <strong>transferor stands dissolved<\/strong> without winding-up.<\/li>\n  <li>The order is registered with the ROC, who strikes off the transferor.<\/li>\n<\/ul>\n", "slug": "notes-companies-schemes"}, {"kind": "Study Note", "title": "Companies Act — Special Routes (Sec 66, 68, 233, 234)", "summary": "Capital reduction, buyback, fast-track, and cross-border — the routes outside the standard Sec 230–232 scheme.", "body": "\n<h2>Sec 66 — Capital reduction<\/h2>\n<p>The legal procedure to reduce paid-up share capital. Common uses: write off accumulated losses\nagainst capital (paper exercise), return surplus capital to shareholders (cash payout), or cancel\nshares not represented by available assets.<\/p>\n<ul>\n  <li>Special resolution required.<\/li>\n  <li><strong>NCLT approval<\/strong> mandatory — the tribunal must be satisfied that creditors consent or are secured.<\/li>\n  <li>Creditor protection: representative creditors list to be filed; objections heard.<\/li>\n  <li>Order delivered to ROC; the reduction takes effect on registration.<\/li>\n  <li>Tax: if reduction involves return of accumulated profits to shareholders, treated as <strong>deemed dividend under Sec 2(22)(d)<\/strong> to that extent (Anarkali Sarabhai principle).<\/li>\n<\/ul>\n\n<h2>Sec 68–70 — Buyback<\/h2>\n<p>The company purchases its own shares from existing shareholders, thereby reducing capital. Faster\nthan Sec 66 because no NCLT — only a board / shareholder approval and SH-7/SH-9 filings.<\/p>\n\n<h3>Sources of funds (Sec 68(1))<\/h3>\n<ul>\n  <li>Free reserves.<\/li>\n  <li>Securities premium account.<\/li>\n  <li>Proceeds of any shares or other specified securities — but <em>not<\/em> from the proceeds of an earlier issue of the same kind of shares.<\/li>\n<\/ul>\n\n<h3>Quantitative limits<\/h3>\n<ul>\n  <li><strong>10% of paid-up equity + free reserves<\/strong> — buyback authorised by board resolution.<\/li>\n  <li><strong>25% of paid-up equity + free reserves<\/strong> — buyback authorised by special resolution. Within this, buyback of equity in any FY cannot exceed 25% of total paid-up equity.<\/li>\n  <li><strong>Debt-to-equity ratio<\/strong> post-buyback cannot exceed 2:1.<\/li>\n  <li><strong>Cooling period<\/strong> of one year between two buybacks (Sec 68(2)(d)).<\/li>\n<\/ul>\n\n<h3>Section 67 prohibition<\/h3>\n<p>A company cannot give financial assistance for purchase of its own shares, except in limited\nemployee-stock-scheme cases. Read alongside Sec 68 to avoid back-door buybacks.<\/p>\n\n<h3>Tax shift — post-October 2024<\/h3>\n<div class=\"callout\">\n<strong>Important.<\/strong> Until 30 September 2024, buyback was taxed at the <em>company<\/em> level\nat 20%+ under <span class=\"sec\">Sec 115QA<\/span>. From 1 October 2024, the buyback consideration is\ntaxed in the hands of the <em>shareholder<\/em> as a deemed dividend. This fundamentally changes the\npost-tax economics — tax neutrality for buyback as a return route is gone for most shareholders.\n<\/div>\n\n<h2>Sec 233 — Fast-track merger<\/h2>\n<p>A streamlined route that bypasses the NCLT entirely. Goes to the <strong>Regional Director (RD)<\/strong> via the ROC.<\/p>\n\n<h3>Eligibility (Sec 233(1) read with Rule 25)<\/h3>\n<ul>\n  <li>Two or more <strong>small companies<\/strong>.<\/li>\n  <li>A <strong>holding company and its wholly-owned subsidiary (WOS)<\/strong>.<\/li>\n  <li><strong>Two or more start-up companies<\/strong> (post the Feb 2021 amendment).<\/li>\n  <li>A <strong>start-up + a small company<\/strong>.<\/li>\n  <li>Effective from <strong>September 2024 (MCA notification)<\/strong> — also extended to certain unlisted public companies meeting prescribed thresholds, and to inbound cross-border mergers within the fast-track ambit.<\/li>\n<\/ul>\n\n<h3>Procedure<\/h3>\n<ol>\n  <li>Both companies issue notice of the scheme to ROC, OL and persons affected; objections invited.<\/li>\n  <li>Both companies hold meetings — <strong>90% of total shares<\/strong> approval from members; <strong>9/10 in value<\/strong> approval from creditors.<\/li>\n  <li>Scheme filed with RD via ROC.<\/li>\n  <li>If RD finds no objection (or objections are not substantive), order is passed registering the scheme.<\/li>\n  <li>Order filed with ROC; transferor stands dissolved.<\/li>\n<\/ol>\n\n<p><strong>Why it matters:<\/strong> 3–4 months end-to-end vs 12–18 months for a Sec 230–232 scheme. Cost is significantly lower.<\/p>\n\n<h2>Sec 234 — Cross-border merger<\/h2>\n<p>Permits a foreign company to merge into an Indian company (inbound) or vice versa (outbound), but only with companies in <strong>notified jurisdictions<\/strong> — generally FATF-compliant countries with whom India has bilateral arrangements.<\/p>\n\n<h3>Procedure (Rule 25A)<\/h3>\n<ol>\n  <li><strong>Prior approval of RBI<\/strong> is required — though in practice this works through the FEMA Cross Border Merger Regulations 2018 (deemed approval if compliant).<\/li>\n  <li>The Indian company files the scheme with NCLT.<\/li>\n  <li>Valuation report by an internationally recognised valuer where the foreign entity is involved.<\/li>\n  <li>The Sec 230–232 procedural overlay applies — creditor/member meetings, sanction order.<\/li>\n<\/ol>\n\n<div class=\"callout\">\n<strong>Watch for.<\/strong> Cross-border mergers also need to clear sectoral FDI/ODI rules,\nPN3 (neighbouring country) checks, and the 2-year FEMA window to dispose of non-compliant assets.\nThe Companies Act route is necessary but never sufficient.\n<\/div>\n", "slug": "notes-companies-special-routes"}, {"kind": "Study Note", "title": "Income-tax — Amalgamation & Demerger", "summary": "Sec 2(1B), 2(19AA), 47, 49, 72A — the tax-neutrality engine of corporate restructuring.", "body": "\n<h2>Sec 2(1B) — Definition of amalgamation<\/h2>\n<p>For amalgamation to be tax-neutral, three cumulative conditions in Sec 2(1B) must be met:<\/p>\n<ol>\n  <li><strong>All the property<\/strong> of the amalgamating company immediately before amalgamation becomes the property of the amalgamated company.<\/li>\n  <li><strong>All the liabilities<\/strong> of the amalgamating company immediately before amalgamation become the liabilities of the amalgamated company.<\/li>\n  <li><strong>Shareholders holding ≥ 3/4 in value<\/strong> of the shares of the amalgamating company (other than shares already held by the amalgamated company or its nominee/subsidiary) become shareholders of the amalgamated company by virtue of the amalgamation.<\/li>\n<\/ol>\n\n<h2>Sec 2(19AA) — Definition of demerger<\/h2>\n<p>For demerger to be tax-neutral, five cumulative conditions must be met:<\/p>\n<ol>\n  <li><strong>All the property<\/strong> of the undertaking transfers from the demerged company to the resulting company on a going-concern basis.<\/li>\n  <li><strong>All the liabilities<\/strong> relatable to the undertaking transfer from the demerged company to the resulting company.<\/li>\n  <li>Property and liabilities transfer <strong>at values appearing in the books of account<\/strong> (no revaluation adjustment, except reversal of upward revaluation).<\/li>\n  <li>The resulting company <strong>issues its shares to the shareholders of the demerged company on a proportionate basis<\/strong>, except where the resulting company itself is a shareholder of the demerged company.<\/li>\n  <li>Shareholders holding <strong>≥ 3/4 in value<\/strong> of shares of the demerged company become shareholders of the resulting company.<\/li>\n<\/ol>\n\n<div class=\"callout\">\n<strong>Critical.<\/strong> Failing any one condition kills the tax neutrality of the entire transaction.\nThe five-condition test of Sec 2(19AA) is the single most-litigated definition in restructuring tax law.\n<\/div>\n\n<h2>Sec 47 — The exemption<\/h2>\n<h3>Amalgamation<\/h3>\n<ul>\n  <li><span class=\"sec\">Sec 47(vi)<\/span> — transfer of capital asset by amalgamating company to amalgamated company (Indian company) is not regarded as transfer.<\/li>\n  <li><span class=\"sec\">Sec 47(vii)<\/span> — transfer of shares in amalgamating company by shareholder in consideration of allotment of shares in amalgamated company is not regarded as transfer.<\/li>\n<\/ul>\n\n<h3>Demerger<\/h3>\n<ul>\n  <li><span class=\"sec\">Sec 47(vib)<\/span> — transfer of capital asset by demerged company to resulting company (Indian company) is not regarded as transfer.<\/li>\n  <li><span class=\"sec\">Sec 47(vid)<\/span> — issue of shares of resulting company to shareholders of demerged company is not regarded as transfer.<\/li>\n<\/ul>\n\n<h3>Cross-border<\/h3>\n<ul>\n  <li><span class=\"sec\">Sec 47(via)<\/span>, <span class=\"sec\">(vic)<\/span>, <span class=\"sec\">(vicc)<\/span> — exemptions for amalgamation/demerger involving foreign companies, subject to conditions on continuity of business and shareholding.<\/li>\n<\/ul>\n\n<h2>Sec 49 — Cost of acquisition for the successor<\/h2>\n<ul>\n  <li><span class=\"sec\">Sec 49(2)<\/span> — In hands of the amalgamated company, cost of asset = cost in hands of amalgamating company.<\/li>\n  <li><span class=\"sec\">Sec 49(2C)<\/span> — Cost of shares of resulting company in shareholder's hands = cost of original shares × (net book value of assets transferred ÷ net worth of demerged company before demerger).<\/li>\n  <li><span class=\"sec\">Sec 49(2D)<\/span> — Cost of shares of demerged company post-demerger = original cost reduced by the cost allocated to resulting company under Sec 49(2C).<\/li>\n<\/ul>\n\n<h2>Sec 72A — Carry-forward of losses on amalgamation<\/h2>\n<p>The big tax incentive. The accumulated losses and unabsorbed depreciation of the amalgamating\ncompany are deemed to be those of the amalgamated company — provided strict conditions are met:<\/p>\n\n<h3>Sec 72A(1) — Amalgamation<\/h3>\n<ul>\n  <li>Amalgamation must be of an <strong>\"industrial undertaking\"<\/strong> — defined in Sec 72A(7) to include manufacturing, processing of goods, hotels (defined classes), and certain other categories. Pure service or trading is generally outside.<\/li>\n  <li><strong>Amalgamating company conditions:<\/strong> must have been engaged in the industrial undertaking for ≥ 3 years; must have held ≥ 3/4 in value of its book of fixed assets for ≥ 2 years before amalgamation.<\/li>\n  <li><strong>Amalgamated company conditions:<\/strong> must continue the business for ≥ 5 years; must hold ≥ 3/4 of fixed assets for ≥ 5 years; must achieve ≥ 50% of installed capacity within 4 years.<\/li>\n<\/ul>\n\n<h3>Sec 72A(4) — Demerger<\/h3>\n<p>Accumulated losses and unabsorbed depreciation directly relatable to the demerged undertaking\ntransfer to the resulting company. If not directly relatable, they're apportioned in the proportion\nof assets retained vs transferred.<\/p>\n\n<h2>Sec 47A — Withdrawal of exemption<\/h2>\n<p>If the conditions of Sec 47(vib) (or other relevant sub-clause) are violated within 8 years\nof the transfer — e.g., resulting company transfers the undertaking — the originally exempt\ntransaction is reassessed and capital gains tax becomes payable in the year of breach.<\/p>\n\n<div class=\"callout\">\n<strong>Audit checkpoint.<\/strong> Sec 47A is checked at every audit for ≥ 8 years after a\ndemerger. Maintain a memo file recording the post-transaction status of the transferred undertaking,\nasset retention, and business continuation — for each year.\n<\/div>\n\n<h2>Sec 56(2)(x) — The anti-abuse overlay<\/h2>\n<p>If shares are received without consideration, or for inadequate consideration, the difference\nbetween FMV and consideration is taxed as \"income from other sources\" in the recipient's hands.\nThis applies to shareholders receiving shares in a demerger if the shares are issued at less than\nFMV — though Sec 56(2)(x) provides exceptions for amalgamation and demerger meeting Sec 2(1B)/2(19AA).\nVerify the exception applies in each fact pattern.<\/p>\n", "slug": "notes-tax-amalgamation-demerger"}, {"kind": "Study Note", "title": "Income-tax — Slump Sale, Buyback, Capital Reduction", "summary": "Sec 50B, 115QA, 2(22)(d), 47A — the non-court tax routes.", "body": "\n<h2>Sec 2(42C) + Sec 50B — Slump sale<\/h2>\n<p><strong>Slump sale<\/strong> means the transfer of an undertaking, or one of multiple undertakings,\nas a result of the sale, for a <em>lump sum consideration<\/em>, without values being assigned to\nindividual assets and liabilities. The transfer must be on a going-concern basis.<\/p>\n\n<h3>Sec 50B — Computation of capital gain<\/h3>\n<ul>\n  <li><strong>Sale consideration<\/strong> = lump sum received (or, post-amendment, FMV under Rule 11UAE if higher).<\/li>\n  <li><strong>Cost of acquisition<\/strong> = \"net worth\" of the undertaking — i.e., aggregate value of total assets reduced by value of liabilities, as appearing in the books, computed without considering revaluation.<\/li>\n  <li><strong>Holding period<\/strong> — if the undertaking has been owned and held for more than 36 months, gain is long-term; the indexation benefit, however, is <em>not<\/em> available even for long-term slump sale.<\/li>\n  <li>Result: <strong>Slump sale capital gain<\/strong> = sale consideration − net worth.<\/li>\n<\/ul>\n\n<h3>Rule 11UAE — FMV calculation<\/h3>\n<p>FMV of an undertaking = aggregate of:<\/p>\n<ul>\n  <li><strong>FMV of capital assets<\/strong> (book value or stamp duty value, depending on asset class), plus<\/li>\n  <li><strong>FMV of jewellery, archaeological collections, drawings, paintings<\/strong>, plus<\/li>\n  <li><strong>FMV of unquoted shares<\/strong>, plus<\/li>\n  <li><strong>Book value of other assets<\/strong>, less liabilities.<\/li>\n<\/ul>\n\n<p>Where consideration is less than FMV under Rule 11UAE, the higher value is deemed the sale\nconsideration — a key anti-abuse mechanism.<\/p>\n\n<h2>Sec 50CA + Sec 56(2)(x) — Anti-abuse on unquoted shares<\/h2>\n<p>Two layers operate together:<\/p>\n<ul>\n  <li><span class=\"sec\">Sec 50CA<\/span> — if unquoted shares are sold at less than FMV (Rule 11UA), the FMV is deemed the sale consideration in the seller's hands.<\/li>\n  <li><span class=\"sec\">Sec 56(2)(x)<\/span> — the buyer is taxed on the difference between FMV and consideration as \"income from other sources\".<\/li>\n<\/ul>\n<p>The same delta is therefore taxed twice in mirror form — once on seller (deemed sale price) and once on buyer (deemed gift). This is the \"double-anti-abuse\" that catches sham private share transactions.<\/p>\n\n<h2>Sec 115QA — Buyback tax (the regime shift)<\/h2>\n\n<h3>Pre-October 2024<\/h3>\n<p>Sec 115QA imposed buyback tax on the <em>company<\/em> at <strong>20% (plus surcharge and cess)<\/strong>\non the distributed income (buyback price minus issue price). The buyback receipt in shareholder's hands\nwas exempt under Sec 10(34A).<\/p>\n\n<h3>Post-1 October 2024<\/h3>\n<div class=\"callout\">\n<strong>Regime change.<\/strong> Section 115QA has been withdrawn for buybacks on or after 1 October\n2024. The buyback consideration is now taxed in the hands of the shareholder as <em>deemed dividend<\/em>\nunder Sec 2(22), at the shareholder's applicable slab rate (subject to TDS under Sec 194). The\nshareholder's cost in the bought-back shares becomes a capital loss available for set-off.\n<\/div>\n\n<p>This fundamentally changes the post-tax efficiency of buybacks for promoter/large shareholders.\nTender-offer buybacks that made commercial sense pre-Oct 2024 may no longer be the cheapest cash-return\nroute.<\/p>\n\n<h2>Sec 2(22)(d) — Capital reduction as deemed dividend<\/h2>\n<p>Distribution by a company on the reduction of its capital is deemed to be a dividend\n<strong>to the extent of the accumulated profits<\/strong> of the company (whether capitalised or not).\nThis is the <strong>Anarkali Sarabhai principle<\/strong>: <em>Anarkali Sarabhai v. CIT (1997) 224 ITR 422 (SC)<\/em>.<\/p>\n\n<p>Mechanics:<\/p>\n<ul>\n  <li>Distribution up to accumulated profits → taxable as dividend in shareholder's hands (slab rate post-Apr 2020).<\/li>\n  <li>Distribution in excess of accumulated profits → return of capital, treated as capital receipt; reduces cost of acquisition of the shares (which may be exhausted or trigger capital gains if reduction exceeds cost).<\/li>\n  <li>Where capital reduction is by way of cancellation of shares without consideration, capital loss may arise to the shareholder.<\/li>\n<\/ul>\n\n<h2>Sec 47A — Withdrawal of exemption (slump sale variant)<\/h2>\n<p>Where an exemption under Sec 47 was claimed (e.g., for share consideration in lieu of cash in a\nslump-exchange transaction), and the conditions are breached within the prescribed period\n(generally 8 years), the originally exempt transaction becomes taxable retrospectively in the\nyear of breach.<\/p>\n\n<div class=\"callout\">\n<strong>Audit pitfall.<\/strong> Mid-sized clients often do a slump sale, then a few years later\nrestructure the consideration shares. Section 47A monitoring is rarely automated. The cleanest\ncontrol is a static schedule of \"exempt-transaction lock-ins\" maintained at the CFO's office.\n<\/div>\n\n<h2>Decision matrix — non-court routes<\/h2>\n<table>\n  <thead><tr><th>Route<\/th><th>Tax in company<\/th><th>Tax in shareholder<\/th><th>Best when<\/th><\/tr><\/thead>\n  <tbody>\n    <tr><td>Slump sale<\/td><td>Capital gain on net consideration − net worth<\/td><td>Nil at transaction<\/td><td>Single buyer wants the whole undertaking; cash dominant<\/td><\/tr>\n    <tr><td>Buyback (post Oct-24)<\/td><td>Nil under Sec 115QA<\/td><td>Deemed dividend; slab rate<\/td><td>Distributing surplus cash to shareholders directly<\/td><\/tr>\n    <tr><td>Capital reduction<\/td><td>Nil<\/td><td>Sec 2(22)(d) deemed dividend to extent of accumulated profits<\/td><td>Cleaning up reserves; aligning capital structure<\/td><\/tr>\n    <tr><td>Demerger<\/td><td>Exempt under Sec 47(vib) if Sec 2(19AA) met<\/td><td>Exempt under Sec 47(vid)<\/td><td>Separating businesses; preserving promoter ownership<\/td><\/tr>\n  <\/tbody>\n<\/table>\n", "slug": "notes-tax-slump-buyback"}, {"kind": "Study Note", "title": "FEMA — Cross-Border Merger Regulations 2018", "summary": "The deemed-approval framework for inbound and outbound mergers.", "body": "\n<h2>The regulatory ladder<\/h2>\n<p>Cross-border mergers between an Indian company and a foreign company touch three regimes\nsimultaneously:<\/p>\n<ol>\n  <li><strong>Companies Act Sec 234 + Rule 25A<\/strong> — the corporate-law route, with NCLT.<\/li>\n  <li><strong>FEMA Cross Border Merger Regulations 2018<\/strong> — the foreign-exchange route, granting <em>deemed RBI approval<\/em> where the regulations are complied with.<\/li>\n  <li><strong>Income-tax Sec 47(via)/(vic)/(vicc)<\/strong> — the tax-neutrality overlay, with its own conditions.<\/li>\n<\/ol>\n<p>Plus sectoral checks: PN3 (neighbouring country investors), FDI sectoral caps, listing rules,\nCCI thresholds.<\/p>\n\n<h2>Two flavours of cross-border merger<\/h2>\n\n<h3>Inbound merger — foreign company merges into Indian company<\/h3>\n<ul>\n  <li>The Indian company is the <strong>resulting<\/strong> entity.<\/li>\n  <li>Indian company may issue shares to shareholders of the foreign company; FEMA NDI Rules 2019 pricing applies.<\/li>\n  <li>Assets and liabilities of the foreign company transfer to the Indian company. If those assets/liabilities are not FEMA-compliant for Indian holding, a 2-year window is granted to make them compliant or dispose of them.<\/li>\n  <li><strong>Typical use case:<\/strong> the <em>reverse flip<\/em> — bringing an offshore-domiciled startup back to India in preparation for a domestic listing.<\/li>\n<\/ul>\n\n<h3>Outbound merger — Indian company merges into foreign company<\/h3>\n<ul>\n  <li>The foreign company is the resulting entity. Foreign jurisdiction must be a <strong>notified jurisdiction<\/strong>.<\/li>\n  <li>Indian shareholders receive foreign-company shares; ODI Rules 2022 govern this — generally requires automatic route eligibility.<\/li>\n  <li>The Indian company's assets become assets of the foreign company; FEMA permits this only if the transfer complies with the prevailing ODI framework.<\/li>\n  <li><strong>Typical use case:<\/strong> consolidation under a foreign listed parent.<\/li>\n<\/ul>\n\n<h2>Notified jurisdictions (Annexure to Rule 25A)<\/h2>\n<p>A foreign company is in a \"notified jurisdiction\" if it is incorporated in a country whose\nsecurities regulator is a member of IOSCO MMoU, OR whose central bank is a BIS member, OR whose\ncountry is a member of FATF — and which has a notified bilateral agreement with India. Common\nexamples: USA, UK, Singapore, Mauritius, Netherlands.<\/p>\n\n<h2>The deemed-approval mechanism<\/h2>\n<p>Reg. 9 of the Cross Border Merger Regulations 2018: a transaction is <strong>deemed to have RBI\napproval<\/strong> if it complies with the regulations. The compliance is evidenced by a\n<strong>certificate from the managing director / whole-time director / company secretary<\/strong>\nof the company concerned, certifying that the regulations have been complied with. No formal RBI\napproval letter is required — though RBI retains the right to inspect.<\/p>\n\n<h2>The 2-year compliance window<\/h2>\n<p>Reg. 7: if, after the merger, the resulting company holds any asset, security or\nborrowing that is not FEMA-compliant (e.g., overseas direct investment outside the ODI permissible\nlimits, or borrowings outside the ECB framework), the resulting company has <strong>2 years from\nthe effective date<\/strong> to dispose of or make the asset/borrowing compliant. Income earned\nduring this window is to be repatriated through normal banking channels.<\/p>\n\n<div class=\"callout\">\n<strong>Practical pitfall.<\/strong> The 2-year window is short. For an inbound merger absorbing\na foreign company that holds overseas subsidiaries or non-compliant borrowings, a clean asset list\nmust be prepared at due-diligence stage. Surprise non-compliant assets discovered post-merger are a\nmajor operational headache.\n<\/div>\n\n<h2>Pricing<\/h2>\n<ul>\n  <li><strong>Inbound<\/strong>: NDI Rules 2019 pricing applies to any equity issued by the Indian company to non-resident shareholders. For unlisted Indian companies, this is DCF or NAV-based; for listed, SEBI ICDR pricing.<\/li>\n  <li><strong>Outbound<\/strong>: ODI Rules 2022 pricing — fair value based on internationally accepted valuation methodology.<\/li>\n<\/ul>\n\n<h2>Reporting<\/h2>\n<ul>\n  <li><strong>Inbound merger involving share issue<\/strong>: FC-GPR within 30 days of share allotment.<\/li>\n  <li><strong>Outbound merger<\/strong>: ODI Form (Form FC) before the merger; Annual Performance Report (APR) thereafter.<\/li>\n  <li>The compliance certificate from the company is filed alongside the NCLT order with ROC.<\/li>\n<\/ul>\n\n<h2>Tax overlay — Sec 47(via)/(vic)/(vicc) at a glance<\/h2>\n<ul>\n  <li><span class=\"sec\">Sec 47(via)<\/span> — amalgamation of foreign company into Indian company; exempt subject to conditions.<\/li>\n  <li><span class=\"sec\">Sec 47(vic)<\/span> — demerger of foreign company; exempt subject to conditions.<\/li>\n  <li><span class=\"sec\">Sec 47(vicc)<\/span> — amalgamation/demerger of two foreign companies holding shares in Indian company; exempt subject to ≥ 25% shareholder continuity.<\/li>\n  <li><span class=\"sec\">Sec 9(1)(i)<\/span> — indirect transfer provisions still apply; any transaction in foreign-company shares deriving substantial value from Indian assets remains taxable in India absent specific exemption.<\/li>\n<\/ul>\n", "slug": "notes-fema-cross-border"}, {"kind": "Study Note", "title": "FEMA — NDI Rules 2019 & ODI Rules 2022", "summary": "The foreign-exchange overlay on every M&A with a non-resident in the structure.", "body": "\n<h2>NDI Rules 2019 — Non-Debt Instruments<\/h2>\n<p>The Foreign Exchange Management (Non-Debt Instruments) Rules 2019, notified by the Central\nGovernment under FEMA, are the consolidated framework for foreign investment in Indian companies.\nThey replaced the earlier FDI/NDI scattering of notifications.<\/p>\n\n<h3>Scope<\/h3>\n<ul>\n  <li>Equity instruments — equity shares, fully and mandatorily convertible preference shares, fully and mandatorily convertible debentures, share warrants.<\/li>\n  <li>Investment in an LLP or an investment vehicle.<\/li>\n  <li>Acquisition through merger/demerger/scheme of arrangement.<\/li>\n  <li>Transfer of equity instruments between residents and non-residents.<\/li>\n<\/ul>\n\n<h3>Entry route — automatic vs government<\/h3>\n<ul>\n  <li><strong>Automatic route<\/strong> — no prior approval required; sectoral cap and conditions to be met; reporting after the fact.<\/li>\n  <li><strong>Government route<\/strong> — prior approval through the relevant administrative ministry (FIFP, the Foreign Investment Facilitation Portal). Sectors like print media, broadcasting, defence (above 74%) etc.<\/li>\n<\/ul>\n\n<h3>Sectoral caps — examples<\/h3>\n<table>\n  <thead><tr><th>Sector<\/th><th>Cap<\/th><th>Route<\/th><\/tr><\/thead>\n  <tbody>\n    <tr><td>Manufacturing<\/td><td>100%<\/td><td>Automatic<\/td><\/tr>\n    <tr><td>Insurance<\/td><td>74%<\/td><td>Automatic<\/td><\/tr>\n    <tr><td>Banking — private<\/td><td>74%<\/td><td>Automatic up to 49%; Govt 49–74%<\/td><\/tr>\n    <tr><td>Defence<\/td><td>74% / 100%<\/td><td>Automatic up to 74%; Govt beyond<\/td><\/tr>\n    <tr><td>Telecom<\/td><td>100%<\/td><td>Automatic up to 100% post-Sept 2021<\/td><\/tr>\n    <tr><td>Multi-brand retail<\/td><td>51%<\/td><td>Government<\/td><\/tr>\n  <\/tbody>\n<\/table>\n<p>(Always verify against the consolidated FDI Policy / NDI Schedule I before relying.)<\/p>\n\n<h3>Pricing guidelines<\/h3>\n<ul>\n  <li><strong>Listed company<\/strong> — SEBI ICDR pricing for preferential allotment; SEBI Takeover pricing for transfers above thresholds.<\/li>\n  <li><strong>Unlisted company<\/strong> — fair value based on internationally accepted methodology (typically DCF or NAV) by a SEBI-registered Merchant Banker or a Chartered Accountant.<\/li>\n  <li>For issue of shares to non-resident: price must be <strong>not less than<\/strong> fair value.<\/li>\n  <li>For transfer from non-resident to resident: price must be <strong>not more than<\/strong> fair value.<\/li>\n<\/ul>\n\n<h3>PN3 — Press Note 3 of 2020<\/h3>\n<div class=\"callout\">\n<strong>Government route mandatory<\/strong> for any investment by an entity of a country sharing a\nland border with India, or where the <em>beneficial owner<\/em> of the investment is situated in such\na country. India's land neighbours: Bangladesh, Bhutan, China, Myanmar, Nepal, Pakistan, Afghanistan.\nBeneficial-ownership tracing through multi-tier structures is required.\n<\/div>\n\n<h3>Key reporting forms<\/h3>\n<ul>\n  <li><strong>FC-GPR<\/strong> — Foreign Currency-Gross Provisional Return — within 30 days of share allotment to non-resident.<\/li>\n  <li><strong>FC-TRS<\/strong> — for transfer of equity instruments between resident and non-resident; within 60 days.<\/li>\n  <li><strong>FLA<\/strong> — Annual Return on Foreign Liabilities and Assets — by 15 July each year.<\/li>\n<\/ul>\n\n<h2>ODI Rules 2022 — Overseas Direct Investment<\/h2>\n<p>The Foreign Exchange Management (Overseas Investment) Rules 2022 + Regulations 2022 + Master\nDirection govern outbound investment by Indian residents.<\/p>\n\n<h3>Structure of permissible ODI<\/h3>\n<ul>\n  <li><strong>ODI in foreign entity<\/strong> — capital contribution / equity investment in a foreign entity engaged in a bona fide business activity.<\/li>\n  <li><strong>Financial commitment (FC)<\/strong> — broader: includes equity, debt, guarantee. The aggregate FC limit for an Indian party is generally <strong>400% of its net worth<\/strong> on a non-consolidated basis (lower for certain regulated entities).<\/li>\n<\/ul>\n\n<h3>Automatic vs approval route<\/h3>\n<ul>\n  <li><strong>Automatic route<\/strong> — within the FC ceiling, into bona fide business in countries other than restricted ones, and the foreign entity meets eligibility (not a shell, not a financial-services entity unless eligible).<\/li>\n  <li><strong>Approval route<\/strong> — beyond the cap, in restricted countries (e.g., FATF/IOSCO non-cooperative), or for financial-services entities not eligible automatically.<\/li>\n<\/ul>\n\n<h3>Round-tripping<\/h3>\n<p>The 2022 rules expressly permit <strong>round-tripping<\/strong> up to two layers — an Indian\nparty can invest in a foreign entity which holds an Indian subsidiary, subject to (a) bona fide\nbusiness reason, (b) two-layer cap, (c) RBI reporting. Pre-2022 the position was unclear; the 2022\nrules brought welcome certainty.<\/p>\n\n<h3>Reporting<\/h3>\n<ul>\n  <li><strong>Form FC<\/strong> — pre-investment intimation/approval.<\/li>\n  <li><strong>APR<\/strong> — Annual Performance Report — by 31 December each year for every foreign entity in which ODI is held.<\/li>\n<\/ul>\n\n<div class=\"callout\">\n<strong>Reverse-flip planning.<\/strong> If a startup is migrating from a foreign holding back to\nIndia (the \"reverse flip\"), the inbound side is governed by the Cross Border Merger Regulations 2018\n+ NDI Rules 2019. The outbound exit by the founder shareholders (giving up shares of the foreign\ncompany in exchange for Indian-company shares) must be tested against the ODI framework's exit rules.\n<\/div>\n", "slug": "notes-fema-ndi-odi"}, {"kind": "Study Note", "title": "SEBI, Stamp, Competition & GST Overlays", "summary": "The four parallel regimes most often missed in tax-only treatment.", "body": "\n<h2>SEBI — when does it apply?<\/h2>\n<p>SEBI's jurisdiction is triggered if <strong>any party to the scheme is listed<\/strong>, or if\nthe scheme involves listed securities. Three regulations matter most:<\/p>\n\n<h3>SAST Regulations 2011 — Takeover Code<\/h3>\n<ul>\n  <li><strong>Reg. 3(1)<\/strong> — acquisition of <strong>25% or more<\/strong> of voting rights → mandatory open offer.<\/li>\n  <li><strong>Reg. 3(2)<\/strong> — creeping acquisition: a shareholder holding 25–75% acquiring more than 5% in an FY → mandatory open offer.<\/li>\n  <li><strong>Reg. 4<\/strong> — <strong>change of control<\/strong> regardless of percentage → mandatory open offer.<\/li>\n  <li><strong>Reg. 10<\/strong> — exemptions. Most relevant: <strong>Reg. 10(1)(d)(iii)<\/strong> — acquisition pursuant to a scheme of arrangement under Sec 230–232 is exempt, subject to conditions.<\/li>\n<\/ul>\n\n<h3>LODR Reg. 37 — Scheme approval<\/h3>\n<p>A listed company must obtain <strong>prior approval of the stock exchanges<\/strong> (and, through\nthem, SEBI) before filing a scheme with NCLT. The application requires:<\/p>\n<ul>\n  <li>Fairness opinion from an independent SEBI-registered merchant banker on the share exchange ratio.<\/li>\n  <li>Valuation report by an independent registered valuer.<\/li>\n  <li>Recommendation from the audit committee and the committee of independent directors.<\/li>\n  <li>Declaration on any pending investigations, prosecutions or unresolved SEBI/exchange matters.<\/li>\n  <li>Compliance with the SEBI <strong>Master Circular on Schemes of Arrangement<\/strong>.<\/li>\n<\/ul>\n\n<h3>Master Circular on Schemes — what to remember<\/h3>\n<ul>\n  <li>If the scheme is between a listed company and its wholly-owned subsidiary (or vice versa), simplified procedure — no fairness opinion required.<\/li>\n  <li>If the scheme involves a related party, <strong>majority of public shareholders (majority of minority)<\/strong> approval is required — promoters cannot vote.<\/li>\n  <li>Post-scheme
